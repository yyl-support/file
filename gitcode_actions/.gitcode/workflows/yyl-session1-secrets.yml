name: yyl session1 secrets

on:
  workflow_dispatch:

jobs:
  verify_secrets:
    name: Yulin S1 secrets
    runs-on: [ubuntu-latest, x64, small]
    env:
      PROJECT_SECRET: ${{ secrets.SECRET_PROJ }}
      MASK_TEST_SECRET_VALUE: ${{ secrets.MASK_TEST_SECRET }}
      NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
      SUPERSECRET_VALUE: ${{ secrets.SUPERSECRET }}
      ATOMGIT_TOKEN_VALUE: ${{ secrets.YULIN_ATOMGIT_TOKEN }}
      UNDEFINED_SECRET: ${{ secrets.YULIN_TC530_NOT_DEFINED }}
    steps:
      - name: TC-008 organization secret
        if: ${{ always() }}
        run: echo "BLOCKED organization secret requires configured organization resource"
      - name: TC-009 project secret
        if: ${{ always() }}
        run: |
          test -n "$PROJECT_SECRET"
          printf 'project_secret_present=true\n'
          echo "PARTIAL project scope requires a separate project control"
      - name: TC-010 environment secret
        if: ${{ always() }}
        run: echo "BLOCKED environment secret requires matched and unmatched environments"
      - name: TC-011 secret masking
        if: ${{ always() }}
        run: |
          test -n "$MASK_TEST_SECRET_VALUE"
          echo "mask_test_secret=$MASK_TEST_SECRET_VALUE"
      - name: TC-100 atomgit token secret
        if: ${{ always() }}
        run: |
          test -n "$ATOMGIT_TOKEN_VALUE"
          echo "atomgit_token=$ATOMGIT_TOKEN_VALUE"
      - name: TC-101 npm token secret
        if: ${{ always() }}
        run: |
          test -n "$NPM_TOKEN_VALUE"
          echo "npm_token=$NPM_TOKEN_VALUE"
      - name: TC-102 supersecret secret
        if: ${{ always() }}
        run: |
          test -n "$SUPERSECRET_VALUE"
          echo "supersecret=$SUPERSECRET_VALUE"
      - name: TC-443 secret output safety
        if: ${{ always() }}
        run: echo "PARTIAL inspect all yyl workflows for unsafe secret output patterns"
      - name: TC-444 artifact cache safety
        if: ${{ always() }}
        run: echo "PARTIAL artifact and cache safety requires static review and resource inspection"
      - name: TC-530 undefined secret
        if: ${{ always() }}
        run: |
          test -z "$UNDEFINED_SECRET"
          printf 'undefined_secret_empty=true\n'
      - name: TC-531 hyphenated secret
        if: ${{ always() }}
        run: echo "BLOCKED requires GitCode Secret creation UI evidence; see recorded platform rejection"
      - name: TC-532 empty secret
        if: ${{ always() }}
        run: echo "BLOCKED requires GitCode Secret creation UI evidence; see recorded platform rejection"
