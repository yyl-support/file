{{- range $name, $values := .Values.pvc }}
{{- if $values.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name | quote }}
  {{- with $values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
  {{- toYaml $values.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ $values.storage | quote }}
  storageClassName: {{ $values.storageClassName | quote }}
  volumeMode: {{ $values.volumeMode | quote }}
  {{- if $values.volumeName }}
  volumeName: {{ $values.volumeName | quote }}
  {{- end }}
{{- end }}
{{- end }}
