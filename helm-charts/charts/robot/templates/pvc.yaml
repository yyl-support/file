{{- range .Values.deployments }}
{{- if .pvc }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .pvc.name }}
spec:
  accessModes:
  - {{ .pvc.accessModes }}
  resources:
    requests:
      storage: {{ .pvc.storage }}
  storageClassName: {{ .pvc.scName }}
  volumeMode: Filesystem
{{- end }}
{{- end }}