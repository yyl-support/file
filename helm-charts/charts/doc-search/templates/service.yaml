apiVersion: v1
kind: Service
metadata:
  name: doc-search-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: doc-search
  type: ClusterIP