  - name: configmap-universal-associate
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "openUBMC"
            org_label: needs-issue
            org_issue_state_limit: true
            org_issue_limit_state: "open"
            org_issue_limit_workflow_state:
              - issue_type: 需求
                state: 已接纳,开发中,转测中,待验收
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### 注意 \n只有仓库的管理人员才可以强制删除 **needs-issue** 标签。"
            org_comment_label_block_feedback: "### 关联 Issue 通知 \n @%s , 提交的PR需要关联issue，指导链接：https://forum.openubmc.cn/t/topic/208 \n如果已经关联了issue, 但是**needs-issue**标签仍然存在，你可以在评论 **`/check-issue`** 来移除它。"
            org_comment_state_mismatch_feedback: "### Issue状态不符合预期 \n PR关联的Issue状态不符合预期， 请检查关联的Issue并确保至少有一个在允许的状态中。允许的Issue状态: %s。"
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      community_robot_id: openUBMC-robot
      placeholder_linking_issue_notice_title: "### 关联 Issue 通知"
      placeholder_linking_pr_notice_title: "### 关联PR通知"
  - name: configmap-universal-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - openUBMC
          cla_label_yes: openUBMC-cla/yes
          cla_label_no: openUBMC-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/gitee_openubmc-1732941016829438030
          sign_url: https://clasign.osinfra.cn/sign/gitee_openubmc-1732941016829438030
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/gitee_openubmc-1732941016829438030/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/gitee_openubmc-1732941016829438030/individual
          faq_url: https://gitcode.com/openUBMC/infrastructure/blob/main/docs/robot/cla_faq.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            email_patch: "noreply@gitee.com"
            name: GitCode
      user_mark_format: "@"
      placeholder_committer: ""
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      community_robot_id: openUBMC-bot
      placeholder_cla_sign_guide_title: "### CLA 签署引导"
      placeholder_cla_sign_pass_title: "### CLA 签署成功"
      comment_command_trigger: "### CLA 签署指导手册  \n\n由于网络问题未能完成 CLA 检查，请通过评论 ***`/check-cla`*** 再次检查。"
      comment_pr_no_commits: "### CLA 签署指导手册  \n\n此 PR 的 commits 无效，请检查。"
      comment_some_need_sign: "### CLA 签署引导  \n\n %s , 感谢您的代码贡献。 \n\n以下 Commit(s) 没有签署 **<font color=green>_Contributor License Agreement (CLA)_</font>**。 \n\n%s \n\n如果您需要签署 CLA，[您可以点击此链接去签署 CLA ](%s)。  \n\n如果需要检查邮箱是否配置正确， [可以点击 **<font color=red>_FAQs_</font>** 去查看使用手册](%s) 。 \n\n在完成 CLA 签署或者更新完邮箱后, 需再次评论 ***`/check-cla`*** 来检查 CLA 的签署状态。"
      comment_update_label_failed: "### CLA 签署指导手册  \n\n添加 CLA 标签失败，请通过评论 ***`/check-cla`*** 再次检查。 :pray: "
      comment_all_signed: "### CLA 签署成功  \n %s, 感谢您的代码贡献。 所有的代码贡献者都已完成了 CLA 签署。 :+1: "
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "这包含一个无效的邮箱，请检查下！"
      cla_service_failed_message: "检查CLA是否签署失败！请再次评论下 `/check-cla` "
      comment_unsigned_title: "| Commit | 原因 |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "这条 Commit 的邮箱未签署 CLA ！请检查下邮箱是否正确配置。"
      message_individual_version_behind: "因为个人 CLA 的协议内容已更新，[请点击这里重新查看下协议内容并再次签署](https://clasign.osinfra.cn/sign-cla/gitee_openubmc-1732941016829438030/individual-update?email=%s)。"
      message_corporation_version_behind: "因为企业 CLA 的协议内容已更新，请联系 CLA 企业管理员进行处理。"
      cla_signature_type_corporation: "corporation" 
  - name: configmap-universal-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci_successful"
            - label_name: "wait_confirm"
            - label_name: "kind/wait_for_update"
            - label_name: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "approved"
              event_actions:
                - "pr close to trigger remove label"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
          manual_add_or_remove_pr_label_rules:
            - label_name: "lgtm"
              add_label_command: "/lgtm"
              remove_label_command: "/lgtm cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
              can_not_add_labels_by_self: true
            - label_name: "approved"
              add_label_command: "/approve"
              remove_label_command: "/approve cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
                - "branch keeper"
              user_sig_role_only: true
              can_not_add_labels_by_self: true
            - label_name: "needs-issue"
              remove_label_command: "/remove-needs-issue"
              verify_permission: "strict"
              user_id_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/squash"
              add_label_command: "/squash"
              remove_label_command: "/squash cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/rebase"
              add_label_command: "/rebase"
              remove_label_command: "/rebase cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
          manual_add_or_remove_issue_label_rules:
            - label_name: "GEO"
              add_label_command: "/geo"
              remove_label_command: "/geo cancel"
              verify_permission: "strict"
              user_id_list:
                - "sunshuang1866"
              user_id_only: true

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      community_robot_id: openUBMC-bot
      command_reg_exp_key_word: "kind|priority|sig|good"
      delayed_seconds: 2
      comment_remove_labels_when_pr_source_code_updated: "###注意:\n 当前PR代码已经发生变化(代码更新或者PR关闭)，所以移除以下标签: %s."
      comment_label_command_conflict: "### 标签指令手册 \n %s ， 不能使用评论同时添加和删除同一个标签，请检查、改正后再次评论。"
      comment_update_label_failed: "### 标签指令手册 \n %s ，更新标签 **_%s_** 失败，请稍后再次重试。"
      comment_add_not_exist_label: "### 标签指令手册 \n %s ，当前仓库或组织中没有 **_%s_** 标签，添加失败，请联系sig组管理员添加标签后再次重试。"
      comment_add_label_by_self: "### 注意: \n @%s , 您不能给自己检视代码, 请联系仓库 maintainers/committers."
      comment_add_label_successful: "### \n- 标签 **%s** 已被添加. 这意味着 **%s** 已经检查过代码了. :wave: \n ##### *Tips* \n- 如果PR还没有被合入, 请评论 **`/check-pr`** 进行检查. :smile: "
