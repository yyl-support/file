configmaps:
  - name: configmap-universal-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - openUBMC
            plugin_name:
              - robot-service-welcome
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-associate
              - robot-service-assign
              - robot-service-issue-workflow
      
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-issue-workflow
            endpoint: http://robot-universal-issue-workflow-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
