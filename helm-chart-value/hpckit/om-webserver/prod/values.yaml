#版本1.0.4
namespace: hpckit-omwebserver
serviceAccount:
  create: true
  name: hpckit-omwebserver
imagePullSecret: huawei-swr-instance-image-pull-secret
autoscale:
  enabled: false
  start: 30 8 * * *
  end: 55 23 * * *
deployments:
  - name: hpckit-omwebserver
    replicaCount: 2
    # labels:
    #   virtual-kubelet.io/burst-to-cci: enforce
    podLabels:
      app: hpckit-omwebserver
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1
      type: RollingUpdate
    podAnnotations:
      vault.hashicorp.com/agent-inject: "true"
      vault.hashicorp.com/agent-inject-perms-application.properties: "0400"
      vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
      vault.hashicorp.com/agent-inject-perms-tls.pfx: "0400"
      vault.hashicorp.com/agent-inject-secret-application.properties: internal/data/hpckit/omwebserver
      vault.hashicorp.com/agent-inject-secret-redis.crt: internal/data/hpckit/omwebserver
      vault.hashicorp.com/agent-inject-secret-tls.pfx: internal/data/hpckit/domain-tls
      vault.hashicorp.com/agent-inject-template-application.properties: "{{- with secret \"internal/data/hpckit/omwebserver\" -}}  \n{{ .Data.data.application }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/hpckit/omwebserver\" -}}  \n{{ .Data.data.redis }}\n{{- end }} \n"
      vault.hashicorp.com/agent-inject-template-tls.pfx: "{{- with secret \"internal/data/hpckit/domain-tls\" -}}  \n{{ base64Decode .Data.data.tlspfx }}\n{{- end }} \n"
      vault.hashicorp.com/agent-pre-populate-only: "true"
      vault.hashicorp.com/agent-run-as-group: "1001"
      vault.hashicorp.com/agent-run-as-user: "1001"
      vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
      vault.hashicorp.com/role: hpckit-omwebserver
      vault.hashicorp.com/secret-volume-path: /var/lib/om-webserver
      vault.hashicorp.com/tls-skip-verify: "true"
      vault.hashicorp.com/log-level: "warn"
    applicationPath: /var/lib/om-webserver/application.properties
    image:
      repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceways/om-webserver
      tag: "885eeb41-1"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "200m"
        memory: 500Mi
    heathCheckPath:
      path: /oneid/checkOmService
      port: 8080
      scheme: HTTPS
    containerPort: 8080
# ingress: {}
# 格式示例
ingress:
  - name: hpckit-omwebserver
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    host: id.hpckit.osinfra.cn
    serviceName: om-webserver-service
    servicePort: 8080
    path: /oneid
    pathType: Prefix
    secretName: domain-tls
services:
  - name: om-webserver-service
    type: ClusterIP
    port: 8080
    portName: srv
    targetPort: 8080
    podLabels:
      app: hpckit-omwebserver
# secrets: {}
# 格式示例
secrets:
  - name: domain-tls
    path: secrets/data/hpckit/hpckit-osinfra-cn-tls
    certKey: server.cert
    keyKey: server.key
istio:
  enabled: false
  nslabel: {}
