# Default values for global.
serviceAccount:
  name: openjiuwen-robot
  annotations: {}

global:
  deployment:
    initContainers:
      initOpeneuler:
        - command:
            - /bin/bash
            - -c
            - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets;
              ls -ld /vault/secrets
          image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
          imagePullPolicy: IfNotPresent
          name: init-openeuler
          resources: {}
  specKeysMap:
    ca.crt:
      key: tls.cert
      path: secrets/data/infra-test/domain-tls
    tls.crt:
      key: tls.cert
      path: secrets/data/infra-test/domain-tls
    tls.key:
      key: tls.key
      path: secrets/data/infra-test/domain-tls
  secret:
    name: test-osinfra-cn-tls
  service:
    ports:
      - name: http-port
        port: 8888
        protocol: TCP
        targetPort: 8888
    type: ClusterIP
