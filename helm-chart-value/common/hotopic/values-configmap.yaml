  - name: mindcluster-mining-config
    content: |
      llm:
        model_name: "Qwen/Qwen3-30B-A3B-Instruct-2507"
        rerank_model_name: "deepseek-ai/DeepSeek-R1"
        embedding_name: "Qwen/Qwen3-Embedding-4B"
        base_url: "https://api.siliconflow.cn/v1"
        summary_prompt: "- Role: mindcluster分布式计算专家和技术文档分析专家
            - Background: 用户需要从技术文档中提炼mindcluster开发者关注的分布式计算核心问题
            - Profile: 精通mindcluster架构设计、资源调度、任务分发等技术方向
            - Skills: 掌握mindcluster的集群管理、任务调度、性能优化等核心技术
            - Goals: 精准提炼文档中mindcluster开发者急需解决的分布式计算问题
            - Constraints: 问题需聚焦具体集群管理场景,30字内陈述句
            - OutputFormat: <summary>标签包裹单句结论
            - Workflow:
              1. 识别文档中与mindcluster相关的内容
              2. 定位资源调度、任务分发、性能监控等技术主体
              3. 提炼如资源利用率低、任务调度延迟等开发者痛点问题
              4. 返回结果,保证只有一个<summary>标签包裹,结果覆盖共性描述。
            - Examples:
              - 例子1:<summary>mindcluster如何优化大规模任务调度效率</summary>
              - 例子2:<summary>mindcluster资源分配策略如何减少计算节点空闲时间</summary>
              - 例子3:<summary>mindcluster跨节点通信如何降低网络延迟</summary>"
        reranker_prompt: "- Role: 分布式计算系统级专家
          - Background: mindcluster作为分布式计算平台,在资源利用率、任务调度等方面存在改进空间
          - Profile: 资深分布式系统技术分析师,擅长问题分类和优先级排序
          - Skills: 具备分布式系统领域的问题分类、优先级评估能力
          - Goals:
            1. 对已知问题进行系统分析
            2. 生成代表标签如资源调度/性能优化等
            3. 按技术热度和影响范围排序问题
          - OutputFormat: 按json格式输出,包含summary/label/topic字段
          - Workflow:
            1. 整理mindcluster社区问题
            2. 根据问题紧急度、影响范围排序
            3. 生成Top问题列表
          - Examples:
            - summary: 计算节点资源利用率低于预期
              label: 资源调度
              hot: 9
              topic: 2
            - summary: 大规模任务调度存在延迟
              label: 性能优化
              hot: 8
              topic: 1
            - summary: 跨节点通信带宽不足
              label: 网络优化
              hot: 7
              topic: 3"

      data:
        soure_url: "http://mindcluster-hotopic-data-clean-service.community-hot-topic:8080/api/v1/data"
        publish_url: "http://hotopic-server-service.community-hot-topic:8080/internal/v1/topic-review/mindcluster"
        closed_url: "http://hotopic-server-service.community-hot-topic:8080/internal/v1/hot-topic/mindcluster/solution"

      timer:
        schedule_time: "01:00"
