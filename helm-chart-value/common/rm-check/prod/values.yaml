serviceAccount:
  create: true
  name: rm-check
  automount: false
imagePullSecrets:
  - name: huawei-swr-image-pull-secret
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
cronjob:
  suspend: false
  schedule: '0 0 * * 6'
  concurrencyPolicy: Forbid
  annotations:
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/log-level: "warn"
    vault.hashicorp.com/role: 'rm-check'
    vault.hashicorp.com/agent-run-as-user: "1001"
    vault.hashicorp.com/agent-run-as-group: "1001"
    vault.hashicorp.com/agent-inject-perms-config.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config.yaml: 'internal/data/infra-common/rm-check'
    vault.hashicorp.com/agent-inject-template-config.yaml: "{{- with secret \"internal/data/infra-common/rm-check\" -}}  \n{{ .Data.data.cronjob }}\n{{- end }}\n"
  restartPolicy: Never
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1001
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/rm-check
    tag: "main-c99143"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 2Gi
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
