# Default values for cvesa-test.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
replicaCountCronjob: 1
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
namespace: cvesa-test
image:
  repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/cve-sa-backend/cvesa-test
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "riscv_0608_dev-c2a831"
imagePullSecrets:
  - name: huawei-swr-image-pull-secret
nameOverride: "cvesa-test"
fullnameOverride: "cvesa-test"
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "cve-manager-ng"
  automount: false
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
service:
  type: ClusterIP
  ports:
    name: http
    protocol: TCP
    port: 80
    targetPort: 8080
ingress:
  enabled: true
  className: "nginx"
  annotations: {kubernetes.io/ingress.class: nginx}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: cvesa.test.osinfra.cn
      paths:
        - path: /
          port: 80
  tls:
    - secretName: cvesa-test-tls
      hosts:
        - cvesa.test.osinfra.cn
resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 2000m
    memory: 2000Mi
  requests:
    cpu: 2000m
    memory: 2000Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 8080
  timeoutSeconds: 5
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 8080
  timeoutSeconds: 5
env:
  secrets:
    - name: DB_USER
      key: db_user
    - name: DB_PWD
      key: db_password
    - name: AK
      key: ak_value
    - name: SK
      key: sk_value
    - name: UPLOAD_USERNAME
      key: upload_username
    - name: UPLOAD_PASSWORD
      key: upload_password
  const:
    - name: DB_URL
      value: 10.0.0.187
istio:
  enabled: true
  nslabel:
    istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  vs:
    name: cvesa-test-virtualservice
    host: cvesa.test.osinfra.cn
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host: cvesa-test-service.cvesa-test.svc.cluster.local
              port:
                number: 80
  tlsMode: DISABLE
  mtlsMode: DISABLE
  dr:
    - name: destinationrule-cvesa-test
      serviceName: cvesa-test-service
      port: 80
  pa:
    - name: peerauthentication-cvesa-test-disable-mtls
      podLabels:
        app.kubernetes.io/instance: cvesa
        app.kubernetes.io/name: cvesa-test
