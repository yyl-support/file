  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - boostkit/tensorflow
            - boostkit/boostsra
            - boostkit/tensorflow-serving
            - boostkit/kdnn
            - boostkit/kvecturbo
            - boostkit/knewpfordelta
            - boostkit/faiss
            - boostkit/hnswlib
            - boostkit/vllm_router
            - boostkit/cmf
            - boostkit/KAE
            - boostkit/vllm-ops
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci_successful"
            - label_name: "ci-pipeline-passed"
            - label_name: "SC-SUCC"
            - label_name: "doc-sig-reviewed"
            - label_name: "kind/wait_for_update"
            - label_name: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_prefix: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "approved"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "need-doc-sig-review"
              pr_change_paths:
                - "docs"
                - "README.md"
                - "README_en.md"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "need-doc-sig-review"
              pr_change_paths:
                - "docs"
                - "README.md"
                - "README_en.md"
          manual_add_or_remove_pr_label_rules:
            - label_name: "lgtm"
              add_label_command: "/lgtm"
              remove_label_command: "/lgtm cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
              can_not_add_labels_by_self: true
            - label_name: "approved"
              add_label_command: "/approve"
              remove_label_command: "/approve cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
                - "branch keeper"
              user_sig_role_only: true
              can_not_add_labels_by_self: true
            - label_name: "needs-issue"
              remove_label_command: "/remove-needs-issue"
              verify_permission: "strict"
              user_id_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/squash"
              add_label_command: "/squash"
              remove_label_command: "/squash cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/rebase"
              add_label_command: "/rebase"
              remove_label_command: "/rebase cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
