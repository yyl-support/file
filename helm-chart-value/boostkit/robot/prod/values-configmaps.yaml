configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - boostkit
            plugin_name:
              - robot-service-welcome
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.boostkit-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - boostkit
          enable_issue_assign: true
          default_assignee: ""
      community_robot_id: BoostKIT-bot
      msg_multiple_assignee: "### Notice \nCan only assign one assignee to the issue."
      msg_assign_repeatedly: "### Notice \nThis issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "### Notice \nThis issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "### Notice \n***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "### Notice \nThis issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - boostkit
          cla_label_yes: boostkit-cla/yes
          cla_label_no: boostkit-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/68a817711c58932379902043
          sign_url: https://clasign.osinfra.cn/sign/68a817711c58932379902043
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/68a817711c58932379902043/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/68a817711c58932379902043/individual
          faq_url: https://gitcode.com/BoostKit/community/blob/master/docs/contributor/infra-faqs.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            email_patch: "noreply@gitee.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: boostkit
      community_robot_id: BoostKIT-bot
      placeholder_cla_sign_guide_title: "### CLA 签署引导"
      placeholder_cla_sign_pass_title: "### CLA 签署成功"
      comment_command_trigger: "### CLA 签署指导手册  \n\n由于网络问题未能完成 CLA 检查，请通过评论 ***`/check-cla`*** 再次检查。"
      comment_pr_no_commits: "### CLA 签署指导手册  \n\n此 PR 的 commits 无效，请检查。"
      comment_some_need_sign: "### CLA 签署引导  \n\n %s , 感谢您的代码贡献。 \n\n以下 Commit(s) 没有签署 **<font color=green>_Contributor License Agreement (CLA)_</font>**。 \n\n%s \n\n如果您需要签署 CLA，[您可以点击此链接去签署 CLA ](%s)。  \n\n如果需要检查邮箱是否配置正确， [可以点击 **<font color=red>_FAQs_</font>** 去查看使用手册](%s) 。 \n\n在完成 CLA 签署或者更新完邮箱后, 需再次评论 ***`/check-cla`*** 来检查 CLA 的签署状态。"
      comment_update_label_failed: "### CLA 签署指导手册  \n\n添加 CLA 标签失败，请通过评论 ***`/check-cla`*** 再次检查。 :pray: "
      comment_all_signed: "### CLA 签署成功  \n %s, 感谢您的代码贡献。 所有的代码贡献者都已完成了 CLA 签署。 :+1: "
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "这包含一个无效的邮箱，请检查下！"
      cla_service_failed_message: "检查CLA是否签署失败！请再次评论下 `/check-cla` "
      comment_unsigned_title: "| Commit | 原因 |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "这条 Commit 的邮箱未签署 CLA ！请检查下邮箱是否正确配置。"
      message_individual_version_behind: "因为个人 CLA 的协议内容已更新，[请点击这里重新查看下协议内容并再次签署](https://clasign.osinfra.cn/sign-cla/68a817711c58932379902043/individual-update?email=%s)。"
      message_corporation_version_behind: "因为企业 CLA 的协议内容已更新，请联系 CLA 企业管理员进行处理。"
      cla_signature_type_corporation: "corporation"
