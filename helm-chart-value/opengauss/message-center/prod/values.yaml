namespace: message-center
serviceAccount:
  name: message-center
securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
imagePullSecrets:
  name: huawei-swr-image-pull-secret
collectDeployment:
  enabled: true
  name: collect-deployment
  replicaCount: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  podAnnotations:
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/role: 'message-center'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-conf.yaml: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.collectConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-meeting_conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-meeting_conf.yaml: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-meeting_conf.yaml: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.collectMeetingConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-kafka.crt: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-kafka.crt: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.kafkaCrt }}
      {{- end }}
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --meeting-config-file=/vault/secrets/meeting_conf.yaml
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/message-center/message-collect-prod
    tag: release-opengauss-d9f0d0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 500Mi
