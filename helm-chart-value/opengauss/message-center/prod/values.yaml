collectGithookDeployment:
  enabled: true
  name: collect-githook-deployment
  replicaCount: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  podAnnotations:
    vault.hashicorp.com/log-level: "warn"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/role: 'message-center'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-conf.yaml: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.collectConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-kafka.crt: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-kafka.crt: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.kafkaCrt }}
      {{- end }}
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --handle-path=gitcode-hook
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/message-center/message-collect-githook-prod
    tag: release-opengauss-ca9a70
    pullPolicy: IfNotPresent
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 500Mi
collectGithookService:
  enabled: true
  name: collect-githook-service
  app: collect-githook-deployment
  port: 8080
  portName: http-port
  targetPort: 8080
  type: ClusterIP
managerDeployment:
  enabled: true
  name: manager-deployment
  app: manager
  replicaCount: 3
  strategy:
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
    type: RollingUpdate
  podAnnotations:
    vault.hashicorp.com/log-level: "warn"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/role: 'message-center'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-conf.yaml: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.managerConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-secret-server.key: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-server.key: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.serverkey }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-server.crt: 'internal/data/opengauss/message-center'
    vault.hashicorp.com/agent-inject-template-server.crt: |
      {{- with secret "internal/data/opengauss/message-center" -}}
      {{ .Data.data.servercrt }}
      {{- end }}
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/message-center/message-manager-prod
    tag: release-opengauss-d779c5
    pullPolicy: IfNotPresent
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --server-key=/vault/secrets/server.key
    - --server-cert=/vault/secrets/server.crt
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /message_center/health
      port: 8082
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /message_center/health
      port: 8082
    timeoutSeconds: 5
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 500Mi
