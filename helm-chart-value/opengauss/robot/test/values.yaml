# chartVersion: v2.0.5
namespace:
  enabled: false
  name: opengauss-backend-robot
serviceAccount:
  create: true
  name: opengauss-backend-robot
# deploymentLabels:
#   virtual-kubelet.io/burst-to-cci: enforce
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
podAnnotations:
  # traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0 # 开启istio时添加该行
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/role: opengauss-backend-robot
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  tlsMode: DISABLE
  mtlsMode: DISABLE
  vs:
    name: opengauss-robot-virtualservice
    host: ""
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host: robot-universal-hook-delivery-service.opengauss-robot.svc.cluster.local
              port:
                number: 8888
  dr:
    - name: destinationrule-opengauss-robot
      serviceName: robot-universal-hook-delivery-service
      port: 8888
  pa:
    - name: peerauthentication-opengauss-robot-disable-mtls
      podLabels:
        app: robot-universal-hook-delivery
ingress:
  host: "hook-delivery-opengauss.test.osinfra.cn"
  backends:
    - name: robot-universal-hook-delivery
      port: 8888
      path: /gitcode-hook
      pathType: Prefix
secret:
  enabled: true
  name: "domain-tls"
  path: "secrets/data/infra-test/domain-tls"
  crtKey: "tls.cert"
  keyKey: "tls.key"
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets; ls -ld /vault/secrets
    image: 'swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3'
    imagePullPolicy: IfNotPresent
    name: init-openeuler
readinessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
livenessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
deployments:
  - name: robot-universal-hook-delivery
    replicas: 1
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    labels:
      app: robot-universal-hook-delivery
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-gitcode-secret: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/opengauss-backend-robot
      vault.hashicorp.com/agent-inject-secret-gitcode-secret: internal/data/infra-test/opengauss-backend-robot
      vault.hashicorp.com/agent-inject-template-config: "{{- with secret \"internal/data/infra-test/opengauss-backend-robot\" -}}  \n{{ .Data.data.deliveryConfig }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-gitcode-secret: "{{- with secret \"internal/data/infra-test/opengauss-backend-robot\" -}}  \n{{ .Data.data.deliverySecrets }}\n{{- end }}\n"
    args:
      - --port=8888
      - --hmac-secret-file=/vault/secrets/gitcode-secret
      - --config-file=/vault/secrets/config
      - --handle-path=gitcode-hook
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/robot-universal-hook-delivery
      tag: "develop-lts-a0c6fb"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
    volumeMounts: []
    # - mountPath: /app/conf/

    #   name: app-config

    #   readOnly: true
    volumes: []
    # - name: app-config

    #   configMap:

    #     name: 
    vaultVolume: create
    service:
      portName: http-port
      port: 8888
      targetPort: 8888
      type: ClusterIP
