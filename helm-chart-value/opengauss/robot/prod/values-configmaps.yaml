  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengauss
          close_issue_checklist:
            comment_command_lines:
              - "/close"
            allow_workflow_list:
              - "任务/待办的,进行中,已确定,待办,已答复/已完成"
              - "咨询/已确定,已答复,待办的,进行中/已完成"
              - "缺陷/已完成,已确认,已答复,待回归,待办的/已验收"
              - "需求/已完成,已确认,待办的,挂起,设计中,已验收,方案设计,需求分析,需求认领,需求评议,需求接纳/资料验收"
          close_pr_checklist:
            comment_command_lines:
              - "/close"

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: opengauss
      community_robot_id: opengauss_bot
      event_state_opened: opened
      issue_action_reopen: reopen
      event_state_closed: closed
      issue_action_close: close
      comment_no_permission_close_issue: "### Notice \n@%s , you can't close an issue unless you are the author of it or a collaborator."
      comment_no_permission_reopen_issue: "### Notice \n@%s , you can't reopen an issue unless you are the author of it or a collaborator."
      comment_list_linking_pull_requests_failure: "### Notice \n@%s  fail to check link pull requests of the issue, please retry."
      comment_no_permission_close_pr: "### Notice \n@%s , you can't close a pull request unless you are the author of it or a collaborator."
      comment_issue_has_open_pr: "### Notice \n@%s , this issue is linked to an open PR. Please merge the PR before closing this issue."
      comment_not_close_issue: "### Notice \n@%s , this issue is currently under CVE service control and cannot be closed directly. Please comment **/check-issue**."
