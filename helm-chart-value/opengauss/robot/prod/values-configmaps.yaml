configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - opengauss
            plugin_name:
              - robot-service-cla
              - robot-service-welcome
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
              - robot-service-associate
              - message-center-prod
      
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.opengauss-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Merge Request Hook"
              - "Note Hook"
          - name: message-center-prod
            endpoint: https://message-manager.opengauss.org/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
              - "Note Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
      - repos:
        - opengauss
        enable_issue_assign: true
        default_assignee: TestManager

      community_robot_id: opengauss_bot

      msg_multiple_assignee: "Can only assign one assignee to the issue."
      msg_assign_repeatedly: "This issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "This issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "This issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-associate
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengauss/openGauss-workbench
            - opengauss/openGauss-OM
            - opengauss/openGauss-connector-jdbc
            - opengauss/CM
            - opengauss/Plugin
            - opengauss/CBB
            - opengauss/DSS
            - opengauss/DCF
            - opengauss/openGauss-embedded
            - opengauss/docs
            - opengauss/DMS
            - opengauss/openGauss-connector-odbc
            - opengauss/openGauss-tools-sql-translator
            - opengauss/QA
            - opengauss/Yat
            - opengauss/cantian
            - opengauss/openGauss-third_party
            - opengauss/openGauss-connector-python-pyog
            - opengauss/openGauss-connector-go-pq
            - opengauss/CM-RestAPI
            - opengauss/compatibility-assessment
            - opengauss/ora-migration-tool
            - opengauss/openGauss-container
            - opengauss/openGauss-DBMind
            - opengauss/openGauss-connector-python-psycopg2
            - opengauss/DCC
            - opengauss/openGauss-tools-datachecker-performance
            - opengauss/debezium
            - opengauss/openGauss-migration-portal
            - opengauss/openGauss-tools-chameleon
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "opengauss"
            org_label: needs-issue
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly members of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
      
        - repos:
            - opengauss/openGauss-server
          enable_check_associate_pr: true
          associate_pr_rules:
            repo:
              - "docs"
            repo_label: need-doc-pr
            repo_comment_command_check_label: /check-doc
            repo_comment_command_remove_label: /remove-need-doc
            repo_remove_label_permission: false
            repo_comment_label_block_feedback: "### Linking PR Notice \n @%s , the pull request should be linked to at least one https://gitcode.com/opengauss/docs repository's PR. \nIf it is confirmed that no PR association is needed, you can remove the label by commenting **`/remove-need-doc`** ."
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "opengauss"
            org_label: needs-issue
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly members of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
      
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: opengauss
      community_robot_id: opengauss_bot
      placeholder_linking_issue_notice_title: "### Linking Issue Notice"
      placeholder_linking_pr_notice_title: "### Linking PR Notice"
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - opengauss
          cla_label_yes: opengauss-cla/yes
          cla_label_no: opengauss-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/690dba44479f483c74c264fd
          sign_url: https://clasign.osinfra.cn/sign/690dba44479f483c74c264fd
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/690dba44479f483c74c264fd/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/690dba44479f483c74c264fd/individual
          faq_url: https://gitcode.com/opengauss/community/blob/master/cla/faq/check-by-author/faq.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            email_patch: "noreply@gitee.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "### CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "### CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "### CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) are not associated with a signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nTo sign CLA, [**<ins>click here</ins>**](%s). \n\nTo check if your email is configured correctly, refer to the [**<font color=red><ins>_FAQs_</ins></font>**](%s). \n\nOnce you've signed the CLA or updating your email, please comment **`/check-cla`** to revalidate CLA status."
      comment_update_label_failed: "### CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "### CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: opengauss
      community_robot_id: opengauss_bot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "the email used in the commit is an invalid email! <br>please check all commits."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email used in the commit is not linked to a signed CLA! <br>please verify that it matches the email you used when signing the CLA."
      message_individual_version_behind: "the individual CLA content has been updated. <br>[Please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/690dba44479f483c74c264fd/individual-update?email=%s)."
      message_corporation_version_behind: "the corporation CLA content has been updated. <br>Please contact your corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"
  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:

        - repos:
            - opengauss/infra
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci_successful"
            - label_name: "ci-pipeline-passed"
            - label_name: opengauss-cla/yes
            - label_name: ci-pipeline-success
            - label_name: codecheck-success
            - label_name: sca-success
            - label_name: dual-install-success
            - label_name: lite-ci-success
            - label_name: sig-check-successful
            - label_name: "SC-SUCC"
            - label_name: "kind/wait_for_update"
            - label_name: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_prefix: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "approved"
              event_actions:
                - "pr close to trigger remove label"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
          manual_add_or_remove_pr_label_rules:
            - label_name: "lgtm"
              add_label_command: "/lgtm"
              remove_label_command: "/lgtm cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "approved"
              add_label_command: "/approve"
              remove_label_command: "/approve cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
                - "branch keeper"
              user_sig_role_only: true
            - label_name: "needs-issue"
              remove_label_command: "/remove-needs-issue"
              verify_permission: "strict"
              user_id_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/squash"
              add_label_command: "/squash"
              remove_label_command: "/squash cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/rebase"
              add_label_command: "/rebase"
              remove_label_command: "/rebase cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true

        - repos:
            - opengauss
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci_successful"
            - label_name: "ci-pipeline-passed"
            - label_name: "SC-SUCC"
            - label_name: ci-pipeline-success
            - label_name: codecheck-success
            - label_name: sca-success
