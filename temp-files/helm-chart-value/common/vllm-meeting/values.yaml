#chartVersion: 1.0.10
namespace:
  enabled: true
  name: vllm-meeting
serviceAccount:
  create: true
  name: vllm-meeting
strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate
image:
