cronjobCommon:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsUser: 1000
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/config.yaml
    - name: VAULT_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
cronjobs:
  - enabled: true
    name: scan-upload-meetings
    labels:
      app: scan-upload-meetings
    concurrencyPolicy: Forbid
    schedule: "0 0 * * *"
    suspend: false
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config.yaml: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config.yaml: internal/data/vllm/meeting
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/vllm/meeting
      vault.hashicorp.com/agent-inject-template-config.yaml: |
        {{- with secret "internal/data/vllm/meeting" -}}
        {{ .Data.data.scanConfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/vllm/meeting" -}}
        {{ .Data.data.scanSecrets }}
        {{- end }}
    command:
      - /bin/bash
      - -c
      - |
        python manage.py scan_upload_meetings
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/meeting/meeting-platform
      tag: "main-41e89d"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "12"
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 500Mi
