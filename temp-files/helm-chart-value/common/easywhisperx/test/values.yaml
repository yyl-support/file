# Default values for easywisperx.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# chartVersion: 1.0.0
replicaCount: 1
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
namespace: easywhisperx
image:
  repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceways/easywhisperx-server
  # repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/easywhisperx-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "test_huaweicloud-bd9af6"
imagePullSecrets:
  - name: huawei-swr-instance-image-pull-secret
nameOverride: "easywhisperx"
fullnameOverride: "easywhisperx"
# deploymentLabels:
#   virtual-kubelet.io/burst-to-cci: enforce
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "easywhisperx"
podAnnotations:
  vault.hashicorp.com/agent-inject: 'true'
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/role: 'easywhisperx'
  vault.hashicorp.com/agent-inject-perms-config.ini: "0400"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-inject-secret-config.ini: 'internal/data/infra-test/easywhisperx'
  vault.hashicorp.com/agent-inject-template-config.ini: "{{- with secret \"internal/data/infra-test/easywhisperx\" -}}  \n{{ .Data.data.config }}\n{{- end }}\n"
  vault.hashicorp.com/secret-volume-path: "/app/easywhisperx/config"
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  name: easywisperx
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: easywhisperx.test.osinfra.cn
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: easywhisperx-tls
      hosts:
        - easywhisperx.test.osinfra.cn
secret:
  enabled: true
  name: easywhisperx-tls
  path: secrets/data/infra-test/domain-tls
  keysMap:
    ca.crt: tls.cert
    tls.crt: tls.cert
    tls.key: tls.key
resources:
  requests:
    cpu: 50m
    memory: 128Mi
    # volcano.sh/gpu-mem.128Mi: 240
autoscale:
  enabled: true
  start: "30 8 * * *"
  end: "55 23 * * *"
nodeSelector: {}
tolerations: []
affinity: {}
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 8000
  timeoutSeconds: 5
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 8000
  timeoutSeconds: 5
pvc:
  enabled: true
  name: easywhisperx-data-pvc
  accessModes: ReadWriteMany
  storage: 1Gi
  storageClassName: sfsturbo-subpath-sc
  volumeMode: Filesystem
volumeMounts:
  - name: data
    mountPath: /home/appuser/.cache/huggingface/hub
    subPath: whisperhub
  - name: data
    mountPath: /home/appuser/.cache/torch
    subPath: torch
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
  - name: data
    persistentVolumeClaim:
      claimName: easywhisperx-data-pvc
