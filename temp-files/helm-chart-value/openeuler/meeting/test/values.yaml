meetingCenter:
  enabled: false
  name: meeting-center
  replicas: 1
  podLabels:
    app: meeting-center
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  service:
    type: ClusterIP
    annotations: {}
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.centerConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.centerSecrets }}
      {{- end }}
meetingPlatform:
  enabled: true
  name: meeting-platform
  replicas: 1
  # deploymentLabels:
  #   virtual-kubelet.io/burst-to-cci: enforce
  podLabels:
    app: meeting-platform
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  service:
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
    type: ClusterIP
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-secret-kafka.crt: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.platformConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-kafka.crt: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.kafkacrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.platformSecrets }}
      {{- end }}
meetingServer:
  enabled: true
  name: meeting-server
  replicas: 1
  # deploymentLabels:
  #   virtual-kubelet.io/burst-to-cci: enforce
  podLabels:
    app: meeting-server
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/config
    - name: VAULT_PATH
      value: /vault/secrets/secrets.yaml
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  service:
    name: meeting-server
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
    type: ClusterIP
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openeuler-meetingserver-v2
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.centerConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
      {{ .Data.data.centerSecrets }}
      {{- end }}
secret:
  enabled: true
  name: meeting-server-tls
  specKeysMap:
    ca.crt:
      path: secrets/data/infra-test/domain-tls
      key: tls.cert
    tls.crt:
      path: secrets/data/infra-test/domain-tls
      key: tls.cert
    tls.key:
      path: secrets/data/infra-test/domain-tls
      key: tls.key
cronjobCommon:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsUser: 1000
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/config
    - name: VAULT_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
cronjobs:
  - enabled: true
    name: updating-sigs
    labels:
      app: updating-sigs
    concurrencyPolicy: Forbid
    schedule: "0 * * * *"
    suspend: true
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openeuler-meetingserver-v2
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openeuler-meetingserver-v2
      vault.hashicorp.com/agent-inject-template-config: |
        {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
        {{ .Data.data.centerConfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/infra-test/openeuler-meetingserver-v2" -}}
        {{ .Data.data.centerSecrets }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python manage.py sync_sig
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/meeting/meeting-center
      tag: "auth_fix-dbcce4"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
