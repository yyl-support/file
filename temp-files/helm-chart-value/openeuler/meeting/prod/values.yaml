      tag: "dev_openeuler_text-0ce25c"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
  - enabled: false
    name: check-privacy-policy-cronjob
    labels:
      app: check-privacy-policy
    concurrencyPolicy: Forbid
    schedule: "*/10 * * * *"
    suspend: false
    restartPolicy: Never
