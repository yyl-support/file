meetingServer:
  enabled: true
  name: meetingserver-deployment
  replicas: 2
  podLabels:
    app: meetingserver
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
    - name: KAFKA_CRT_PATH
      value: /vault/secrets/kafka.crt
  resources:
    limits:
      cpu: "1"
      memory: 1000Mi
    requests:
      cpu: "1"
      memory: 1000Mi
  service:
    name: meeting-service
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
    type: ClusterIP
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/mindspore/openeuler-meeting
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/mindspore/openeuler-meeting" -}}
      {{ .Data.data.config }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-kafka.crt: 'internal/data/mindspore/openeuler-meeting'
    vault.hashicorp.com/agent-inject-template-kafka.crt: "{{- with secret \"internal/data/mindspore/openeuler-meeting\" -}}  \n{{ .Data.data.kafkaCA }}\n{{- end }}\n"
secret:
  enabled: true
  name: meetingserver-tls
  specKeysMap:
    ca.crt:
      path: secrets/data/openeuler/openeuler-openatom-cn-tls
      key: server.crt
    tls.crt:
      path: secrets/data/openeuler/openeuler-openatom-cn-tls
      key: server.crt
    tls.key:
      path: secrets/data/openeuler/openeuler-openatom-cn-tls
      key: server.key
cronjobCommon:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsUser: 1000
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
cronjobs:
  - enabled: false
    name: updating-openeuler-sigs
    labels:
      app: updating-openeuler-sigs
    concurrencyPolicy: Forbid
    schedule: "0 * * * *"
    suspend: false
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/mindspore/openeuler-meeting
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/mindspore/openeuler-meeting" -}}
        {{ .Data.data.config }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python manage.py genegroup
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler/app-meeting-server
      tag: "dev_openeuler_text-0ce25c"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
  - enabled: false
    name: upload-meeting-video
    labels:
      app: upload-meeting-video
    concurrencyPolicy: Forbid
    schedule: "0 * * * *"
    suspend: false
    restartPolicy: OnFailure
