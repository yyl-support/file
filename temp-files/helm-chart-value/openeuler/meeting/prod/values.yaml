#chartVersion: 1.0.11
namespace:
  enabled: false
  name: openeuler-meetingserver
serviceAccount:
  create: true
  name: openeuler-meeting
strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate
image:
  center:
    repository: ""
    tag: ""
    imagePullPolicy: IfNotPresent
  platform:
    repository: ""
    tag: "fix_mindspore-eaa947"
    imagePullPolicy: IfNotPresent
  server:
    repository: "swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler/app-meeting-server"
    tag: "dev_openeuler_text-0ce25c"
    imagePullPolicy: IfNotPresent
initContainer:
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler
    tag: "22.03-lts-sp3"
podAnnotations:
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/role: openeuler-meeting
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
  vault.hashicorp.com/agent-inject-perms-ca.pem: "0400"
  vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
  vault.hashicorp.com/agent-inject-perms-server.key: "0400"
  vault.hashicorp.com/agent-inject-secret-ca.pem: internal/data/mindspore/openeuler-meeting
  vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/mindspore/openeuler-meeting
  vault.hashicorp.com/agent-inject-secret-server.key: internal/data/mindspore/openeuler-meeting
  vault.hashicorp.com/agent-inject-template-ca.pem: |
    {{- with secret "internal/data/mindspore/openeuler-meeting" -}}
    {{ .Data.data.MysqlCA }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.crt: |
    {{- with secret "internal/data/mindspore/openeuler-meeting" -}}
    {{ .Data.data.servercrt }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.key: |
    {{- with secret "internal/data/mindspore/openeuler-meeting" -}}
    {{ .Data.data.serverkey }}
    {{- end }}
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
ingress:
  enabled: true
  name: meetingserver-ingress
  host: "meetings.openeuler.openatom.cn"
  serviceName: meeting-service
  serviceNumber: 8080
# 后端使用ingress路径转发时启用ingressNew
ingressNew:
  enabled: false
  name: ""
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  host: ""
  path: /meetings(/|$)(.*)
  pathType: ImplementationSpecific
  secretName: api-mindspore-tls
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: "istio-system/istio-gateway-https"
