configmaps:
  - name: configmap-universal-access
    filename: config.yaml
    content: |-
      access:   
        repo_plugins:
          - org_or_repo:
              - openeuler
              - src-openeuler
              - openeuler-risc-v
      
            plugin_name:
              - robot-service-cla
              - robot-service-welcome
              - robot-service-label
              - robot-service-lifecycle
              - robot-service-assign
              - robot-service-associate
              - robot-service-review
              - robot-service-repo-watcher
              - robot-universal-agreements
              - quick-issue-githook
              - sync-bot
              - message-center
              - message-center-prod
              - robot-pr-message
              - robot-pr-review
      
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: message-center
            endpoint: https://message-center.test.osinfra.cn/collect/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
              - "Note Hook"
          - name: message-center-prod
            endpoint: https://message-center.openeuler.org/collect/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-repo-watcher
            endpoint: http://robot-universal-repo-watcher-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-universal-agreements
            endpoint: http://robot-universal-agreements-service.robot-openeuler.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
          - name: sync-bot
            endpoint: http://sync-bot-service.robot-openeuler.svc.cluster.local:8888/hooks
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
          - name: quick-issue-githook
            endpoint: https://ipb.osinfra.cn/hooks
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
          - name: robot-pr-message
            endpoint: https://prmessage.test.osinfra.cn/hook/analyze
            events:
              - "Note Hook"
              - "Merge Request Hook"
          - name: robot-pr-review
            endpoint: https://pr-review.test.osinfra.cn/hook/analyze
            events:
              - "Note Hook"
              - "Merge Request Hook"

  - name: configmap-universal-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openeuler
            - src-openeuler
            - openeuler-risc-v
          enable_issue_assign: true
      
      community_robot_id: openeuler-ci-robot
      msg_multiple_assignee: "### Notice \nCan only assign one assignee to the issue."
      msg_assign_repeatedly: "### Notice \nThis issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "### Notice \nThis issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "### Notice \n***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "### Notification \nThis issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-universal-associate
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openeuler/umdk
            - openeuler/Gluten
            - openeuler/OmniOperator
            - openeuler/OmniAdaptor
            - openeuler/OmniStream
            - openeuler/OmniStateStore
            - openeuler/kernel
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - openeuler
              - src-openeuler
            org_label: needs-issue
            org_issue_state_limit: true
            org_issue_limit_state: open
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly maintainer/committer of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
      
        - repos:
            - openeuler
            - src-openeuler
          enable_check_associate_issue: false
          associate_issue_rules:
            org:
              - "openeuler"
              - "src-openeuler"
            org_label: needs-issue
            org_issue_state_limit: true
            org_issue_limit_state: open
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly members of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openeuler
      community_robot_id: openeuler-ci-robot
      placeholder_linking_issue_notice_title: "### Linking Issue Notice"
      placeholder_linking_pr_notice_title: "### Linking PR Notice"
  - name: configmap-universal-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - openeuler
          - src-openeuler
          - openeuler-risc-v
          cla_label_yes: openeuler-cla/yes
          cla_label_no: openeuler-cla/no
          check_url: "https://clasign.osinfra.cn/api/v1/individual-signing/6983225bdcbb19710248ccf0"
          sign_url: "https://clasign.osinfra.cn/sign/6983225bdcbb19710248ccf0"
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/6983225bdcbb19710248ccf0/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/6983225bdcbb19710248ccf0/individual
          faq_url: "https://atomgit.com/openeuler/infrastructure/blob/master/docs/cla-guide/faq/faq.md"
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            email_patch: "noreply@gitee.com"
            name: GitCode
      user_mark_format: "@"
      placeholder_committer: ""
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openeuler
      community_robot_id: openeuler-ci-robot
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "### CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "### CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "### CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) are not associated with a signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nTo sign CLA, [**<ins>click here</ins>**](%s). \n\nTo check if your email is configured correctly, refer to the [**<font color=red><ins>_FAQs_</ins></font>**](%s). \n\nOnce you've signed the CLA or updating your email, please comment **`/check-cla`** to revalidate CLA status."
      comment_update_label_failed: "### CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "### CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "the email used in the commit is an invalid email! <br>please check all commits."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email used in the commit is not linked to a signed CLA! <br>please verify that it matches the email you used when signing the CLA."
      message_individual_version_behind: "the individual CLA content has been updated. <br>[Please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/6983225bdcbb19710248ccf0/individual-update?email=%s)."
      message_corporation_version_behind: "the corporation CLA content has been updated. <br>Please contact your corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"
