      command_reg_exp_key_word: "kind|priority|sig|good"
      delayed_seconds: 2
      comment_remove_labels_when_pr_source_code_updated: "### Notification  \nThis pull request has been changed(code update) or closed, so removes the following label(s): %s."
      comment_label_command_conflict: "### Label Command Feedback  \n @%s , the comment that add and delete a same label, please check it!"
      comment_update_label_failed: "### Label Command Feedback \n\n @%s, because of the label **%s** update failed, please comment once again!"
      comment_add_not_exist_label: "### Label Command Feedback  \nThe repository doesn't have the label(s) **%s**, it cannot be added!"
      comment_add_label_by_self: "### Review Code Warning \n @%s , you can't review code by yourself, please contact the maintainers/committers."
      comment_add_label_successful: "### Review Code Feedback \n- The label **%s** was added to this pull request. It means that **%s** reviewed the code changes. :wave: \n ##### *Tips* \n- If this pull request is not merged while all conditions are met, comment **`/check-pr`** to try again. :smile: "
      comment_no_permission_for_user_list: "The label(s) **%s** permission is of **%s**, please contact them."
      comment_no_permission_for_sig_member: "Thanks for your review, your opinion is very important to us. The maintainers will consider your advice carefully."
      comment_no_permission_for_repo_member: "The label(s) **%s** permission is outside."
      comment_permission_tip_for_branch_keeper: "The repository's branch is control of maintainer and branch keeper!"
      comment_pr_no_found_commits: "### Warning  \nThe PR commit(s) can not be got, please check it!"
      comment_pr_no_found_code_change: "### Warning  \nThe PR code change can not be got, please check it!"
      feedback_comment_prefix: "### Label Command Feedback  \n%s"
      add_label_to_feedback:
        - "lgtm"
        - "approved"
        - "lgtm-"
      ai_declaration_check_model: "deepseek-ai/DeepSeek-V4-Pro"
      known_ai_tools: "Claude,Claude Code,openCode,Copilot,Cursor,ChatGPT,Windsurf,Codeium,Tabnine,Antigravity"
      known_ai_models: "DeepSeek,Claude,GPT,Qwen,Gemini,Llama,Mistral,Grok"
      ai_declaration_check_rules: |
        你是一个AI声明合规性检查助手。输入可能包含 PR标题、PR描述、提交信息(commit message)。检查其中的AI工具声明并判断是否合规。

        判定规则（工具与模型分别独立判断真实性，互不依赖）：
        1. 工具真实性：声明的AI工具须真实存在（如 Claude、Copilot、Cursor、ChatGPT 等）；虚构工具（如 "XYZAI"）判不合规。
        2. 模型真实性：若给出了模型名称，只要能归到真实的"模型系列/厂商"（如 DeepSeek、Claude、GPT、Qwen、Gemini、Llama）即视为真实；仅当连系列都对应不上的编造名称（如 "xiaomoxing"）才判不合规。未给模型不因"缺模型"判不合规。
        3. 工具与模型相互独立，不要求同厂商、不要求"匹配"。如「Claude + DeepSeek-V3」是合规组合。
        4. PR描述中的工具与模型不能为空

        PR描述与每个commit的message一致性检查（仅当PR描述声明了使用AI，即勾选"是"或明确声明AI参与时才检查）：
        - commit message 也须声明所用的AI工具或者模型；若提交信息中完全没有AI声明 → 不合规，在 reason 注明"commit message 未声明AI工具"。
        - commit message 声明的模型须与PR描述一致（归一化后比较，见下）；若不一致（如PR写deepseek v4 pro、commit写GLM5.1）→ 不合规，在 reason 注明具体差异。
        - 若PR描述声明未使用AI（勾选"否"），则不要求commit声明，此项不影响合规。

        归一化方法（真实性判断与一致性比较都先归一化，只认系列，存疑从宽）：
        - 忽略大小写、空格、分隔符与版本号写法。但拼写需正确。如 deepseekV3 / deepseek-v3 / DeepSeek-V3-0324 均归到 DeepSeek 系列；gpt4 = GPT-4；Claude code = Claude。
        - 不校验版本是否已发布：你的知识有截止日期，只要系列真实，陌生的新版本（如 DeepSeek-V4、GPT-5、Qwen3）一律按真实处理，不得因"没见过"判为编造。
        - 存疑从宽：无法确定系列时，倾向按真实处理（合规）；归一化后属同一系列即视为一致。

        严格按以下JSON格式返回（不要其他内容）：
        {
          "compliant": true或false,
          "ai_tool": "归一化后的工具名（Claude/Copilot/Cursor/DeepSeek等），无则空字符串",
          "ai_model": "模型名（保留原始写法），无则空字符串",
          "confidence": "High/Medium/Low",
          "reason": "简洁理由（尽量一两句话说完，失败的话只需要说导致失败原因，符合要求部分不要赘述）。需覆盖：真实性（区分'格式差异'合规与'编造名称'不合规）、以及commit与PR的一致性（缺声明或不一致须指出）"
        }
      comment_ai_declaration_non_compliant: "### AI Declaration Check Failed \n @%[1]s, AI tool declaration is **not compliant**. AI tool: **%[2]s**, Reason: Please verify the correctness of the AI-generated statement in the PR description. It must be consistent with the commit messages and not contradict them. For details, see **[here](https://www.openeuler.org/zh/community/aigc)**. :warning:"
      comment_ai_declaration_check_failed: "### AI Declaration Check Failed  \n @%s, AI declaration compliance check failed, please try again later. :x:"
      comment_ai_declaration_no_ai_tool_detected: "### AI Declaration Check Failed  \n @%s, no AI tool usage declaration detected in this PR."
