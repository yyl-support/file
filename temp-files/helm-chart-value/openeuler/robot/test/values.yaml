# chartVersion: v2.0.1
namespace:
  enabled: true
  name: robot-openeuler
serviceAccount:
  create: true
  name: robot-openeuler
podAnnotations:
  # traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0 # 开启istio时添加该行
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/role: robot-openeuler
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
istio:
  enabled: true
  nslabel:
    istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  tlsMode: DISABLE
  mtlsMode: DISABLE
  vs:
    name: "robot-openeuler-virtualservice"
    host: "hook-delivery-openeuler.test.osinfra.cn"
    http:
      - match:
          - uri:
              prefix: /gitcode-hook
        rewrite:
          uri: /gitcode-hook
        route:
          - destination:
              host: "robot-universal-hook-delivery-service.robot-openeuler.svc.cluster.local"
              port:
                number: 8888
      - match:
          - uri:
              prefix: /ci-tools/
        rewrite:
          uri: /
        route:
          - destination:
              host: "robot-universal-ci-tools-service.robot-openeuler.svc.cluster.local"
              port:
                number: 8080
      - match:
          - uri:
              prefix: /sync-bot
        rewrite:
          uri: /
        route:
          - destination:
              host: "sync-bot-service.robot-openeuler.svc.cluster.local"
              port:
                number: 8888
  dr:
    - name: "robot-openeuler-destinationrule"
      serviceName: robot-universal-hook-delivery-service
      port: 8888
    - name: "robot-openeuler-sync-bot-destinationrule"
      serviceName: sync-bot-service
      port: 8888
    - name: "robot-openeuler-ci-tools-destinationrule"
      serviceName: robot-universal-ci-tools-service
      port: 8080
  pa:
    - name: "robot-openeuler-peerauthentication"
      podLabels:
        app: robot-universal-hook-delivery
    - name: "robot-openeuler-sync-bot-peerauthentication"
      podLabels:
        app: sync-bot
    - name: "robot-openeuler-ci-tools-peerauthentication"
      podLabels:
        app: ci-tools
ingress:
  enabled: false
  name: "hook-delivery-ingress"
  host: "hook-delivery-openeuler.test.osinfra.cn"
  syncbot:
    enabled: false
    # name: "sync-bot"
    # host: "hook-delivery-openeuler.test.osinfra.cn"
    # annotations:
    #   nginx.ingress.kubernetes.io/rewrite-target: /$2
    # port: 8888
    # path: /sync-bot(/|$)(.*)
    # pathType: ImplementationSpecific
  citools:
    enabled: false
    # name: "robot-universal-ci-tools"
    # host: "hook-delivery-openeuler.test.osinfra.cn"
    # annotations:
    #   nginx.ingress.kubernetes.io/rewrite-target: /$2
    # port: 8080
    # path: /ci-tools(/|$)(.*)
    # pathType: ImplementationSpecific
secret:
  enabled: true
  name: "test-osinfra-cn-tls"
  path: "secrets/data/infra-test/domain-tls"
  crtKey: "tls.cert"
  keyKey: "tls.key"
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets; ls -ld /vault/secrets
    image: 'swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3'
    imagePullPolicy: IfNotPresent
    name: init-openeuler
readinessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
livenessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
deployments:
  # hookDelivery robot 必须填写为第一个数组元素
  - name: robot-universal-hook-delivery
    replicas: 1
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    labels:
      app: robot-universal-hook-delivery
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-gitcode-secret: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/robot-openeuler
      vault.hashicorp.com/agent-inject-secret-gitcode-secret: internal/data/infra-test/robot-openeuler
      vault.hashicorp.com/agent-inject-template-config: "{{- with secret \"internal/data/infra-test/robot-openeuler\" -}}  \n{{ .Data.data.deliveryConfig }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-gitcode-secret: "{{- with secret \"internal/data/infra-test/robot-openeuler\" -}}  \n{{ .Data.data.deliverySecrets }}\n{{- end }}\n"
    args:
      - --port=8888
      - --hmac-secret-file=/vault/secrets/gitcode-secret
      - --config-file=/vault/secrets/config
      - --handle-path=gitcode-hook
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/robot-universal-hook-delivery
      tag: "main-d443fa"
      pullPolicy: IfNotPresent
    resources:
