# chartVersion: 1.0.1
namespace: openeuler-website-docs
imagePullSecret: huawei-swr-image-pull-secret
serviceAccount:
  create: true
  name: openeuler-website-docs
  automount: false
podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
  vault.hashicorp.com/agent-inject-perms-server.key: "0400"
  vault.hashicorp.com/agent-inject-perms-abc.txt: "0400"
  vault.hashicorp.com/agent-inject-perms-dhparam.pem: "0400"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/secret-volume-path: "/etc/nginx/cert/"
  vault.hashicorp.com/agent-inject-secret-server.crt: "internal/data/openeuler/openeuler-org-tls-ssl"
  vault.hashicorp.com/agent-inject-template-server.crt: |
    {{- with secret "internal/data/openeuler/openeuler-org-tls-ssl" -}}
    {{ .Data.data.ServerCrt }}
    {{- end }}
  vault.hashicorp.com/agent-inject-secret-server.key: "internal/data/openeuler/openeuler-org-tls-ssl"
  vault.hashicorp.com/agent-inject-template-server.key: |
    {{- with secret "internal/data/openeuler/openeuler-org-tls-ssl" -}}
    {{ .Data.data.ServerKey }}
    {{- end }}
  vault.hashicorp.com/agent-inject-secret-abc.txt: "internal/data/openeuler/openeuler-org-tls-ssl"
  vault.hashicorp.com/agent-inject-template-abc.txt: |
    {{- with secret "internal/data/openeuler/openeuler-org-tls-ssl" -}}
    {{ .Data.data.certificatePassword }}
    {{- end }}
  vault.hashicorp.com/agent-inject-secret-dhparam.pem: "internal/data/openeuler/openeuler-org-tls-ssl"
  vault.hashicorp.com/agent-inject-template-dhparam.pem: |
    {{- with secret "internal/data/openeuler/openeuler-org-tls-ssl" -}}
    {{ .Data.data.dhparamPem }}
    {{- end }}
  vault.hashicorp.com/role: openeuler-website-docs
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject-command-abc.txt: |
    if [ $(netstat -anlp | grep 8080| wc -l) -ge 1 ]; then rm -rf /etc/nginx/cert/*; else echo "service not running skip"; fi
  vault.hashicorp.com/template-static-secret-render-interval: 5s
  vault.hashicorp.com/log-level: "warn"
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /etc/nginx/cert/; chown -R 1000:1000 /etc/nginx/cert/; chmod g-s /etc/nginx/cert/; ls -ld /etc/nginx/cert/
    image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
    imagePullPolicy: IfNotPresent
    name: init-docs
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
volumeMounts: []
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
# 不需要时置空
# nodeSelector: {}
nodeSelector: {}
# 不需要时置空
# autoscale: {}
autoscale: {}
# 不需要时置空
# tolerations: {}
tolerations:
servers:
  # common的配置必须在第一个
  - name: openeuler-docs-v2
    replicaCount: 2
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    podLabels:
      app: openeuler-docs-v2
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler/docs-prod
      tag: "stable2-common-v1.0.20260623045606"
      pullPolicy: IfNotPresent
    env:
      - name: DET_URL
        value: https://docs.openeuler.org/zh/
    resources:
      requests:
        cpu: 1
        memory: 1Gi
      limits:
        cpu: 1
        memory: 1Gi
    probeHttpGet:
      path: /404.html
      port: 8080
      scheme: HTTPS
    service:
      portName: tls-1
      port: 8080
      targetPort: 8080
      type: ClusterIP
