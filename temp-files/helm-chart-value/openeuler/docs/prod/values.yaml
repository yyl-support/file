ingress:
  enabled: true
  name: openeuler-website-docs-v2-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      set $redirect_domain https://docs.openeuler.openatom.cn;
      location = / {
        if ($redirect_cn = 1) {
            return 302 $redirect_domain/zh/;
        }
        if ($redirect_cn = 0) {
            return 302 /en/;
        }
      }
      if ($redirect_cn = 1) {
          return 302 $redirect_domain$request_uri;
      }
  host: 'docs.openeuler.org'
secret:
  enable: true
  name: openeuler-website-docs-tls
  path: secrets/data/openeuler/openeuler-org-tls
  crtKey: server.crt
  crtKey: server.crt
  keyKey: server.key
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  tlsMode: SIMPLE
  mtlsMode: DISABLE
  vs:
    name: openeuler-docs-vs
    host: openeuler-docs.test.osinfra.cn
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host: docs-website-common.openeuler-website-docs.svc.cluster.local
              port:
                number: 8080
  dr:
    - name: openeuler-docs-dr
      serviceName: docs-website-common
      port: 8080
  pa:
    - name: openeuler-docs-pa
      podLabels:
        app: docs-common
