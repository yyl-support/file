nameOverride: ""
fullnameOverride: "oneid-workbench"
namespace:
  enabled: false
  name: oneid-workbench
replicaCount: 1
# deploymentLabels:
#   virtual-kubelet.io/burst-to-cci: enforce
istio:
  nslabel: {}
strategy:
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  type: RollingUpdate
image:
  repository: swr.cn-north-4.myhuaweicloud.com/boostkit-infra/oneid-workbench-server
  tag: "feature-oidc-authorize-add-state-ad77fc"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: huawei-swr-image-pull-secret
env:
  - name: APPLICATION_PATH
    value: "/vault/secrets/application.properties"
healthCheck:
  scheme: HTTPS
  path: /oneid-workbench/checkOmService
  port: 8080
securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1001
  capabilities:
    drop:
      - ALL
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /vault/secrets/; chown -R 1001:1001 /vault/secrets/; chmod g-s /vault/secrets/; ls -ld /vault/secrets/
    image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
    imagePullPolicy: IfNotPresent
    name: init-openeuler
podAnnotations:
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-inject: 'true'
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/role: 'oneid-workbench'
  vault.hashicorp.com/agent-run-as-user: "1001"
  vault.hashicorp.com/agent-run-as-group: "1001"
  vault.hashicorp.com/agent-inject-perms-application.properties: "0400"
  vault.hashicorp.com/agent-inject-secret-application.properties: 'internal/data/boostkit/oneid-workbench'
  vault.hashicorp.com/agent-inject-template-application.properties: "{{- with secret \"internal/data/boostkit/oneid-workbench\" -}}  \n{{ .Data.data.config }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-tls.pfx: "0400"
  vault.hashicorp.com/agent-inject-secret-tls.pfx: 'internal/data/boostkit/boostkit-osinfra-cn-ssl'
  vault.hashicorp.com/agent-inject-template-tls.pfx: "{{- with secret \"internal/data/boostkit/boostkit-osinfra-cn-ssl\" -}}  \n{{ base64Decode .Data.data.tlspfx }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-ca.crt: "0400"
  vault.hashicorp.com/agent-inject-secret-ca.crt: 'internal/data/boostkit/oneid-workbench'
  vault.hashicorp.com/agent-inject-template-ca.crt: "{{- with secret \"internal/data/boostkit/oneid-workbench\" -}}  \n{{ .Data.data.redisCA }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-components.yaml: "0400"
  vault.hashicorp.com/agent-inject-secret-components.yaml: 'internal/data/boostkit/oneid-workbench'
  vault.hashicorp.com/agent-inject-template-components.yaml: "{{- with secret \"internal/data/boostkit/oneid-workbench\" -}}  \n{{ .Data.data.component }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-command-application.properties: |
    for count in 1 2 3; do if [ $(netstat -anlp | grep 8080| wc -l) -ge 1 ]; then echo "success delete config"; rm -rf /vault/secrets/*; break; else echo "service not running skip";sleep 10; fi done
  vault.hashicorp.com/template-static-secret-render-interval: 5s
  vault.hashicorp.com/log-level: "warn"
  dapr.io/enabled: "true"
  dapr.io/app-id: "oneid-workbench"
  dapr.io/disable-builtin-k8s-secret-store: "true"
  dapr.io/sidecar-memory-limit: "300Mi" # 您的内存限制
  dapr.io/env: "GOMEMLIMIT=200MiB" # 您内存限制的 90%。还请注意后缀 "MiB" 而不是 "Mi"
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
serviceAccount:
  create: true
  name: oneid-workbench
  automount: false
resources:
  requests:
    cpu: "100m"
    memory: 500Mi
    # ingress:
    #   enabled: false
#   className: "nginx"

# annotations:

#   nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

#   nginx.ingress.kubernetes.io/rewrite-target: /$2

# hosts:

#   - host: ""

#     paths:

#       - path: /

#         pathType: ImplementationSpecific
service:
  ports:
    - name: http-port
      port: 8080
      protocol: TCP
      targetPort: 8080
  type: ClusterIP
daprd:
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/boostkit-infra/daprio/daprd
    tag: "1.15.3"
