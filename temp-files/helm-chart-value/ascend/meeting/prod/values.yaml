meetingCenter:
  enabled: true
  name: ascend-meeting-center
  replicas: 3
  podLabels:
    app: ascend-meeting-center
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    annotations: {}
    ports:
      - name: tls-1
        port: 8080
        protocol: TCP
        targetPort: 8080
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/ascend/ascend-server
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/ascend/ascend-server
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/ascend/ascend-server" -}}
      {{ .Data.data.ascendCenterConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/ascend/ascend-server" -}}
      {{ .Data.data.ascendCenterSecrets }}
      {{- end }}
