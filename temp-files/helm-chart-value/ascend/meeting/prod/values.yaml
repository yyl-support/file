#chartVersion: 1.0.9
namespace:
  enabled: false
  name: ascend
serviceAccount:
  create: false
  name: ascend
strategy:
  rollingUpdate:
    maxSurge: 2
    maxUnavailable: 2
  type: RollingUpdate
image:
  center:
    name: meeting-center
    repository: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/meeting/meeting-center
    tag: "main-f4c504"
    imagePullPolicy: IfNotPresent
  platform:
    name: meeting-platform
    repository: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/meeting/meeting-platform
    tag: "main-973898"
    imagePullPolicy: IfNotPresent
initContainer:
  image:
    repository: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/openeuler
    tag: 22.03-lts-sp3
podAnnotations:
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/role: ascend
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
  vault.hashicorp.com/agent-inject-perms-ca.pem: "0400"
  vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
  vault.hashicorp.com/agent-inject-perms-server.key: "0400"
  vault.hashicorp.com/agent-inject-secret-ca.pem: internal/data/ascend/ascend-server
  vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/ascend/domain-tls
  vault.hashicorp.com/agent-inject-secret-server.key: internal/data/ascend/domain-tls
  vault.hashicorp.com/agent-inject-template-ca.pem: |
    {{- with secret "internal/data/ascend/ascend-server" -}}
    {{ .Data.data.meetingMysqlCA }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.crt: |
    {{- with secret "internal/data/ascend/domain-tls" -}}
    {{ .Data.data.ServerCrt }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.key: |
    {{- with secret "internal/data/ascend/domain-tls" -}}
    {{ .Data.data.ServerKey }}
    {{- end }}
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
ingress:
  enabled: false
  host: ""
  port:
    number: 80
# 后端使用ingress路径转发时启用ingressNew
ingressNew:
  enabled: true
  name: ascend-meeting-center-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /api/v1/meeting$1
  host: meeting.osinfra.cn
  path: /ascend-meeting(.*)
  pathType: ImplementationSpecific
  secretName: osinfra-cn-tls
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: "istio-system/istio-gateway-https"
  host: ""
