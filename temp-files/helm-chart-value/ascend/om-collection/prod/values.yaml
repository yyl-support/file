#chartVersion: v1.0.5
namespace: om
autoscaling:
  enabled: false
serviceAccount:
  create: false
  name: om
imageRepository: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/om/om-collection
imagePullSecrets:
  - name: huawei-swr-image-pull-secret
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-run-as-group: "1001"
  vault.hashicorp.com/agent-run-as-user: "1001"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/role: om
  vault.hashicorp.com/template-static-secret-render-interval: 5s
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
  vault.hashicorp.com/agent-pre-populate-only: "true"
deployments:
  - name: ascend-meeting-collect
    replicaCount: 1
    imageTag: "meeting_1.5"
    imagePullPolicy: IfNotPresent
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config.ini: "0400"
      vault.hashicorp.com/agent-inject-secret-config.ini: internal/data/ascend/om
      vault.hashicorp.com/agent-inject-template-config.ini: "{{- with secret \"internal/data/ascend/om\" -}}  \n{{ .Data.data.meetingConfig }}\n{{- end }}\n"
      vault.hashicorp.com/secret-volume-path: /opt/config
    configPath: /opt/config
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsUser: 1001
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
    volumeMounts: {}
    volumes:
      - name: token-vol
        projected:
          sources:
            - serviceAccountToken:
                audience: api
                expirationSeconds: 600
                path: token
collectData:
  enabled: false
