            - label_name: "Scored"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
          review:
            total_number_of_approve: 1
            total_number_of_lgtm: 2
          issue_state_label_rules:
            - issue_states:
                - "DONE"
                - "VALIDATION"
              target_label: "resolved"
              add_label: true
        - repos:
            - Ascend/ascend-deployer_for_lingqu
            - Ascend/mind-cluster_for_lingqu
            - Ascend/mind-edge
