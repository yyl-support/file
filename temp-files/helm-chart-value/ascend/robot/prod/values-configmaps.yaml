  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - Ascend
          close_issue_checklist:
            comment_command_lines:
              - "/close"
            allow_issue_type_list:
              - "任务"
              - "需求"
              - "缺陷"
            allow_workflow_list:
              - "任务/TODO,WIP/DONE"
              - "需求/TODO,WIP/DONE"
              - "缺陷/TODO,WIP/DONE"
            close_workflow_list:
              - "DONE"
            linked_pr_all_merged_or_closed: true
          reopen_issue_checklist:
            comment_command_lines:
              - "/reopen"
            allow_workflow_list:
              - "任务/DONE,CLOSED,REJECTED/TODO"
              - "需求/DONE,CLOSED,REJECTED/TODO"
              - "缺陷/DONE,CLOSED,REJECTED/TODO"
