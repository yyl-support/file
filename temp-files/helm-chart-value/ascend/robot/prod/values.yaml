# chartVersion: v2.0.5
namespace:
  enabled: false
  name: ascend-robot
serviceAccount:
  create: true
  name: ascend-robot
autoscale:
  enabled: false
  # start: 30 8 * * *
  # end: 55 23 * * *
podAnnotations:
  # traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0  # 开启istio时添加该行
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/role: ascend-robot
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
istio:
  enabled: false
  nslabel: {}
ingress:
  host: "hook-delivery-ascend.osinfra.cn"
  backends:
    - name: robot-universal-hook-delivery
      port: 8888
      path: /gitcode-hook
      pathType: Prefix
    - name: robot-issue-manage
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /$2
      port: 8888
      path: /issue-manage(/|$)(.*)
      pathType: ImplementationSpecific
    - name: robot-universal-comment
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /$2
      port: 8888
      path: /comment(/|$)(.*)
      pathType: ImplementationSpecific
secret:
  enabled: true
  name: "osinfra-cn-tls"
  path: "secrets/data/infra-common/osinfra-cn"
  crtKey: "server.crt"
  keyKey: "server.key"
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets; ls -ld /vault/secrets
    image: 'swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/openeuler:22.03-lts-sp3'
    imagePullPolicy: IfNotPresent
    name: init-openeuler
readinessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
livenessProbe: # 默认值
  failureThreshold: 3
  httpGet:
    path: /
    port: 8888
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 5
deployments:
  - name: robot-universal-hook-delivery
    replicas: 1
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    labels:
      app: robot-universal-hook-delivery
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-gitcode-secret: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/ascend/robot
      vault.hashicorp.com/agent-inject-secret-gitcode-secret: internal/data/ascend/robot
      vault.hashicorp.com/agent-inject-template-config: "{{- with secret \"internal/data/ascend/robot\" -}}  \n{{ .Data.data.deliveryConfig }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-gitcode-secret: "{{- with secret \"internal/data/ascend/robot\" -}}  \n{{ .Data.data.deliverySecrets }}\n{{- end }}\n"
    args:
      - --port=8888
      - --hmac-secret-file=/vault/secrets/gitcode-secret
      - --config-file=/vault/secrets/config
      - --handle-path=gitcode-hook
    image:
      repository: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/robot-universal-hook-delivery
      tag: "main-d443fa"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 1Gi
    volumeMounts: []
    volumes: []
    vaultVolume: create
    service:
      portName: http-port
      port: 8888
      targetPort: 8888
      type: ClusterIP
