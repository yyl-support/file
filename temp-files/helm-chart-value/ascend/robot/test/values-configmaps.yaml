configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo: 
              - ascend-archive
            plugin_name:
              - robot-service-assign
              - robot-service-cla
              - robot-service-keeper-approve
              - robot-service-label
              - robot-service-review
              - robot-service-lifecycle
              - robot-service-quality-gate-trigger
              - sync-bot
        plugins:
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-keeper-approve
            endpoint: http://robot-keeper-approve-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-quality-gate-trigger
            endpoint: http://robot-universal-quality-gate-trigger-service.ascend-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: sync-bot
            endpoint: http://sync-bot-service.ascend-backend-robot.svc.cluster.local:8888/hooks
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - ascend-archive
          enable_issue_assign: true
      
      community_robot_id: ascend-robot
      msg_multiple_assignee: "Can only assign one assignee to the issue."
      msg_assign_repeatedly: "This issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "This issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "This issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - ascend-archive
          cla_label_yes: ascend-cla/yes
          cla_label_no: ascend-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/690ca9ddf91c03dee6082ab1
          sign_url: https://clasign.osinfra.cn/sign/690ca9ddf91c03dee6082ab1
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/690ca9ddf91c03dee6082ab1/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/690ca9ddf91c03dee6082ab1/individual
          faq_url: https://gitcode.com/Ascend/infrastructure/blob/master/docs/cla/cla%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97.md#faq
          check_by_committer: true
          lite_pr_committer:
            email: noreply@gitcode.com
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "## CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "## CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "## CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) have not signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nIf you need to sign CLA, [you can click here to sign the CLA](%s). \n\nIf you need to check if the email is set up correctly, [you can click here to do it in the **<font color=red>_FAQs_</font>**](%s). \n\nAfter signing the CLA or updating the email, you must comment `/check-cla` to check the CLA status again."
      comment_update_label_failed: "## CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "## CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      sig_info_url: https://dsapi.test.osinfra.cn/query/sig/info
      community_name: ascend
      community_robot_id: ascend-robot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "it's an invalid email! please check it."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email is not signed for CLA! please check if it is correct and the same as your signed email."
      message_individual_version_behind: "since the individual CLA content has been updated, [please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/690ca9ddf91c03dee6082ab1/individual-update?email=%s)."
      message_corporation_version_behind: "since the corporation CLA content has been updated, please contact the corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"
      enable_use_comment_robot: true
      comment_robot_url: "http://robot-universal-comment-service.ascend-backend-robot.svc.cluster.local:8888/comment"
  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - ascend-archive
          clear_labels:
            - ci-pipeline-passed
            - keeper_approved

      sig_info_url: "https://dsapi.test.osinfra.cn/query/sig/info"
      community_name: ascend
      user_mark_format: "@"
      squash_commit_label: stat/needs-squash
      comment_command_trigger: "### Label Command Manual \nBecause of the network problem, please comment once again. :pray: "
      comment_remove_labels_when_pr_source_code_updated: "### Notification  \nThis pull request source branch has changed, so removes the following label(s): %s."
      comment_label_command_conflict: "### Label Command Feedback \n %s , the comment that add and delete a same label, please check it. :pray: "
      comment_update_label_failed: "### Label Command Feedback \n %s, Because of the label(s) `%s` update failed, please comment once again. :pray: "
      comment_add_not_exist_label: "### Label Command Feedback \n %s, Because of the repository doesn't have the label(s) `%s`, it cannot be added. :pray: "
      remove_pr_label_delayed_seconds: 2
      community_robot_id: ascend-robot
  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - ascend-archive
          need_issue_has_link_pull_requests: false
      sig_info_url: "http://robot-universal-cache-service.ascend-backend-robot:8888/robot-cache"
      community_name: ascend
      event_state_opened: opened
      event_state_closed: closed
      comment_no_permission_operate_issue: "### Notice \n@%s , you can't %s an issue unless you are the author of it or a collaborator."
      comment_issue_needs_link_pr: "### Notice \n@%s , you can't close an issue unless the issue has link pull requests."
      comment_list_linking_pull_requests_failure: "### Notice \n@%s  fail to check link pull requests of the issue, please retry."
      comment_no_permission_operate_pr: "### Notice \n@%s , you can't %s a pull request unless you are the author of it or a collaborator."
      community_robot_id: ascend-robot
  - name: configmap-review
    filename: config.yaml
    content: |-
      config_items:
      - repos:
        - ascend-archive/testRepo
        - ascend-archive/community
        need_welcome: true
        review:
          who_can_comment_lgtm: 
            - reviewer
            - committer
            - maintainer
          who_can_comment_approve:
            - committer
            - maintainer
          total_number_of_approve: 1
          total_number_of_lgtm: 2
        branch_configs:
        - is_default: true
          merge_method: squash
          labels:
          - label: lgtm
            tips_if_missing: "Please wait for reviewers to review the code."
            person: ascend-robot
            tips_if_added_by_others: "You can't add lgtm label manually. Please remove it and wait for reviewers to review your codes."

          - label: approved
            tips_if_missing: "Please wait for committers to review the code."
            person: ascend-robot
            tips_if_added_by_others: "You can't add approved label manually. Please remove it and wait for committers to review your codes."

          - label: ascend-cla/yes
            tips_if_missing: "Please sign CLA. If you have done, comment /check-cla to recheck again."
            person: ascend-robot
            tips_if_added_by_others: "You can't add ascend-cla/yes label manually. Please comment /check-cla to verify it again."
          
          - label: ci-pipeline-passed
            tips_if_missing: "Please wait for the CI test to be completed."
            person: ascend-robot
            tips_if_added_by_others: "You can't add ci-pipeline-passed label manually. Please remove it and wait for the CI test to be completed."

      info_repo_configs:
      - info_org: ascend-archive
        info_repo: community
        info_ref: main
        repo_type: public
      special_sig_links:
        CANN: "You can get sig-info at [**here**](https://gitcode.com/ascend-archive/community/blob/main/CANN/PMC/pmc.yaml)"
      org_approval_strategies:
        ascend: "strict"
        cann: "loose"
        ascend-archive: "loose"
      label_missing_tip:
        - lgtm: "Please wait for reviewers to review the code."
        - approved: "Please wait for committers to review the code."
        - ascend-cla/yes: "Please sign CLA. If you have done, comment /check-cla to recheck again."
        - cann-cla/yes: "Please sign CLA. If you have done, comment /check-cla to recheck again."
        - ci-pipeline-passed: "Please wait for the CI test to be completed."
        - SC-SUCC: "Please wait for the CI pipeline to be completed."
        - docs-ci-pipeline-success: "Please wait for the docs CI test to be completed."
        - keeper_approved: "Please wait for keeper to merge the code."
        - Scored: "Please wait for committer or reviewer rate the PR."
      label_added_by_others_tip:
        - lgtm: "You can't add lgtm label manually. Please remove it and wait for reviewers to review your codes."
        - approved: "You can't add approved label manually. Please remove it and wait for committers to review your codes."
        - ascend-cla/yes: "You can't add ascend-cla/yes label manually. Please comment /check-cla to verify it again."
        - cann-cla/yes: "You can't add cann-cla/yes label manually. Please comment /check-cla to verify it again."
        - ci-pipeline-passed: "You can't add ci-pipeline-passed label manually. Please remove it and wait for the CI test to be completed."
        - SC-SUCC: "You can't add SC-SUCC label manually. Please remove it and wait for the CI pipeline to be completed."
        - docs-ci-pipeline-success: "You can't add docs-ci-pipeline-success label manually. Please remove it and wait for the docs CI test to be completed."
        - keeper_approved: "You can't add keeper_approved label manually. Please remove it and wait for the branch keeper to merge the code into this branch."
        - Scored: "You can't add Scored label manually. Please remove it and wait for committer or reviewer rate the PR."
      sig_info_file: sig-info.yaml
      org_info_file: org-info.yaml
      pmc_file: "CANN/PMC/pmc.yaml"
      tsc_file: "CANN/TSC/tsc.yaml"
      community_name: ascend-archive
      comment_add_lgtm_by_self: "### Review Code Warning \n @%s , You can't review code by yourself, please contact the reviewers. :astonished: "
      comment_add_approved_by_self: "### Review Code Warning \n @%s , You can't review code by yourself, please contact the committers. :astonished: "
      comment_removed_label: "### Review Code Feedback \n ***%s*** was removed in this pull request by: ***%s***. :flushed: "
      comment_no_permission_for_label: "### Review Code Feedback \n ***@%s*** has no permission to %s ***%s*** label in this pull request. :astonished: \nPlease contact to the admins in this repository."
      comment_clear_label_case_by_pr_update: "### Notice\n New code changes of the pull request are detected and remove these labels ***%s***. :flushed: "
      comment_clear_label_case_by_reopen_pr: "### Notice\n When PR is reopened, remove these labels ***%s***. :flushed: "
      comment_failed_list_pr_operation_logs: "### Notice\n The corresponding operation log is missing."
      comment_failed_merge_pr: "PR merge failed"
      comment_failed_merge_pr_unknown_reason: "unknown error occurred, please contact community infrastructure team."
      comment_no_committers_approve: "### Notice\n There are no committers approved this pull request. :astonished: "
      comment_no_reviewers_lgtm: "### Notice\n There are no reviewers lgtm this pull request. :astonished: "
      comment_pr_rejected: "### Notice\n PR合并被阻止：以下成员对本 PR 发出了 `/reject` 评论：%s. \n 请与他们沟通确认问题是否已解决，并请他们在确认后追加 `/lgtm` 或 `/approve` 以解除阻止。"
      comment_pr_merge_faq_link: "\n\nIf you want to solve this problem, [you can click here to do it in the **<font color=red>_FAQs_</font>**](https://gitcode.com/cann/infrastructure/blob/main/docs/robot/robot%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97.md#-faq)."
      commands_endpoint: "https://gitcode.com/cann/infrastructure/blob/main/docs/robot/robot%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97.md#-%E5%A6%82%E9%9C%80%E4%BA%86%E8%A7%A3%E8%AF%A6%E7%BB%86%E7%9A%84%E5%91%BD%E4%BB%A4%E5%8F%AF%E5%8F%82%E8%80%83%E4%B8%8B%E6%96%B9%E8%AF%A6%E7%BB%86%E8%A1%A8%E6%A0%BC"
      sig_info_tips_link: "You can get sig-info at [**here**](https://gitcode.com/ascend-archive/%s/blob/main/%s/sigs/%s/sig-info.yaml)\n"
      comment_ci_no_pass: "\n建议流水线所有任务运行通过后，再行联系committer、reviewer评审，如果过程中有任何问题，也可@列表中的责任人求助。"
      comment_ci_pass: "\n流水线已运行通过，机器人已自动提醒评审人评审，如果长时间未响应可以手工@提醒列表中的committer、reviewer进行处理。"
      comment_sig_readme_link: "\n相关责任人详情请见[**SIG README**](https://gitcode.com/ascend-archive/%s/blob/main/%s/sigs/%s/README.md)"
      need_readme_link_community: ascend-archive
      need_recommend_num: 5
      cron_job_interval: 120
      sig_info_url: https://dsapi.test.osinfra.cn/query/sig/info
      community_robot_id: ascend-robot
      ci_pass_label: ci-pipeline-passed
      match_cann_perm_rule: ascend-archive/
      comment_robot_url: "http://robot-universal-comment-service.ascend-backend-robot.svc.cluster.local:8888/comment"
      repo_config_cache_duration: 60
      external_repo_config_file_path: ".infra/config.yaml"
      external_config_sources:
        - repo_type: public
          org: ascend-archive
          repo: infrastructure
          branch: main
      label_triggered_sig_review:
        label: "api-check-failed"
        sig_name: "doc"
        need_lgtm: 1
        need_approve: 1
      ai_review_bot_accounts:
        - "gitcode-bot"
      enable_resolve_ai_comments: true
      review_report_config:
        full_comment_template: "%s\n%s\n%s\n"
        welcome_message: "Thanks for your pull-request."
        commands_intro: "The full list of commands accepted by me can be found at [**here**](%s)。"
        sig_missing_repo: "Failed to find the SIG for repository %s."
        sig_missing_org: "Failed to find the org for repository %s."
        recommend_tips: "以下是根据您提交的修改文件推荐的Reviewer和Committer序列，需各模块评审通过后方可合入.\n"
        recommend_table_header: "| Module List | Reviewers | Committers |"
        unauthorized_prefix: "The following users do not have permission to comment `/lgtm` or `/approve` on any module in this PR:"
        max_display_available_users: 5
        line_break: "\n"
        title: "\n## PR Approval Progress"
        all_satisfied: "✅ **Congratulations! All modules have met the lgtm and approve requirements.**"
        not_satisfied_prefix: "⚠️ This PR does not yet meet the following requirements:"
        module_detail_title: "### Module Approval Details"
        table_header_row: "| Module | lgtm status | approve status |"
        table_separator_row: "|------|-----------|--------------|"
        table_row_template: "| %s | %s | %s |"
        lgtm_requirement: "lgtm (requires ≥ %d person(s) per module)"
        approve_requirement: "approve (requires ≥ %d person(s) per module)"
        list_joiner: "、"
        user_link_template: "[*%s*](%s)"
        user_profile_url_template: "https://gitcode.com/%s"
        icon_approved: "✅"
        icon_pending: "❌"
        empty_user_list_format: "%s (0/%d)"
        non_empty_user_list_format: "%s %s (%d/%d)"
        tip_block_prefix: "> 💡 Tip:"
        tip_committer: "- **Committer** can comment `/approve` or `/lgtm`"
        tip_approve_implies_lgtm: "- Commenting `/approve` implies both code review (lgtm) and intent to merge (approve)"
        comment_header_prefix: "## PR Approval Progress"
        robot_username: "cann-robot"
        lgtm_available_prefix: "(You can also ask: %s)"
        approve_available_prefix: "(You can also ask: %s)"
        max_display_users: 999
        comment_separator: "\n---\n"
        pass_review_message_template: "%s %s %s"
        pass_review_title: "### Review Guide\n\n"
        pass_review_status_message: "This pull-request **passes review**.\n"
        pass_review_approve_line: "Committers who wrote a comment of `/approve` are: %s.\n"
        pass_review_lgtm_line: "Reviewers who wrote a comment of `/lgtm` are: %s.\n"

      label_check_messages:
        log_missing_tip: "The corresponding operation log is missing. You should delete the label and add it again in the correct way.\n\n"
        label_issue_item_template: "%s: %s\n\n"
        label_added_before_pr_update_tip: "The label was added before the last update of the PR. Please re-add it after the latest update.\n\n"
        not_ready_header_template: "**The following %s not ready**.\n\n"
        unexpected_exist_header_template: "**The following %s**.\n\n"
        singular_count: 1
        singular_label: "label is"
        plural_label: "labels are"
        singular_exists: "label exists"
        plural_exists: "labels exist"
  - name: configmap-repo-watcher
    filename: config.yaml
    content: |-
      community_name: "ascend"
      sig_info_url: "http://localhost:8831/robot-cache"
      repo_fetch_interval: 120
      repo_info_configs:
      - org: "ascend-archive"
        repo: "community"
        ref: "main"
      - org: "ascend-archive"
        repo: "community-private"
        ref: "main"
      repo_setting_module:
        merge_method: squash
      sig_info_file: "sig-info.yaml"
      org_info_file: "org-info.yaml"
      repo_admin_role_name: "admin"
      repo_custom_role_name: "Ascend开发者"
  - name: configmap-keeper-approve
    filename: config.yaml
    content: |-
      config_items:
      - repos:
        - ascend-archive
      tag_name: keeper_approved
      info_repo_configs:
      - info_org: ascend-archive
        info_repo: community
        info_ref: main
        repo_type: public
      - info_org: ascend-archive
        info_repo: community-private
        info_ref: main
        repo_type: private
      sig_info_file: sig-info.yaml
      cron_job_interval: 5
      sig_info_url: https://dsapi.test.osinfra.cn/query/sig/info
      community_name: ascend
      community_robot_id: ascend-robot
  - name: configmap-quality-gate-trigger
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - ascend-archive/test_workflow
          - jl-brother1/test
      community_robot_id: ascend-robot
      ci_endpoint_prefix: https://1.95.2.67:8080/internal/v1/gitcode/event
      build_command: npu-smi info
      workflow_yaml: .workflow/npu_test.yaml
  - name: configmap-comment
    filename: config.yaml
    content: |-
      community_name: ascend-archive
      community_robot_id: ascend-robot
      lock_shards: 1024
      sections:
        - "Thanks for your pull-request."
        - "## CLA Signature"
  - name: configmap-sync-bot
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - ascend-archive
          legal_operator: ascend-robot
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: ascend-archive
      community_robot_id: ascend-robot
      git_user_name: "ascend-robot"
      git_user_email: "zhongyuanke@huawei.com"
