# chart版本：1.0.4
namespace: mindspore-omwebserver
serviceAccount:
  create: true
  name: mindspore-omwebserver
imagePullSecret: huawei-swr-image-pull-secret
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
deployments:
  - name: mindspore-omwebserver
    replicaCount: 1
    # labels:
    #   virtual-kubelet.io/burst-to-cci: enforce
    podLabels:
      app: mindspore-omwebserver
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    podAnnotations:
      vault.hashicorp.com/agent-inject: "true"
      vault.hashicorp.com/agent-inject-perms-application.properties: "0400"
      vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
      vault.hashicorp.com/agent-inject-perms-tls.pfx: "0400"
      vault.hashicorp.com/agent-inject-secret-application.properties: internal/data/infra-test/mindspore-omwebserver
      vault.hashicorp.com/agent-inject-secret-redis.crt: internal/data/infra-test/mindspore-omwebserver
      vault.hashicorp.com/agent-inject-secret-tls.pfx: internal/data/infra-test/mindspore-omwebserver
      vault.hashicorp.com/agent-inject-template-application.properties: "{{- with secret \"internal/data/infra-test/mindspore-omwebserver\" -}}  \n{{ .Data.data.application }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/infra-test/mindspore-omwebserver\" -}}  \n{{ .Data.data.redis }}\n{{- end }} \n"
      vault.hashicorp.com/agent-inject-template-tls.pfx: "{{- with secret \"internal/data/infra-test/mindspore-omwebserver\" -}}  \n{{ base64Decode .Data.data.tlspfx }}\n{{- end }} \n"
      vault.hashicorp.com/agent-pre-populate-only: "true"
      vault.hashicorp.com/agent-run-as-group: "1001"
      vault.hashicorp.com/agent-run-as-user: "1001"
      vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
      vault.hashicorp.com/role: mindspore-omwebserver
      vault.hashicorp.com/secret-volume-path: /var/lib/om-webserver
      vault.hashicorp.com/tls-skip-verify: "true"
      vault.hashicorp.com/log-level: "warn"
    applicationPath: /var/lib/om-webserver/application.properties
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/mindspore/om-webserver-test
      tag: "feature-add-delete-email-token-275ff0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
    heathCheckPath:
      path: /oneid/checkOmService
      port: 8080
      scheme: HTTPS
    containerPort: 8080
# ingress: {}

# 格式示例
ingress:
  - name: mindspore-om-webserver
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTPS
      nginx.ingress.kubernetes.io/configuration-snippet: "if ($http_origin ~ '^https:\\/\\/xihe\\.mindspore\\.cn$') {\n  set $allow_origin $http_origin;  \n}\nif ($http_origin ~ '^https:\\/\\/xihe2\\.test\\.osinfra\\.cn$') {\n  set $allow_origin $http_origin;  \n}\nmore_set_headers \"Access-Control-Allow-Origin: $allow_origin\";\nmore_set_headers \"Access-Control-Allow-Credentials: true\";\nmore_set_headers \"Access-Control-Allow-Methods: GET, PUT, POST, DELETE,PATCH, OPTIONS\";\n"
      nginx.ingress.kubernetes.io/limit-connections: "20"
      nginx.ingress.kubernetes.io/limit-rps: "20"
      nginx.ingress.kubernetes.io/proxy-body-size: 2m
    host: xiheapi.test.osinfra.cn
    serviceName: om-webserver-service
    servicePort: 80
    path: /
    pathType: Prefix
    secretName: mindspore-omwebserver-tls
services:
  - name: om-webserver-service
    type: ClusterIP
    port: 80
    portName: srv
    targetPort: 8080
    podLabels:
      app: mindspore-omwebserver
# secrets: {}

# 格式示例
secrets:
  - name: mindspore-omwebserver-tls
    path: secrets/data/infra-test/domain-tls
    certKey: tls.cert
    keyKey: tls.key
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled

  gateway: istio-system/istio-gateway-https
  vs:
    name: om-webserver-virtualservice
    host:
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host:
              port:
                number:
  tlsMode: SIMPLE
  mtlsMode: DISABLE
  dr:
    - name: destinationrule-om-webserver
      serviceName: om-webserver-service
      port: 80
  pa:
    - name: peerauthentication-om-webserver-disable-mtls
      podLabels:
        app: om-webserver
