configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - mindspore
              - mindspore-lab
              - mirror-test
            plugin_name:
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
              - robot-service-scavenger

        plugins:
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-scavenger
            endpoint: http://robot-universal-scavenger-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.mindspore-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - mindspore
            - mindspore-lab
          enable_issue_assign: true

      community_robot_id: MindSpore-Bot
      msg_multiple_assignee: "### Notice \nCan only assign one assignee to the issue."
      msg_assign_repeatedly: "### Notice \nThis issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "### Notice \nThis issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "### Notice \n***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "### Notification \nThis issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - mindspore
            - mindspore-lab
          cla_label_yes: mindspore-cla/yes
          cla_label_no: mindspore-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/6971f3727a5429cd9010ed41
          sign_url: https://clasign.osinfra.cn/sign/6971f3727a5429cd9010ed41
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/6971f3727a5429cd9010ed41/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/6971f3727a5429cd9010ed41/individual
          faq_url: https://atomgit.com/mindspore/community/blob/master/cla/faq/check_by_committer/faq.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            email_patch: "noreply@gitee.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: mindspore
      community_robot_id: MindSpore-Bot
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "### CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "### CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "### CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) are not associated with a signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nTo sign CLA, [**<ins>click here</ins>**](%s). \n\nTo check if your email is configured correctly, refer to the [**<font color=red><ins>_FAQs_</ins></font>**](%s). \n\nOnce you've signed the CLA or updating your email, please comment **`/check-cla`** to revalidate CLA status."
      comment_update_label_failed: "### CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "### CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "the email used in the commit is an invalid email! <br>please check all commits."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email used in the commit is not linked to a signed CLA! <br>please verify that it matches the email you used when signing the CLA."
      message_individual_version_behind: "the individual CLA content has been updated. <br>[Please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/6971f3727a5429cd9010ed41/individual-update?email=%s)."
      message_corporation_version_behind: "the corporation CLA content has been updated. <br>Please contact your corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"
  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - mindspore
            - mindspore-lab
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci-pipeline-passed"
            - label_name: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_prefix: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "approved"
              event_actions:
                - "pr close to trigger remove label"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
          manual_add_or_remove_pr_label_rules:
            - label_prefix: "lgtm"
              add_label_command: "/lgtm"
              remove_label_command: "/lgtm cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "approved"
              add_label_command: "/approve"
              remove_label_command: "/approve cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "needs-issue"
              remove_label_command: "/remove-needs-issue"
              verify_permission: "strict"
              user_id_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/squash"
              add_label_command: "/squash"
              remove_label_command: "/squash cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/rebase"
              add_label_command: "/rebase"
              remove_label_command: "/rebase cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
          manual_add_or_remove_issue_label_rules:
            - label_name: "GEO"
              add_label_command: "/geo"
              remove_label_command: "/geo cancel"
              verify_permission: "strict"
              user_id_list:
                - "sunshuang1866"
              user_id_only: true

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: mindspore
      community_robot_id: MindSpore-Bot
      command_reg_exp_key_word: "kind|priority|sig"
      delayed_seconds: 2
      comment_remove_labels_when_pr_source_code_updated: "### Notification  \nThis pull request has been changed(code update) or closed, so removes the following label(s): %s."
      comment_label_command_conflict: "### Label Command Feedback  \n @%s , the comment that add and delete a same label, please check it!"
      comment_update_label_failed: "### Label Command Feedback \n\n @%s, because of the label **%s** update failed, please comment once again!"
      comment_add_not_exist_label: "### Label Command Feedback  \nThe repository doesn't have the label(s) **%s**, it cannot be added!"
      comment_add_label_by_self: "### Review Code Warning \n @%s , you can't review code by yourself, please contact the maintainers/committers."
      comment_add_label_successful: "### Review Code Feedback \n- The label **%s** was added to this pull request. It means that **%s** reviewed the code changes. :wave: \n ##### *Tips* \n- If this pull request is not merged while all conditions are met, comment **`/check-pr`** to try again. :smile: "
      comment_no_permission_for_user_list: "The label(s) **%s** permission is of **%s**, please contact them."
      comment_no_permission_for_sig_member: "Thanks for your review, your opinion is very important to us. The maintainers will consider your advice carefully."
      comment_no_permission_for_repo_member: "The label(s) **%s** permission is outside."
      comment_permission_tip_for_branch_keeper: "The repository's branch is control of maintainer and branch keeper!"
      comment_pr_no_found_commits: "### Warning  \nThe PR commit(s) can not be got, please check it!"
      comment_pr_no_found_code_change: "### Warning  \nThe PR code change can not be got, please check it!"
      feedback_comment_prefix: "### Label Command Feedback  \n%s"
      add_label_to_feedback:
        - "lgtm"
        - "approved"
        - "lgtm-"
      
  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - mindspore
            - mindspore-lab
          excluded_repos:
            - mindspore/ms-pipeline
          close_issue_checklist:
            comment_command_lines:
              - "/close"
            allow_issue_type_list:
              - "Bug-Report"
              - "Documentation"
              - "RFC"
              - "Question"
              - "Task-Tracking"
              - "Requirement"
              - "ThirdParty"
              - "Intern"
              - "需求"
            allow_workflow_list:
              - "Bug-Report/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "Documentation/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "RFC/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "Question/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "Task-Tracking/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "Requirement/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "ThirdParty/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "Intern/TODO,WIP,ACCEPTED,VALIDATION/DONE"
              - "需求/TODO,WIP,ACCEPTED,VALIDATION/DONE"
            close_workflow_list:
              - "DONE"
              - "REJECTED"
              - "CLOSED"
            linked_pr_all_merged_or_closed: true
          reopen_issue_checklist:
            comment_command_lines:
              - "/reopen"
            allow_workflow_list:
              - "Bug-Report/DONE/TODO"
              - "Documentation/DONE/TODO"
              - "RFC/DONE/TODO"
              - "Question/DONE/TODO"
              - "Task-Tracking/DONE/TODO"
              - "Requirement/DONE/TODO"
              - "ThirdParty/DONE/TODO"
              - "Intern/DONE/TODO"
              - "需求/DONE/TODO"
          close_pr_checklist:
            comment_command_lines:
              - "/close"
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: mindspore
      community_robot_id: MindSpore-Bot
      event_state_opened: opened
      issue_action_reopen: reopen
      event_state_closed: closed
      issue_action_close: close
      comment_no_permission_close_issue: "### Notice \n@%s , you can't close an issue unless you are the author of it or a collaborator."
      comment_no_permission_reopen_issue: "### Notice \n@%s , you can't reopen an issue unless you are the author of it or a collaborator."
      comment_list_linking_pull_requests_failure: "### Notice \n@%s  fail to check link pull requests of the issue, please retry."
      comment_no_permission_close_pr: "### Notice \n@%s , you can't close a pull request unless you are the author of it or a collaborator."
      comment_issue_has_open_pr: "### Notice \n@%s , this issue is linked to an open PR. Please merge the PR before closing this issue."
      comment_not_close_issue: "### Notice \n@%s , this issue is currently under CVE service control and cannot be closed directly. Please comment **/check-issue**."
