# 全局配置
global:
  namespace: unifiedbus-omwebserver
  appName: unifiedbus-omwebserver
  appSubName: om-webserver
# 副本配置

replicaCount: 1
revisionHistoryLimitCount: 10
# 镜像配置

image:
  repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/unifiedbus/om-webserver-test
  tag: feature-add-delete-email-token-275ff0
  pullPolicy: IfNotPresent
  pullSecret: huawei-swr-image-pull-secret
containers:
  applicationPath: "/var/lib/om-webserver/application.properties"
  containerPort: 8080
  portsName: om-webserver
# 资源限制

resources:
  limits:
    cpu: 1000m
    memory: 2000Mi
  requests:
    cpu: 500m
    memory: 1000Mi
probeHttpGet:
  path: /oneid/checkOmService
  port: 8080
  scheme: HTTPS
# Vault配置

vault:
  runAsUser: "1001"
# Ingress配置

ingress:
  enabled: false
  className: nginx
  host: ""
  backendProtocol: "HTTPS"
  limitConnections: "400"
  limitRPS: "400"
  port: 8080
# 使用前端域名配置路径转发时启用该ingress
ingressNew:
  enabled: true
  name: omwebserver-ingress
  host: unifiedbus.test.osinfra.cn
  annotations:
    nginx.ingress.kubernetes.io/limit-connections: "400"
    nginx.ingress.kubernetes.io/proxy-body-size: 5m
    nginx.ingress.kubernetes.io/limit-rps: "400"
  path: /oneid(/|$)(.*)
  secretName: unifiedbus-omwebserver-tls
serviceAccount:
  create: true
  name: unifiedbus-omwebserver
# Service配置

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
secret:
  enabled: true
  ca_crt_path: secrets/data/infra-test/unifiedbus-domain-tls
  ca_crt_key: tls.cert
  tls_crt_path: secrets/data/infra-test/unifiedbus-domain-tls
  tls_crt_key: tls.cert
  tls_key_path: secrets/data/infra-test/unifiedbus-domain-tls
  tls_key_key: tls.key
podAnnotations:
  vault.hashicorp.com/agent-inject: 'true'
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/role: 'om-webserver'
  vault.hashicorp.com/agent-run-as-user: "1001"
  vault.hashicorp.com/agent-run-as-group: "1001"
  vault.hashicorp.com/agent-inject-perms-application.properties: "0400"
  vault.hashicorp.com/agent-inject-perms-tls.pfx: "0400"
  vault.hashicorp.com/agent-inject-secret-tls.pfx: 'internal/data/infra-test/unifiedbus-omwebserver'
  vault.hashicorp.com/agent-inject-template-tls.pfx: "{{- with secret \"internal/data/infra-test/unifiedbus-omwebserver\" -}}  \n{{ base64Decode .Data.data.tlspfx }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-secret-application.properties: 'internal/data/infra-test/unifiedbus-omwebserver'
  vault.hashicorp.com/agent-inject-template-application.properties: "{{- with secret \"internal/data/infra-test/unifiedbus-omwebserver\" -}}  \n{{ .Data.data.application }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
  vault.hashicorp.com/agent-inject-secret-redis.crt: 'internal/data/infra-test/unifiedbus-omwebserver'
  vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/infra-test/unifiedbus-omwebserver\" -}}  \n{{ .Data.data.redis }}\n{{- end }}\n"
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/secret-volume-path: "/var/lib/om-webserver"
  vault.hashicorp.com/log-level: "warn"
