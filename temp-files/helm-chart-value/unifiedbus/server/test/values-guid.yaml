guid:
  enabled: true
  name: unifiedbus-guid-management
  replicaCount: 1
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/unifiedbus/guid-management-test
    tag: "2bed53a99ce4d54e2bea5db9ae804259c3370ff9"
    pullPolicy: IfNotPresent
  podLabels:
    app: guid-management
  podAnnotations:
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/infra-test/unifiedbus'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-template-conf.yaml: "{{- with secret \"internal/data/infra-test/unifiedbus\" -}}  \n{{ .Data.data.guid }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-perms-es.crt: '0400'
    vault.hashicorp.com/agent-inject-secret-es.crt: internal/data/infra-test/unifiedbus
    vault.hashicorp.com/agent-inject-template-es.crt: "{{- with secret \"internal/data/infra-test/unifiedbus\" -}}  \n{{ .Data.data.GuidEsCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-perms-mq.crt: '0400'
    vault.hashicorp.com/agent-inject-secret-mq.crt: internal/data/infra-test/unifiedbus
    vault.hashicorp.com/agent-inject-template-mq.crt: "{{- with secret \"internal/data/infra-test/unifiedbus\" -}}  \n{{ .Data.data.kafkaCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-pg.crt: 'internal/data/infra-test/unifiedbus'
    vault.hashicorp.com/agent-inject-perms-pg.crt: "0400"
    vault.hashicorp.com/agent-inject-template-pg.crt: "{{- with secret \"internal/data/infra-test/unifiedbus\" -}}  \n{{ .Data.data.PgCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-redis.crt: 'internal/data/infra-test/unifiedbus'
    vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
    vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/infra-test/unifiedbus\" -}}  \n{{ .Data.data.GuidRedisCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.crt: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-template-server.crt: "{{- with secret \"internal/data/infra-test/domain-tls\" -}}  \n{{ .Data.data.TestOsinfraCnCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.key: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-template-server.key: "{{- with secret \"internal/data/infra-test/domain-tls\" -}}  \n{{ .Data.data.TestOsinfraCnKey }}\n{{- end }}\n"
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --enable-debug=true
    - --rm-config=false
    - --tls-key=/vault/secrets/server.key
    - --tls-cert=/vault/secrets/server.crt
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "1"
      memory: 1Gi
  volumeMounts:
    - mountPath: /opt/data/
      name: volume-data
      subPath: data
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
    - name: volume-data
      persistentVolumeClaim:
        claimName: unifiedbus-guid-data
  service:
    port: 8080
    targetPort: 8080
