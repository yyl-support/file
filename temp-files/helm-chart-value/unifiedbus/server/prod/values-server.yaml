server:
  name: server
  replicaCount: 10
  deployment:
    replicaCount: 0
    updateStrategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
  statefulset:
    replicaCount: 4
    updateStrategy:
      type: RollingUpdate
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/unifiedbus/website-backend-specification-prod
    tag: dev_zengchen1024-d7569a
    pullPolicy: IfNotPresent
  podLabels:
    app: server
  podAnnotations:
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/unifiedbus/unifiedbus-server'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-template-conf.yaml: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.server }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-mongo.crt: 'internal/data/unifiedbus/unifiedbus-server'
    vault.hashicorp.com/agent-inject-perms-mongo.crt: "0400"
    vault.hashicorp.com/agent-inject-template-mongo.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.mongoCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-redis.crt: 'internal/data/unifiedbus/unifiedbus-server'
    vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
    vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.serverRedisCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.crt: 'internal/data/unifiedbus/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-template-server.crt: "{{- with secret \"internal/data/unifiedbus/domain-tls\" -}}  \n{{ .Data.data.ServerCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.key: 'internal/data/unifiedbus/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-template-server.key: "{{- with secret \"internal/data/unifiedbus/domain-tls\" -}}  \n{{ .Data.data.ServerKey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-mq.crt: 'internal/data/unifiedbus/unifiedbus-server'
    vault.hashicorp.com/agent-inject-perms-mq.crt: "0400"
    vault.hashicorp.com/agent-inject-template-mq.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.kafkaCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-pg.crt: 'internal/data/unifiedbus/unifiedbus-server'
    vault.hashicorp.com/agent-inject-perms-pg.crt: "0400"
    vault.hashicorp.com/agent-inject-template-pg.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.PgCrt }}\n{{- end }}\n"
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --enable-debug=true
    - --rm-config=true
    - --tls-key=/vault/secrets/server.key
    - --tls-cert=/vault/secrets/server.crt
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  resources:
    limits:
      cpu: 4
      memory: 4Gi
    requests:
      cpu: 4
      memory: 4Gi
  volumeMounts:
    - name: volume-data
      mountPath: /opt/data
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
    - name: volume-data
      persistentVolumeClaim:
        claimName: unifiedbus-server-data-new
  service:
    port: 8080
    targetPort: 8080
