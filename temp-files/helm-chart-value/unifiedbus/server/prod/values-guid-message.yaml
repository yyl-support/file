guidmsg:
  enabled: true
  name: unifiedbus-guid-messageserver
  replicaCount: 1
  podLabels:
    app: guid-messageserver
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-perms-mq.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-secret-mq.crt: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-template-conf.yaml: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.guidMessageServer }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-mq.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\" -}}  \n{{ .Data.data.kafkaCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsUser: 1000
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/unifiedbus/guid-messageserver-prod
    tag: fdad0cbd050a37a7fed5b1f5fdacd451a6eef82a
    pullPolicy: IfNotPresent
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --enable-debug=true
    - --rm-config=false
  livenessProbe:
  readinessProbe:
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "1"
      memory: 1Gi
  volumeMounts: {}
  volumes:
    - name: token-vol
      projected:
        defaultMode: 420
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
  service:
    port: 8080
    targetPort: 8080
