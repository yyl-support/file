errata:
  enabled: true
  name: unifiedbus-errata-management
  replicaCount: 2
  podLabels:
    app: errata-management
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-perms-mq.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-pg.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-secret-mq.crt: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-secret-pg.crt: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-secret-redis.crt: internal/data/unifiedbus/unifiedbus-server
    vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/unifiedbus/domain-tls
    vault.hashicorp.com/agent-inject-secret-server.key: internal/data/unifiedbus/domain-tls
    vault.hashicorp.com/agent-inject-template-conf.yaml: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\"
      -}}  \n{{ .Data.data.errata }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-mq.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\"
      -}}  \n{{ .Data.data.kafkaCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-pg.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\"
      -}}  \n{{ .Data.data.PgCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/unifiedbus/unifiedbus-server\"
      -}}  \n{{ .Data.data.errataRedisCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-server.crt: "{{- with secret \"internal/data/unifiedbus/domain-tls\"
      -}}  \n{{ .Data.data.ServerCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-server.key: "{{- with secret \"internal/data/unifiedbus/domain-tls\"
      -}}  \n{{ .Data.data.ServerKey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    runAsUser: 1000
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/unifiedbus/errata-prod
    tag: main-f3855c
    pullPolicy: IfNotPresent
  args:
  - --config-file=/vault/secrets/conf.yaml
  - --port=8080
  - --enable-debug=false
  - --rm-config=true
  - --tls-key=/vault/secrets/server.key
  - --tls-cert=/vault/secrets/server.crt
  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /internal/v1/heartbeat
      port: 8080
      scheme: HTTPS
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /internal/v1/heartbeat
      port: 8080
      scheme: HTTPS
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "1"
      memory: 1Gi
  volumeMounts:
  volumes:
  - name: token-vol
    projected:
      defaultMode: 420
      sources:
      - serviceAccountToken:
          audience: api
          expirationSeconds: 600
          path: token
  service:
    port: 8080
    targetPort: 8080
