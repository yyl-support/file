# Chartversion: 1.0.7
namespace: openfuyao-om
autoscaling: 
  enabled: false
# deploymentLabels:
#   virtual-kubelet.io/burst-to-cci: enforce
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
serviceAccount:
  create: true
  name: openfuyao-om
imageRepository: swr.cn-north-4.myhuaweicloud.com/om/om-collection

imagePullSecrets:
  - name: huawei-swr-image-pull-secret

podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost

podAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/role: openfuyao-om
  vault.hashicorp.com/template-static-secret-render-interval: 5s
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-run-as-user: "1001"
  vault.hashicorp.com/agent-run-as-group: "1001"
  vault.hashicorp.com/secret-volume-path: /opt/config
  vault.hashicorp.com/log-level: "warn"
deployments:
  - name: openfuyao-meeting-collect
    replicaCount: 1
    imageTag: "0.6.59"
    imagePullPolicy: IfNotPresent
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config.ini: "0400"
      vault.hashicorp.com/agent-inject-secret-config.ini: internal/data/infra-test/openfuyao-om
      vault.hashicorp.com/agent-inject-template-config.ini: "{{- with secret \"internal/data/infra-test/openfuyao-om\" -}}  \n{{ .Data.data.Meeting }}\n{{- end }}\n"
    configPath: /opt/config
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsUser: 1001
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
    volumes:
      - name: token-vol
        projected:
          sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token

collectData:
  enabled: false
secret:
  enabled: false
