collectGithookDeployment:
  enabled: true
  name: collect-githook-deployment
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  podAnnotations:
    vault.hashicorp.com/log-level: "warn"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
