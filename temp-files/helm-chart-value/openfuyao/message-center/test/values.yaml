      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.kafkaHkCrt }}
      {{- end }}
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --handle-path=gitcode-hook
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/message-center/message-collect-githook-test
    tag: release-openfuyao-b8eb58
    pullPolicy: IfNotPresent
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  resources:
    requests:
