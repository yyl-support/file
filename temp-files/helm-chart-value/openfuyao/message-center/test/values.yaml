# chartVersion: v1.0.2
namespace: openfuyao-message-center
serviceAccount:
  name: openfuyao-message-center
# deploymentLabels:
#   virtual-kubelet.io/burst-to-cci: enforce
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
istio:
  nslabel: {}
imagePullSecrets:
  name: huawei-swr-image-pull-secret
collectDeployment:
  enabled: false
  name: collect-deployment
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  podAnnotations:
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/role: 'openfuyao-message-center'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-conf.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.collectConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-eur_build_conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-eur_build_conf.yaml: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-eur_build_conf.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.collectEurBuildConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-meeting_conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-meeting_conf.yaml: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-meeting_conf.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.collectMeetingConf }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-kafka.crt: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-kafka.crt: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.kafkaCrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-kafka-hk.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-kafka-hk.crt: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-kafka-hk.crt: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.kafkaHkCrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-certification_conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-certification_conf.yaml: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-certification_conf.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.collectCertification }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-software_review_conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-software_re review_conf.yaml: 'internal/data/infra-test/openfuyao-message-center'
    vault.hashicorp.com/agent-inject-template-software_review_conf.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-message-center" -}}
      {{ .Data.data.collectSoftwareReview }}
      {{- end }}
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --eur-build-config-file=/vault/secrets/eur_build_conf.yaml
    - --meeting-config-file=/vault/secrets/meeting_conf.yaml
    - --certification-config-file=/vault/secrets/certification_conf.yaml
    - --software-review-config-file=/vault/secrets/software_review_conf.yaml
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/message-center/message-collect-prod
    tag: release-openeuler-47690e
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 500Mi
