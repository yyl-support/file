specKeysMap:
  ca.crt:
    path: secrets/data/openfuyao/openfuyao-cn-tls
    key: server.crt
  tls.crt:
    path: secrets/data/openfuyao/openfuyao-cn-tls
    key: server.crt
  tls.key:
    path: secrets/data/openfuyao/openfuyao-cn-tls
    key: server.key

updatingSigs:
  enabled: true
  podSecurityContext:
    seccompProfile:
      localhostProfile: infra-seccomp.json
      type: Localhost
  schedule: 0 * * * *
  startingDeadlineSeconds: 180
  updatingSigs:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsUser: 1000
    env:
      configPath: /vault/secrets/config
      mysqlTlsPemPath: /vault/secrets/ca.pem
      tlsCrtPath: /vault/secrets/server.crt
      tlsKeyPath: /vault/secrets/server.key
      tz: Asia/Shanghai
      vaultPath: /vault/secrets/secrets.yaml
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi

