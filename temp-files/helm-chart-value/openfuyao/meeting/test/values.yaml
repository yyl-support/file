#chartVersion: 1.0.14
namespace:
  enabled: false
  name: openfuyao-meetingserver
serviceAccount:
  create: true
  name: openfuyao-meetingserver
strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
image:
  center:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/meeting/meeting-center
    tag: test_fuyao-949cba
    imagePullPolicy: IfNotPresent
  platform:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openfuyao/meeting-platform-test
    tag: main-e1ce3b
    imagePullPolicy: IfNotPresent
initContainer:
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler
    tag: 22.03-lts-sp3
podAnnotations:
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/role: openfuyao-meetingserver
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
  vault.hashicorp.com/agent-inject-perms-ca.pem: "0400"
  vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
  vault.hashicorp.com/agent-inject-perms-server.key: "0400"
  vault.hashicorp.com/agent-inject-secret-ca.pem: internal/data/infra-test/openfuyao-meetingserver
  vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/infra-test/openfuyao-meetingserver
  vault.hashicorp.com/agent-inject-secret-server.key: internal/data/infra-test/openfuyao-meetingserver
  vault.hashicorp.com/agent-inject-template-ca.pem: |
    {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
    {{ .Data.data.MysqlCA }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.crt: |
    {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
    {{ .Data.data.servercrt }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.key: |
    {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
    {{ .Data.data.serverkey }}
    {{- end }}
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
ingress:
  enabled: true
  name: openfuyao-meetingserver-ingress
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  host: "meeting-center.openfuyao.test.osinfra.cn"
  serviceName: meeting-center
  serviceNumber: 8080
# 后端使用ingress路径转发时启用ingressNew
ingressNew:
  enabled: false
  name: meeting-center
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /api/v1/meeting$1
  host: ""
  path: /api-meeting(.*)
  pathType: Prefix
  secretName: meeting-server-tls
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
meetingCenter:
  enabled: true
  name: meeting-center
  replicas: 1
  # deploymentLabels:
  #   virtual-kubelet.io/burst-to-cci: enforce
  podLabels:
    app: meeting-center
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  service:
    type: ClusterIP
    annotations: {}
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openfuyao-meetingserver
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openfuyao-meetingserver
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
      {{ .Data.data.centerConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
      {{ .Data.data.centerSecrets }}
      {{- end }}
meetingPlatform:
  enabled: true
  name: meeting-platform
  replicas: 1
  # deploymentLabels:
  #   virtual-kubelet.io/burst-to-cci: enforce
  podLabels:
    app: meeting-platform
  resources:
    requests:
      cpu: 50m
      memory: 500Mi
  service:
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
    type: ClusterIP
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/openfuyao-meetingserver
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/openfuyao-meetingserver
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
      {{ .Data.data.platformConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/openfuyao-meetingserver" -}}
      {{ .Data.data.platformSecrets }}
      {{- end }}
meetingServer:
  enabled: false
secret:
  enabled: true
  name: meeting-server-tls
  specKeysMap:
    ca.crt:
      path: secrets/data/infra-test/openfuyao-domain-tls
      key: tls.cert
    tls.crt:
      path: secrets/data/infra-test/openfuyao-domain-tls
      key: tls.cert
    tls.key:
      path: secrets/data/infra-test/openfuyao-domain-tls
      key: tls.key
cronjobCommon:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsUser: 1000
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/config
    - name: VAULT_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
cronjobs: []
