ingress:
  enabled: true
  name: openfuyao-docs-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: 4m
  host: 'docs.openfuyao.test.osinfra.cn'
secret:
  enable: true
  name: openfuyao-domain-tls
  path: secrets/data/infra-test/openfuyao-domain-tls
  crtKey: tls.cert
  crtKey: tls.cert
  keyKey: tls.key
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  tlsMode: SIMPLE
  mtlsMode: DISABLE
  vs:
    name:
    host:
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host:
              port:
                number: 8080
  dr:
    - name:
      serviceName:
      port: 8080
  pa:
    - name:
      podLabels:
        app: docs-common
