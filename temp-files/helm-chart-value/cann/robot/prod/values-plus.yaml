# Default values for global.
serviceAccount:
  name: cann-robot
  annotations: {}
global:
  deployment:
    initContainers:
      initOpeneuler:
        - command:
            - /bin/bash
            - -c
            - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets; ls -ld /vault/secrets
          image: swr.cn-southwest-2.myhuaweicloud.com/ascend_infra/openeuler:22.03-lts-sp3
          imagePullPolicy: IfNotPresent
          name: init-openeuler
          resources: {}
  specKeysMap:
    ca.crt:
      key: server.crt
      path: secrets/data/infra-common/osinfra-cn
    tls.crt:
      key: server.crt
      path: secrets/data/infra-common/osinfra-cn
    tls.key:
      key: server.key
      path: secrets/data/infra-common/osinfra-cn
  secret:
    name: osinfra-cn-tls
  service:
    ports:
      - name: http-port
        port: 8888
        protocol: TCP
        targetPort: 8888
    type: ClusterIP
# Default values for robot-access.
access:
  enabled: true
  configmap:
    name: configmap-access
    config: |-
      access:
        repo_plugins:
          - org_or_repo: 
              - cann
            plugin_name:
              - robot-service-keeper-approve
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
              - robot-service-associate
        plugins:
          - name: robot-service-keeper-approve
            endpoint: http://robot-universal-keeper-approve-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.cann-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
  deployment:
    podSecurityContext:
      seccompProfile:
        localhostProfile: infra-seccomp.json
        type: Localhost
    replicas: 1
    robotUniversalAccess:
      args:
        - --port=8888
        - --handle-path=gitcode-hook
        - --config-file=/app/conf/config
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsUser: 1000
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 1Gi
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
  NetworkPolicy:
    enabled: false
# Default values for robot-assign.
assign:
  enabled: true
  configmap:
    name: configmap-assign
    config: |-
      config_items:
        - repos:
            - cann
          enable_issue_assign: true
          default_assignee: ""
      community_robot_id: CANN-robot
      msg_multiple_assignee: "### Notice \nCan only assign one assignee to the issue."
      msg_assign_repeatedly: "### Notice \nThis issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "### Notice \nThis issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "### Notice \n***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "### Notice \nThis issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  robotUniversalAssign:
    podSecurityContext:
      seccompProfile:
        localhostProfile: infra-seccomp.json
        type: Localhost
    replicas: 2
    robotUniversalAssign:
      args:
        - --port=8888
        - --config-file=/app/conf/app_config/config.yaml
        - --handle-path=gitcode-hook
        - --token-path=/vault/secrets/token
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsUser: 1000
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 1Gi
    strategy:
      rollingUpdate:
        maxSurge: 2
        maxUnavailable: 0
      type: RollingUpdate
  podAnnotations:
    vault.hashicorp.com/agent-init-first: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-token: "0400"
    vault.hashicorp.com/agent-inject-secret-token: internal/data/cann/robot
    vault.hashicorp.com/agent-inject-template-token: |
      {{- with secret "internal/data/cann/robot" -}}
      {{ .Data.data.token }}
      {{- end }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/role: cann-robot
    vault.hashicorp.com/tls-skip-verify: "true"
  NetworkPolicy:
    enabled: false
# Default values for robot-cla.
cla:
  enabled: true
  configmap:
    name: configmap-cla
    config: |-
      config_items:
        - repos:
          - cann
          cla_label_yes: cann-cla/yes
          cla_label_no: cann-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/68cbd4a3dbabc050b436cdd4
          sign_url: https://clasign.osinfra.cn/sign/68cbd4a3dbabc050b436cdd4
          faq_url: https://gitcode.com/cann/infrastructure/blob/main/docs/cla/cla%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97.md#faq
          check_by_committer: true
          lite_pr_committer:
            email: noreply@gitcode.com
            email_patch: "noreply@gitee.com"
            name: GitCode
      
      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "### CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "### CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "### CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) have not signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nIf you need to sign CLA, [you can click here to sign the CLA](%s). \n\nIf you need to check if the email is set up correctly, [you can click here to do it in the **<font color=red>_FAQs_</font>**](%s). \n\nAfter signing the CLA or updating the email, you must comment `/check-cla` to check the CLA status again."
      comment_update_label_failed: "### CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "### CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      sig_info_url: https://dsapi.test.osinfra.cn/query/sig/info
      community_name: cann
      community_robot_id: CANN-robot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "the email used in the commit is platform default email: ***@noreply.gitcode.com! <br>使用了Gitcode平台系统默认邮箱，需要在平台个人设置里绑定个人邮箱."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email is not signed for CLA! please check if it is correct and the same as your signed email."
      message_individual_version_behind: "since the individual CLA content has been updated, [please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/68cbd4a3dbabc050b436cdd4/individual-update?email=%s)."
      message_corporation_version_behind: "since the corporation CLA content has been updated, please contact the corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"

  deployment:
    podSecurityContext:
      seccompProfile:
        localhostProfile: infra-seccomp.json
        type: Localhost
    replicas: 2
    robotUniversalCla:
      args:
        - --port=8888
        - --config-file=/app/conf/config
        - --handle-path=gitcode-hook
        - --token-path=/vault/secrets/token
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsUser: 1000
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 1Gi
    strategy:
      rollingUpdate:
        maxSurge: 2
        maxUnavailable: 0
      type: RollingUpdate
  podAnnotations:
    vault.hashicorp.com/agent-init-first: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-token: "0400"
    vault.hashicorp.com/agent-inject-secret-token: internal/data/cann/robot
    vault.hashicorp.com/agent-inject-template-token: |
      {{- with secret "internal/data/cann/robot" -}}
      {{ .Data.data.token }}
      {{- end }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
