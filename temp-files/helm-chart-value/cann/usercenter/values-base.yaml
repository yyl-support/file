strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 2
    maxSurge: 2

podSecurityContext:
 seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000

initContainers:
- command:
  - /bin/bash
  - -c
  - chmod 0700 /etc/nginx/cert/; chown -R 1000:1000 /etc/nginx/cert/; chmod g-s /etc/nginx/cert/; ls -ld /etc/nginx/cert/
  image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
  imagePullPolicy: IfNotPresent
  name: init-openeuler

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 20
  successThreshold: 1
  httpGet:
    scheme: HTTPS
    path: /
    port: 8080
  timeoutSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3
  httpGet:
    scheme: HTTPS
    path: /
    port: 8080

volumeMounts: []

volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token