meetingCenter:
  enabled: true
  name: cann-meeting-center
  replicas: 1
  podLabels:
    app: cann-meeting-center
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 500Mi
  service:
    type: ClusterIP
    annotations: {}
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/ascend" -}}
      {{ .Data.data.meetingCenterConfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/ascend" -}}
      {{ .Data.data.meetingCenterSecrets }}
      {{- end }}
meetingPlatform:
  enabled: true
  name: cann-meeting-platform
  replicas: 1
  podLabels:
    app: cann-meeting-platform
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "1"
      memory: 1000Mi
  service:
    ports:
      - name: http-port
        port: 8080
        protocol: TCP
        targetPort: 8080
    type: ClusterIP
  podAnnotations:
    vault.hashicorp.com/agent-inject-perms-config: "0400"
    vault.hashicorp.com/agent-inject-perms-kafka.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
    vault.hashicorp.com/agent-inject-secret-kafka.crt: internal/data/infra-test/ascend
    vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "internal/data/infra-test/ascend" -}}
      {{ .Data.data.meetingPlatformconfig }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-kafka.crt: |
      {{- with secret "internal/data/infra-test/ascend" -}}
      {{ .Data.data.meetingPlatformKafkacrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-secrets.yaml: |
      {{- with secret "internal/data/infra-test/ascend" -}}
      {{ .Data.data.meetingPlatformSecrets }}
      {{- end }}
secret:
  enabled: false
  # name: ascend-domain-tls
  # specKeysMap:
  #   ca.crt:
  #     path: secrets/data/ascend/meeting-osinfra-cn-tls
  #     key: server.crt
  #   tls.crt:
  #     path: secrets/data/ascend/meeting-osinfra-cn-tls
  #     key: server.crt
  #   tls.key:
  #     path: secrets/data/ascend/meeting-osinfra-cn-tls
  #     key: server.key
cronjobCommon:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsUser: 1000
  env:
    - name: TZ
      value: Asia/Shanghai
    - name: CONFIG_PATH
      value: /vault/secrets/config
    - name: VAULT_PATH
      value: /vault/secrets/secrets.yaml
    - name: MYSQL_TLS_PEM_PATH
      value: /vault/secrets/ca.pem
    - name: TLS_CRT_PATH
      value: /vault/secrets/server.crt
    - name: TLS_KEY_PATH
      value: /vault/secrets/server.key
cronjobs:
  - enabled: true
    name: cann-handle-meeting
    labels:
      app: cann-handle-meeting
    concurrencyPolicy: Forbid
    schedule: "*/15 * * * *"
    suspend: false
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-template-config: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformconfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformSecrets }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python3 manage.py handle_meeting
    image:
      repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceway/meeting-platform
      tag: "main-48e229"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
  - enabled: true
    name: cann-handle-recording
    labels:
      app: cann-handle-recording
    concurrencyPolicy: Forbid
    schedule: "30 * * * *"
    suspend: false
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-template-config: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformconfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformSecrets }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python3 manage.py handle_recordings
    image:
      repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceway/meeting-platform
      tag: "main-48e229"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
  - enabled: true
    name: cann-updating-sigs
    labels:
      app: cann-updating-sigs
    concurrencyPolicy: Forbid
    schedule: "0 * * * *"
    suspend: true
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-template-config: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingCenterConfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingCenterSecrets }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python manage.py sync_sig
    image:
      repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceway/meeting-center
      tag: "main-fdd91f"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
  - enabled: true
    name: cann-handle-meeting-status
    labels:
      app: cann-handle-meeting-status
    concurrencyPolicy: Forbid
    schedule: "*/5 * * * *"
    suspend: false
    restartPolicy: OnFailure
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-secrets.yaml: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-secret-secrets.yaml: internal/data/infra-test/ascend
      vault.hashicorp.com/agent-inject-template-config: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformconfig }}
        {{- end }}
      vault.hashicorp.com/agent-inject-template-secrets.yaml: |
        {{- with secret "internal/data/infra-test/ascend" -}}
        {{ .Data.data.meetingPlatformSecrets }}
        {{- end }}
    command:
      - /bin/sh
      - -c
      - |
        python3 manage.py handle_meeting_status
    image:
      repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceway/meeting-platform
      tag: "main-48e229"
      imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi
