#chartVersion: 1.0.9
namespace:
  enabled: false
  name: ascend
serviceAccount:
  create: false
  name: ascend
strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate
image:
  center:
    name: meeting-center
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/meeting/meeting-center
    tag: "main-fdd91f"
    imagePullPolicy: IfNotPresent
  platform:
    name: meeting-platform
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/meeting/meeting-platform
    tag: "main-48e229"
    imagePullPolicy: IfNotPresent
initContainer:
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler
    tag: 22.03-lts-sp3
podAnnotations:
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/role: ascend
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
  vault.hashicorp.com/agent-inject-perms-ca.pem: "0400"
  vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
  vault.hashicorp.com/agent-inject-perms-server.key: "0400"
  vault.hashicorp.com/agent-inject-secret-ca.pem: internal/data/infra-test/ascend
  vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/infra-test/domain-tls
  vault.hashicorp.com/agent-inject-secret-server.key: internal/data/infra-test/domain-tls
  vault.hashicorp.com/agent-inject-template-ca.pem: |
    {{- with secret "internal/data/infra-test/ascend" -}}
    {{ .Data.data.meetingMysqlCA }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.crt: |
    {{- with secret "internal/data/infra-test/domain-tls" -}}
    {{ .Data.data.TestOsinfraCnCrt }}
    {{- end }}
  vault.hashicorp.com/agent-inject-template-server.key: |
    {{- with secret "internal/data/infra-test/domain-tls" -}}
    {{ .Data.data.TestOsinfraCnKey }}
    {{- end }}
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
ingress:
  enabled: false
  host: ""
  port:
    number: 80
# 后端使用ingress路径转发时启用ingressNew
ingressNew:
  enabled: true
  name: meeting-center
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /api/v1/meeting$1
  host: cann-website.ascend.test.osinfra.cn
  path: /cann-meeting(.*)
  pathType: Prefix
  secretName: ascend-tls
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: "istio-system/istio-gateway-https"
  host: ""
  # vs:
  #   http:
  #     - match:
  #       - uri:
  #           prefix: /api-platform/
  #       rewrite:
  #         uri: /
  #       route:
