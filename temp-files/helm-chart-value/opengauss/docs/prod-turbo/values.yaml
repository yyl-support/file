ingress:
  enabled: true
  name: opengauss-docs-ingres
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  host: 'docs.opengauss.org'
secret:
  enable: true
  name: tls-secrets
  path: secrets/data/opengauss/opengauss-org-tls
  crtKey: server.crt
  crtKey: server.crt
  keyKey: server.key
istio:
  enabled: false
  nslabel: {}
  # istio-injection: enabled
  gateway: istio-system/istio-gateway-https
  tlsMode: SIMPLE
  mtlsMode: DISABLE
  vs:
    name: opengauss-docs-vs
    host: docs.opengauss.org
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host: docs-website-common.opengauss-docs-new.svc.cluster.local
              port:
                number: 8080
  dr:
    - name: opengauss-docs-dr
      serviceName: docs-website-common
      port: 8080
  pa:
    - name: opengauss-docs-pa
      podLabels:
        app: docs-common
