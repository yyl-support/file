#chartVersion: 1.0.8
deployment:
  replicaCount: 1
  # labels:
  #   virtual-kubelet.io/burst-to-cci: enforce
  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/etherpad
    pullPolicy: IfNotPresent
    tag: "main-891d7e"
  imagePullSecrets:
    - name: huawei-swr-image-pull-secret
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-apikey.txt: "0400"
    vault.hashicorp.com/agent-inject-perms-credentials.json: "0400"
    vault.hashicorp.com/agent-inject-secret-apikey.txt: internal/data/infra-test/opengauss-etherpad
    vault.hashicorp.com/agent-inject-secret-credentials.json: internal/data/infra-test/opengauss-etherpad
    vault.hashicorp.com/agent-inject-template-apikey.txt: "{{- with secret \"internal/data/infra-test/opengauss-etherpad\"
      -}}  \n{{ .Data.data.apikey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-credentials.json: "{{- with secret
      \"internal/data/infra-test/opengauss-etherpad\" -}}  \n{{ .Data.data.config }}\n{{-
      end }}\n"
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "5001"
    vault.hashicorp.com/agent-run-as-user: "5001"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/log-level: warn
    vault.hashicorp.com/role: opengauss-etherpad
    vault.hashicorp.com/tls-skip-verify: "true"
  containerName: etherpad-lite
  ports:
    - containerPort: 9001
      name: http
      protocol: TCP

# This is to override the chart name.
nameOverride: ""
fullnameOverride: "opengauss-etherpad"  

namespace: opengauss-etherpad
serviceAccount:
  create: true
  name: opengauss-etherpad
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
secretDefinitions:
  tls-secrets:
    enabled: true
    keysMap:
      ca.crt:
        key: tls.cert
        path: secrets/data/infra-test/domain-tls
      tls.crt:
        key: tls.cert
        path: secrets/data/infra-test/domain-tls
      tls.key:
        key: tls.key
        path: secrets/data/infra-test/domain-tls


# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  ports:
    - name: ether-http
      port: 9001
      protocol: TCP
      targetPort: 9001
  type: ClusterIP

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-credentials: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ^~ /admin {
        deny all;
      }
      location ^~ /stats {
        deny all;
      }
  hosts:
    - host: opengauss-etherpad.test.osinfra.cn
      paths:
        - path: /
          pathType: Prefix
          portNumber: 9001
  tlsHosts:
    - host: opengauss-etherpad.test.osinfra.cn
      secretsName: tls-secrets

istio:
  enabled: false
  nslabel: {}
    # istio-injection: enabled
  # gateway: "istio-system/istio-gateway-https"
  # host: opengauss-etherpad.test.osinfra.cn
  # virtualService:
  #   routes:
  #     - destinations:
  #         - host: "opengauss-etherpad-service.opengauss-etherpad.svc.cluster.local"
  #       match:
  #       - uri:
  #           prefix: /
  # tls:
  #   mode: DISABLE
  # mtls:
  #   mode: DISABLE

resources:
  requests:
    cpu: "50m"
    memory: 500Mi

pvc:
  etherpad-data-vol:
    enabled: true
    annotations: {}
      # everest.io/disk-volume-type: SSD
    accessModes:
      - ReadWriteMany
    storage: 5Gi
    storageClassName: sfsturbo-subpath-sc
    # volumeName: ""
    volumeMode: Filesystem

# Additional volumes on the output Deployment definition.
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
  - name: data-volume
    persistentVolumeClaim:
      claimName: etherpad-data-vol
  # - name: plugin-volume
  #   persistentVolumeClaim:
  #     claimName: etherpad-plugin-vol

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /opt/etherpad-lite/var
    name: data-volume
  # - mountPath: /opt/etherpad-lite/plugin_packages
  #   name: plugin-volume
