#chartVersion: 1.0.7
deployment:
  replicaCount: 1
  labels:
    app: etherpad
  strategy:
    type: Recreate
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/etherpad
    pullPolicy: IfNotPresent
    tag: "main-383f61"
  imagePullSecrets:
    - name: huawei-swr-image-pull-secret
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-apikey.txt: "0400"
    vault.hashicorp.com/agent-inject-perms-credentials.json: "0400"
    vault.hashicorp.com/agent-inject-secret-apikey.txt: internal/data/opengauss/etherpad
    vault.hashicorp.com/agent-inject-secret-credentials.json: internal/data/opengauss/etherpad
    vault.hashicorp.com/agent-inject-template-apikey.txt: "{{- with secret \"internal/data/opengauss/etherpad\" -}}  \n{{ .Data.data.apikey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-credentials.json: "{{- with secret \"internal/data/opengauss/etherpad\" -}}  \n{{ .Data.data.config }}\n{{- end }}\n"
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "5001"
    vault.hashicorp.com/agent-run-as-user: "5001"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/log-level: warn
    vault.hashicorp.com/role: etherpad
    vault.hashicorp.com/tls-skip-verify: "true"
  containerName: etherpad-lite
  ports:
    - containerPort: 9001
      name: http
      protocol: TCP
# This is to override the chart name.
nameOverride: ""
fullnameOverride: "opengauss-etherpad"
namespace: opengauss-etherpad
serviceAccount:
  create: true
  name: etherpad
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
secretDefinitions:
  etherpad-tls:
    enabled: false
    keysMap:
      ca.crt:
        key: server.crt
        path: secrets/data/opengauss/etherpad
      tls.crt:
        key: server.crt
        path: secrets/data/opengauss/etherpad
      tls.key:
        key: server.key
        path: secrets/data/opengauss/etherpad
# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  ports:
    - name: ether-http
      port: 9001
      protocol: TCP
      targetPort: 9001
  type: ClusterIP
# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-credentials: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ^~ /admin {
        deny all;
      }
      location ^~ /stats {
        deny all;
      }
  hosts:
    - host: etherpad.opengauss.org
      paths:
        - path: /
          pathType: Prefix
          portNumber: 9001
  tlsHosts:
    - host: etherpad.opengauss.org
      secretsName: etherpad-tls
istio:
  enabled: true
  nslabel:
    istio-injection: enabled
  gateway: "istio-system/istio-gateway-https"
  host: etherpad.opengauss.org
  virtualService:
    routes:
      - destinations:
          - host: "opengauss-etherpad-service.opengauss-etherpad.svc.cluster.local"
        match:
          - uri:
              prefix: /
  tls:
    mode: DISABLE
  mtls:
    mode: DISABLE
resources:
  limits:
    cpu: "2"
    memory: 4000Mi
  requests:
    cpu: "1"
    memory: 1000Mi
pvc:
  ether-data-vol-v2:
    enabled: true
    annotations: {}
    # everest.io/disk-volume-type: SSD
    labels:
      failure-domain.beta.kubernetes.io/region: ap-southeast-1
      failure-domain.beta.kubernetes.io/zone: ap-southeast-1a
    accessModes:
      - ReadWriteOnce
    storage: 100Gi
    storageClassName: csi-disk
    volumeName: "pvc-5ccfd96e-fc05-413a-9d29-7ae140df980d"
    volumeMode: Filesystem
  etherpad-plugin-vol:
    enabled: false
    annotations:
      everest.io/disk-volume-type: SSD
    labels:
      failure-domain.beta.kubernetes.io/region: ap-southeast-1
      failure-domain.beta.kubernetes.io/zone: ap-southeast-1c
    accessModes:
      - ReadWriteOnce
    storage: 1Gi
    storageClassName: csi-disk
    volumeName: ""
    volumeMode: Filesystem
# Additional volumes on the output Deployment definition.
volumes:
  - name: data-volume
    persistentVolumeClaim:
      claimName: ether-data-vol-v2
  # - name: plugin-volume
  #   persistentVolumeClaim:
  #     claimName: etherpad-plugin-vol
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /opt/etherpad-lite/var
    name: data-volume
# - mountPath: /opt/etherpad-lite/plugin_packages
#   name: plugin-volume
