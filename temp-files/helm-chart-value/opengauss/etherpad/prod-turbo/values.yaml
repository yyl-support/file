#chartVersion: 1.0.8
deployment:
  replicaCount: 1
  labels:
    virtual-kubelet.io/burst-to-cci: enforce
  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/etherpad
    pullPolicy: IfNotPresent
    tag: "main-383f61"
  imagePullSecrets:
    - name: huawei-swr-image-pull-secret
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-apikey.txt: "0400"
    vault.hashicorp.com/agent-inject-perms-credentials.json: "0400"
    vault.hashicorp.com/agent-inject-secret-apikey.txt: internal/data/opengauss/etherpad
    vault.hashicorp.com/agent-inject-secret-credentials.json: internal/data/opengauss/etherpad
    vault.hashicorp.com/agent-inject-template-apikey.txt: "{{- with secret \"internal/data/opengauss/etherpad\" -}}  \n{{ .Data.data.apikey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-credentials.json: "{{- with secret \"internal/data/opengauss/etherpad\" -}}  \n{{ .Data.data.config }}\n{{- end }}\n"
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "5001"
    vault.hashicorp.com/agent-run-as-user: "5001"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/log-level: warn
    vault.hashicorp.com/role: etherpad
    vault.hashicorp.com/tls-skip-verify: "true"
  containerName: etherpad-lite
  ports:
    - containerPort: 9001
      name: http
      protocol: TCP
# This is to override the chart name.
nameOverride: ""
fullnameOverride: "opengauss-etherpad"
namespace: opengauss-etherpad
serviceAccount:
  create: true
  name: etherpad
autoscale:
  enabled: false
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
secretDefinitions:
  etherpad-tls:
    enabled: true
    keysMap:
      ca.crt:
        key: server.crt
        path: secrets/data/opengauss/opengauss-org-tls
      tls.crt:
        key: server.crt
        path: secrets/data/opengauss/opengauss-org-tls
      tls.key:
        key: server.key
        path: secrets/data/opengauss/opengauss-org-tls
# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  ports:
    - name: ether-http
      port: 9001
      protocol: TCP
      targetPort: 9001
  type: ClusterIP
# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-credentials: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ^~ /admin {
        deny all;
      }
      location ^~ /stats {
        deny all;
      }
  hosts:
    - host: etherpad.opengauss.org
      paths:
        - path: /
          pathType: Prefix
          portNumber: 9001
  tlsHosts:
    - host: etherpad.opengauss.org
      secretsName: etherpad-tls
istio:
  enabled: false
  nslabel: {}
    # istio-injection: enabled
  # gateway: "istio-system/istio-gateway-https"
  # host: etherpad.opengauss.org
  # virtualService:
  #   routes:
  #     - destinations:
  #         - host: "opengauss-etherpad-service.opengauss-etherpad.svc.cluster.local"
  #       match:
  #         - uri:
  #             prefix: /
  # tls:
  #   mode: DISABLE
  # mtls:
  #   mode: DISABLE
resources:
  limits:
    cpu: "1"
    memory: 2Gi
  requests:
    cpu: "1"
    memory: 1000Mi
pvc:
  etherpad-data:
    enabled: true
    annotations: {}
    # everest.io/disk-volume-type: SSD
    accessModes:
      - ReadWriteMany
    storage: 500Gi
    storageClassName: csi-sfsturbo
    volumeMode: Filesystem
# Additional volumes on the output Deployment definition.
volumes:
  - name: data-volume
    persistentVolumeClaim:
      claimName: etherpad-data
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /opt/etherpad-lite/var
    name: data-volume
