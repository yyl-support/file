namespace: om-webserver-opengauss
serviceAccount:
  create: true
  name: opengauss-omwebserver
imagePullSecret: huawei-swr-image-pull-secret
deployments:
  - name: om-webserver
    replicaCount: 2
    podLabels:
      app: om-webserver
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    podAnnotations:
      traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0
      vault.hashicorp.com/agent-inject: "true"
      vault.hashicorp.com/agent-inject-perms-application.properties: "0400"
      vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
      vault.hashicorp.com/agent-inject-perms-tls.pfx: "0400"
      vault.hashicorp.com/agent-inject-secret-application.properties: internal/data/infra-common/opengauss-omwebserver
      vault.hashicorp.com/agent-inject-secret-redis.crt: internal/data/infra-common/opengauss-omwebserver
      vault.hashicorp.com/agent-inject-secret-tls.pfx: internal/data/infra-common/opengauss-omwebserver
      vault.hashicorp.com/agent-inject-template-application.properties: "{{- with secret \"internal/data/infra-common/opengauss-omwebserver\" -}}  \n{{ .Data.data.application_properties }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/infra-common/opengauss-omwebserver\" -}}  \n{{ .Data.data.redis }}\n{{- end }} \n"
      vault.hashicorp.com/agent-inject-template-tls.pfx: "{{- with secret \"internal/data/infra-common/opengauss-omwebserver\" -}}  \n{{ base64Decode .Data.data.tlspfx }}\n{{- end }} \n"
      vault.hashicorp.com/agent-pre-populate-only: "true"
      vault.hashicorp.com/agent-run-as-group: "1001"
      vault.hashicorp.com/agent-run-as-user: "1001"
      vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
      vault.hashicorp.com/role: opengauss-omwebserver
      vault.hashicorp.com/secret-volume-path: /vault/secrets
      vault.hashicorp.com/tls-skip-verify: "true"
      vault.hashicorp.com/log-level: "warn"
    applicationPath: /vault/secrets/application.properties
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/om/om-webserver-prod
      tag: "release-om-webserver-20260430-208e28"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "2"
        memory: 8000Mi
      requests:
        cpu: 1
        memory: 5000Mi
    heathCheckPath:
      path: /oneid/checkOmService
      port: 8080
      scheme: HTTPS
    containerPort: 8080
ingress: []
services:
  - name: om-webserver-service
    type: ClusterIP
    port: 8080
    portName: tls-1
    targetPort: 8080
    podLabels:
      app: om-webserver
secrets: []
istio:
  enabled: true
  nslabel:
    istio-injection: enabled
  gateway: istio-system/istio-gateway-https-opengauss-osinfra
  vs:
    name: opengauss-om-webserver-virtualservice
    host: oneidapi.opengauss.osinfra.cn
    http:
      - match:
          - uri:
              prefix: /
        rewrite:
          uri: /
        route:
          - destination:
              host: om-webserver-service.om-webserver-opengauss.svc.cluster.local
              port:
                number: 8080
  tlsMode: SIMPLE
  mtlsMode: DISABLE
  dr:
    - name: destinationrule-om-webserver-opengauss
      serviceName: om-webserver-service
      port: 8080
  pa:
    - name: peerauthentication-om-webserver-opengauss-disable-mtls
      podLabels:
        app: om-webserver
