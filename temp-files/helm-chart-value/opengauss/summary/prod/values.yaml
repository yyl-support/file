oauth:
  - provider: gitcode
    replicaCount: 2
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    podLabels:
      k8s-app: opengauss-oauth2-proxy
    podAnnotations:
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/oauth2-proxy
      tag: 9afd647d7b62b5699dfbe1cada880e4b8658318e
      pullPolicy: Always
    args:
      - --provider=gitcode
      - --email-domain=*
      - --proxy-prefix=/oauth2
      - --skip-validate-email=true
      - --skip-auth-regex=^/agreement_zh.html
      - --skip-auth-regex=^/agreement_en.html
      - --upstream=http://opengauss-summary-website-service.opengauss-summary.svc.cluster.local:8080
      - --http-address=0.0.0.0:4180
      - --cookie-expire=6h0m0s
      - --set-xauthrequest=true
      - --custom-templates-dir=/bin/static/login
      - --custom-templates-sign-in=gauss.html
    env:
      - name: OAUTH2_PROXY_CLIENT_ID
        value: opengauss_client_id
      - name: OAUTH2_PROXY_CLIENT_SECRET
        value: opengauss_client_secret
      - name: OAUTH2_PROXY_COOKIE_SECRET
        value: opengauss_cookie_secret
    secret:
      name: opengauss-oauth-secrets
      path: secrets/data/opengauss/summary-new
    service:
      port: 4180
      targetPort: 4180
      type: ClusterIP
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 4180
      timeoutSeconds: 5
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 4180
      timeoutSeconds: 5
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi
    volumeMounts:
    securityContext:
    volumes:
    ingress:
      annotations:
      host: summary.opengauss.org
      className: nginx
      path: /
      annotations:
        nginx.ingress.kubernetes.io/server-snippet: |
          rewrite ^/$ /zh permanent;
  - provider: gitcode-en
    replicaCount: 2
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    podLabels:
      k8s-app: opengauss-oauth2-proxy-en
    podAnnotations:
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/oauth2-proxy
      tag: 9afd647d7b62b5699dfbe1cada880e4b8658318e
      pullPolicy: Always
    args:
      - --provider=gitcode
      - --email-domain=*
      - --proxy-prefix=/en
      - --skip-validate-email=true
      - --skip-auth-regex=^/agreement_zh.html
      - --skip-auth-regex=^/agreement_en.html
      - --upstream=http://opengauss-summary-website-service.opengauss-summary.svc.cluster.local:8080
      - --http-address=0.0.0.0:4180
      - --cookie-expire=6h0m0s
      - --set-xauthrequest=true
      - --custom-templates-dir=/bin/static/login
      - --custom-templates-sign-in=gauss-en.html
    env:
      - name: OAUTH2_PROXY_CLIENT_ID
        value: opengauss_en_client_id
      - name: OAUTH2_PROXY_CLIENT_SECRET
        value: opengauss_en_client_secret
      - name: OAUTH2_PROXY_COOKIE_SECRET
        value: opengauss_en_cookie_secret
    secret:
      name: opengauss-en-oauth-secrets
      path: secrets/data/opengauss/summary-new
    service:
      port: 4180
      targetPort: 4180
      type: ClusterIP
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 4180
      timeoutSeconds: 5
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 4180
      timeoutSeconds: 5
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi
    volumeMounts:
    securityContext:
    volumes:
    ingress:
      annotations:
      host: summary.opengauss.org
      className: nginx
      path: /en
website:
  enabled: true
  name: summary-website
  replicaCount: 3
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 2
    type: RollingUpdate
  podLabels:
    app: opengauss-summary
  podAnnotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-abc.txt: "0400"
    vault.hashicorp.com/agent-inject-perms-dhparam.pem: "0400"
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-secret-abc.txt: internal/data/opengauss/opengauss-summary
    vault.hashicorp.com/agent-inject-secret-dhparam.pem: internal/data/opengauss/opengauss-summary
    vault.hashicorp.com/agent-inject-secret-server.crt: internal/data/opengauss/opengauss-summary
    vault.hashicorp.com/agent-inject-secret-server.key: internal/data/opengauss/opengauss-summary
    vault.hashicorp.com/agent-inject-template-abc.txt: |
      {{- with secret "internal/data/opengauss/opengauss-summary" -}}
      {{ .Data.data.certificatePassword }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-dhparam.pem: |
      {{- with secret "internal/data/opengauss/opengauss-summary" -}}
      {{ .Data.data.dhparamPem }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-server.crt: |
      {{- with secret "internal/data/opengauss/opengauss-summary" -}}
      {{ .Data.data.ServerCrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-template-server.key: |
      {{- with secret "internal/data/opengauss/opengauss-summary" -}}
      {{ .Data.data.ServerKey }}
      {{- end }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/role: opengauss-summary
    vault.hashicorp.com/secret-volume-path: /etc/nginx/cert/
  podSecurityContext:
  image:
    pullSecret: huawei-swr-image-pull-secret
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/opengauss/summary
    tag: v1.0.20251231161432
  env:
  service:
    portName: tls-1
    port: 8080
    targetPort: 8080
    type: ClusterIP
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    successThreshold: 1
    tcpSocket:
      port: 8080
    timeoutSeconds: 5
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 500Mi
  volumeMounts:
  securityContext:
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
