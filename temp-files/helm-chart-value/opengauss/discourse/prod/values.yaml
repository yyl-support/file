#ChartVersion: 1.0.10
replicaCount: 4
updateStrategy:
  rollingUpdate:
    maxSurge: 3
    maxUnavailable: 3
  type: RollingUpdate
image:
  repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/common/discourse
  pullPolicy: Always
  tag: "v3.0.1"
imagePullSecrets:
  - name: huawei-swr-image-pull-secret
# This is to override the chart name.
nameOverride: "web-server"
fullnameOverride: "web-server"
namespace:
  enabled: true
  name: opengauss-discourse
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: "opengauss-discourse"
deploymentLabels: {}
podAnnotations:
  traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0 # 启用istio时添加这一行
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-inject: 'true'
  vault.hashicorp.com/role: 'opengauss-discourse'
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/agent-inject-perms-monitor.sh: "0500"
  vault.hashicorp.com/secret-volume-path-monitor.sh: /vault/secrets
  vault.hashicorp.com/agent-inject-secret-monitor.sh: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-monitor.sh: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.monitorScript }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-envbash.sh: "0500"
  vault.hashicorp.com/secret-volume-path-envbash.sh: /vault/secrets
  vault.hashicorp.com/agent-inject-secret-envbash.sh: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-envbash.sh: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.envScript }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-pg-server-ca.crt: "0400"
  vault.hashicorp.com/secret-volume-path-pg-server-ca.crt: /usr/local/share/ca-certificates
  vault.hashicorp.com/agent-inject-secret-pg-server-ca.crt: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-pg-server-ca.crt: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.pgsqlCA }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-redis-server-ca.crt: "0400"
  vault.hashicorp.com/secret-volume-path-redis-server-ca.crt: /usr/local/share/ca-certificates
  vault.hashicorp.com/agent-inject-secret-redis-server-ca.crt: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-redis-server-ca.crt: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.redisCA }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-discourse.key: "0400"
  vault.hashicorp.com/secret-volume-path-discourse.key: /etc/nginx/certs
  vault.hashicorp.com/agent-inject-secret-discourse.key: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-discourse.key: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.serverKey }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-perms-discourse.crt: "0400"
  vault.hashicorp.com/secret-volume-path-discourse.crt: /etc/nginx/certs
  vault.hashicorp.com/agent-inject-secret-discourse.crt: 'internal/data/opengauss/opengauss-discourse'
  vault.hashicorp.com/agent-inject-template-discourse.crt: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.serverCrt }}\n{{- end }}\n"
  vault.hashicorp.com/agent-inject-command-discourse.key: |
    for count in 1 2 3; do if [ $(netstat -anlp | grep 8080| wc -l) -ge 1 ]; then echo "success delete config"; rm -rf /etc/nginx/* ; rm -rf /usr/local/share/ca-certificates/pg-server-ca.crt;
    rm -rf /usr/local/share/ca-certificates/redis-server-ca.crt ; break; else echo "service not running skip";sleep 10; fi done
  vault.hashicorp.com/template-static-secret-render-interval: 5s
podLabels:
  app: web-server
podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
initContainers:
  - command:
      - /bin/bash
      - -c
      - "chmod 0700 /vault/secrets/;chmod 0700 /etc/nginx/; chmod 0700 /usr/local/share/ca-certificates/; chown -R 1000:1000 /vault/secrets/; chown -R 1000:1000 /etc/nginx/;chown -R 1000:1000 /usr/local/share/ca-certificates/; chmod g-s /vault/secrets/; chmod g-s /etc/nginx/;chmod g-s /usr/local/share/ca-certificates/; ls -ld /vault/secrets/"
    image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
    imagePullPolicy: IfNotPresent
    name: init-openeuler
service:
  name: tls-1
  type: ClusterIP
  port: 8080
  targetPort: 8080
ingress:
  enabled: false
  host: discuss.opengauss.org
  secretName: discourse-tls
  default:
    name: discourse-ingress
    path: /
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "4m"
      nginx.ingress.kubernetes.io/limit-rpm: "100"
      nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
  limit:
    name: discourse-discussion-mail-send-ratelimit-ingress
    path: /admin/email
    pathType: Exact
    annotations:
      nginx.ingress.kubernetes.io/limit-rpm: "1"
      nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
resources:
  requests:
    cpu: 500m
    memory: 1500Mi
  limits:
    cpu: 2
    memory: 4Gi
livenessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3
readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3
volumes:
  - name: discourse-storage-new
    persistentVolumeClaim:
      claimName: discourse-share-volume
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
  - name: config-vol
    configMap:
      name: discourse-proxy
volumeMounts:
  - name: discourse-storage-new
    mountPath: /shared
  - name: config-vol
    mountPath: /etc/nginx/conf.d/outlets/server/40-proxy.conf
    subPath: 40-proxy.conf
nodeSelector:
  kubernetes.io/arch: amd64
env:
  - name: DISCOURSE_MAXMIND_LICENSE_KEY
    value: ""
  - name: DISCOURSE_DEVELOPER_EMAILS
    value: ""
  - name: DISCOURSE_DB_NAME
    value: ""
  - name: DISCOURSE_DB_PASSWORD
    value: ""
  - name: DISCOURSE_REDIS_PASSWORD
    value: ""
tolerations: []
affinity: {}
pvc:
  enabled: true
  name: discourse-share-volume
  accessModes: ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: csi-sfsturbo
  volumeMode: Filesystem
  volumeName: pv-efs-discourse
tlsDefinition:
  enabled: false
  name: discourse-tls
  path: secrets/data/opengauss/opengauss-org-tls
  keysMap:
    ca.crt: server.crt
    tls.crt: server.crt
    tls.key: server.key
command:
  - /bin/bash
  - -c
  - /vault/secrets/envbash.sh
istio:
  enabled: true
  nslabel:
    istio-injection: enabled
  gateway: "istio-system/istio-gateway-https"
  virtualService:
    routes:
      - destinations:
          - host: web-server.opengauss-discourse.svc.cluster.local
        match:
          - uri:
              prefix: /
        rewrite:
          uri: /
  tls:
    mode: SIMPLE
  mtlsMode: DISABLE
robot:
  enabled: true
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  podLabels:
    app: forum-robot
  podAnnotations:
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/role: 'opengauss-discourse'
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-perms-config.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config.yaml: 'internal/data/opengauss/opengauss-discourse'
    vault.hashicorp.com/agent-inject-template-config.yaml: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.robotConf }}\n{{- end }}\n"
    vault.hashicorp.com/secret-volume-path: "/app/config"
    vault.hashicorp.com/template-static-secret-render-interval: 5s
    vault.hashicorp.com/agent-inject-command-config.yaml: |
      for count in 1 2 3; do if [ $(netstat -anlp | grep 5000| wc -l) -ge 1 ]; then echo "success delete config"; rm -rf /app/config/* ;  break; else echo "service not running skip";sleep 10; fi done
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/forum-robot
    tag: "main-e29192"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 1Gi
  volumeMounts:
    - name: data-vol
      mountPath: /app/data/forum_data
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
    - name: data-vol
      persistentVolumeClaim:
        claimName: pvc-forumrobot-data
  pvc:
    name: pvc-forumrobot-data
    accessModes: ReadWriteMany
    storage: 10Gi
    storageClassName: sfsturbo-subpath-sc
    volumeMode: Filesystem
configmaps:
  - name: discourse-proxy
    keyName: 40-proxy.conf
    content: |-
      # Proxy configuration
      # Production environment proxy

      location /api-dsapi/ {
          proxy_set_header X-Forwarded-For $http_x_real_ip;
          proxy_pass https://dsapi.osinfra.cn/;
      }

      # Proxy configuration for logout
      location /gauss-logout {
          proxy_set_header X-Forwarded-For $http_x_real_ip;
          proxy_pass https://oneidapi.opengauss.osinfra.cn/oneid/logout;
      }
auditCronJob:
  enabled: true
  suspend: false
  schedule: '0 2 1 */6 *'
  concurrencyPolicy: Forbid
  annotations:
    vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
    vault.hashicorp.com/tls-skip-verify: "true"
    vault.hashicorp.com/agent-inject: 'true'
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/log-level: "warn"
    vault.hashicorp.com/role: 'opengauss-discourse'
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-perms-config.yaml: "0400"
    vault.hashicorp.com/agent-inject-secret-config.yaml: 'internal/data/opengauss/opengauss-discourse'
    vault.hashicorp.com/agent-inject-template-config.yaml: "{{- with secret \"internal/data/opengauss/opengauss-discourse\" -}}  \n{{ .Data.data.cronjob }}\n{{- end }}\n"
    vault.hashicorp.com/secret-volume-path: "/app/config"
  restartPolicy: Never
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/auditcronjob-discourse-prod
    tag: main-2a4a64
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 600Mi
    requests:
      cpu: 200m
      memory: 600Mi
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
