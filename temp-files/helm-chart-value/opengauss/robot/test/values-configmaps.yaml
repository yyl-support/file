configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - opengaussmirror
            plugin_name:
              - robot-service-welcome
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
              - robot-service-associate
              - message-center-githook
      
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.opengauss-backend-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Merge Request Hook"
              - "Note Hook"
          - name: message-center-githook
            endpoint: http://collect-githook-service.opengauss-message-center.svc.cluster.local:8080/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengaussmirror
          enable_issue_assign: true
          default_assignee: opengauss_bot
      
      community_robot_id: opengauss_bot
      
      msg_multiple_assignee: "Can only assign one assignee to the issue."
      msg_assign_repeatedly: "This issue is already assigned to ***%s***. Please do not assign repeatedly."
      msg_not_allow_assign: "This issue can not be assigned to ***%s***. Please try to assign to the repository members."
      msg_not_allow_unassign: "***%s*** can not be unassigned from this issue. Please try to unassign the assignee of this issue."
      msg_default_assignee: "This issue requires an assignee. Since you haven't specified one, we've assigned ***%s*** as the default assignee for this issue."
  - name: configmap-associate
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengaussmirror/repo-create2
          enable_check_associate_pr: true
          associate_pr_rules:
            repo:
              - "tc_test"
            repo_label: need-doc-pr
            repo_comment_command_check_label: /check-doc
            repo_comment_command_remove_label: /remove-need-doc
            repo_remove_label_permission: false
            repo_comment_label_block_feedback: "### Linking PR Notice \n @%s , the pull request should be linked to at least one https://gitcode.com/opengaussmirror/tc_test repository's PR. \nIf it is confirmed that no PR association is needed, you can remove the label by commenting **`/remove-need-doc`** ."
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "opengaussmirror"
            org_label: needs-issue
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly members of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
      
        - repos:
            - opengaussmirror/repo-create1
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "opengaussmirror"
            org_label: needs-issue
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### Notice \nOnly members of the repository can delete the **needs-issue** label. Please contact them to do it."
            org_comment_label_block_feedback: "### Linking Issue Notice \n @%s , the pull request must be linked to at least one issue. \nIf an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      community_robot_id: opengauss_bot
      placeholder_linking_issue_notice_title: "### Linking Issue Notice"
      placeholder_linking_pr_notice_title: "### Linking PR Notice"
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - opengaussmirror
          cla_label_yes: opengauss-cla/yes
          cla_label_no: opengauss-cla/no
          check_url: https://clasign.test.osinfra.cn/api/v1/individual-signing/681d9d1b2e91e0b596754a7e
          sign_url: https://clasign.test.osinfra.cn/sign/681d9d1b2e91e0b596754a7e
          faq_url: https://gitcode.com/opengauss/community/blob/master/cla/faq/check-by-author/faq.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA Signature Guide"
      placeholder_cla_sign_pass_title: "### CLA Signature Pass"
      comment_command_trigger: "### CLA Signature Manual  \n\nBecause of the network problem, please comment `/check-cla` once again. :pray: "
      comment_pr_no_commits: "### CLA Signature Manual  \n\nThere is no valid commits in the pull request, please check it. "
      comment_some_need_sign: "### CLA Signature Guide  \n\n %s , thanks for your pull request. \n\nThe following commit(s) are not associated with a signed **<font color=green>_Contributor License Agreement (CLA)_</font>**.\n\n%s \n\nTo sign CLA, [**<ins>click here</ins>**](%s). \n\nTo check if your email is configured correctly, refer to the [**<font color=red><ins>_FAQs_</ins></font>**](%s). \n\nOnce you've signed the CLA or updating your email, please comment **`/check-cla`** to revalidate CLA status."
      comment_update_label_failed: "### CLA Signature Manual  \n\nBecause of the CLA label update fail, please comment `/check-cla` once again. :pray: "
      comment_all_signed: "### CLA Signature Pass  \n %s, thanks for your pull request. All authors of the commits have signed the CLA. :+1: "
      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      community_robot_id: opengauss_bot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "the email used in the commit is an invalid email! <br>please check it."
      cla_service_failed_message: "the CLA service call failed! please comment `/check-cla` once again."
      comment_unsigned_title: "| Commit | Reason |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "the email used in the commit is not linked to a signed CLA! <br>please verify that it matches the email you used when signing the CLA."
      message_individual_version_behind: "the individual CLA content has been updated. <br>[Please click here to re-sign the agreement](https://clasign.osinfra.cn/sign-cla/gitee_opengauss-1614047760000855378/individual?email=%s)."
      message_corporation_version_behind: "the corporation CLA content has been updated. <br>Please contact your corporation CLA manager to re-sign the agreement."
      cla_signature_type_corporation: "corporation"
  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:

        - repos:
            - opengaussmirror
          clear_labels:
            - ci-pipeline-success
            - codecheck-success
            - lite-ci-success

      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      user_mark_format: "@"
      squash_commit_label: stat/needs-squash
      comment_command_trigger: "### Label Command Manual \nBecause of the network problem, please comment once again. :pray: "
      comment_remove_labels_when_pr_source_code_updated: "### Notification  \nThis pull request source branch has changed, so removes the following label(s): %s."
      comment_label_command_conflict: "### Label Command Feedback \n %s , the comment that add and delete a same label, please check it. :pray: "
      comment_update_label_failed: "### Label Command Feedback \n %s, Because of the label(s) `%s` update failed, please comment once again. :pray: "
      comment_add_not_exist_label: "### Label Command Feedback \n %s, Because of the repository doesn't have the label(s) `%s`, it cannot be added. :pray: "
      remove_pr_label_delayed_seconds: 2
      community_robot_id: opengauss_bot
  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengaussmirror

      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      event_state_opened: opened
      event_state_closed: closed
      comment_no_permission_operate_issue: "### Notice \n@%s , you can't %s an issue unless you are the author of it or a collaborator."
      comment_issue_needs_link_pr: "### Notice \n@%s , you can't close an issue unless the issue has link pull requests."
      comment_list_linking_pull_requests_failure: "### Notice \n@%s  fail to check link pull requests of the issue, please retry."
      comment_no_permission_operate_pr: "### Notice \n@%s , you can't %s a pull request unless you are the author of it or a collaborator."
      community_robot_id: opengauss_bot
  - name: configmap-review
    filename: config.yaml
    content: |-
      config_items:
      
        - repos:
            - opengaussmirror/openGauss-tools-sql-translator
            - opengaussmirror/QA
            - opengaussmirror/Yat
          lgtm_counts_required: 2
          legal_operator: opengauss_bot
          labels_for_merge:
            - opengauss-cla/yes
          labels_not_allow_merge:
            - needs-issue
      
        - repos:
            - opengaussmirror/debezium
          lgtm_counts_required: 1
          legal_operator: opengauss_bot
          labels_for_merge:
            - opengauss-cla/yes
          labels_not_allow_merge:
            - needs-issue
      
        - repos:
            - opengauss/hcom4db
          lgtm_counts_required: 1
          legal_operator: opengauss_bot
          labels_for_merge:
            - opengauss-cla/yes
            - codecheck-success

        - repos:
            - opengaussmirror/openGauss-server
          lgtm_counts_required: 2
          legal_operator: opengauss_bot
          labels_for_merge:
            - opengauss-cla/yes
            - ci-pipeline-success
            - codecheck-success
            - lite-ci-success
          labels_not_allow_merge:
            - lite-ci-failed
            - codecheck-failed
            - ci-pipeline-failed
            - needs-issue

        - repos:
            - opengaussmirror
          legal_operator: opengauss_bot
          labels_for_merge:
            - opengauss-cla/yes
          lgtm_counts_required: 2

      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      comment_try_squash_again: "### Change Merge Method Failed \n Please comment the command **`/rebase cancel`** to remove the **merge/rebase** label, and then try comment **`/squash`** again."
      comment_try_rebase_again: "### Change Merge Method Failed \n Please comment the command **`/squash cancel`** to remove the **merge/squash** label, and then try comment **`/rebase`** again."
      comment_add_lgtm_by_self: "### Review Code Warning \n @%s , You can't review code by yourself, please contact the maintainers. :astonished: "
      comment_removed_label: "### Review Code Feedback \n- The label **%s** was removed in this pull request. It means that **%s** may need to review the code changes again. :flushed: "
      comment_add_label_successful: "### Review Code Feedback \n- The label **%s** was added to this pull request. It means that **%s** reviewed the code changes. :wave: \n ##### *Tips* \n- If this pull request is not merged while all conditions are met, comment **`/check-pr`** to try again. :smile: "
      comment_add_label_failed: "### Review Code Feedback \n The label **%s** was not added to this pull request by: ***%s***. :wave: \n Please try comment again."
      comment_no_permission_for_label: "### Review Code Feedback \n ***@%s*** has no permission to %s **%s** label in this pull request. :astonished: \nPlease contact to the collaborators in this repository."
      comment_no_permission_for_lgtm_label: "### Review Code Feedback \n Thanks for your review, @%s, your opinion is very important to us. :wave: \nThe maintainers will consider your advice carefully."
      comment_command_trigger: "### Merge Manual\n @%s, Because of the network problem, please comment ***`/%s`*** once again. :pray: "
      comment_clear_label_case_by_pr_update: "### Notice\n New code changes of the pull request are detected and remove these labels ***%s***. :flushed: "
      comment_clear_label_case_by_reopen_pr: "### Notice\n When PR is reopened, remove these labels ***%s***. :flushed: "
      comment_pr_cannot_merge_reason: "### Merge Verification Failed\n@%s, this pr is not mergeable and the reasons are below:\n\n%s"
      comment_msg_missing_labels: "##### *Missing Labels*\n- the pull request needs **%s** label(s)."
      comment_msg_invalid_labels: "##### *Label BackList*\n- the **%s** label(s) caused the pull request to be unable to merge."
      comment_msg_not_enough_lgtm_label: "##### *Not Enough LGTM Labels*\n- the pull request needs **%d** **lgtm** labels and now gets **%d**."
      comment_try_label_again: "the **%s** label's operation log can not found! please check it."
      comment_no_permission_add_label: "the **%s** user can't add the **%s** label, please fix it or contact the maintainers."
      comment_failed_list_pr_operation_logs: "### Notice\n The corresponding operation log is missing! please check it."
      comment_no_ready_tips: "##### *Non-Compliance Label Operations*\n- %s"
      comment_failed_merge_pr: "### PR Merge Failed \n - reason: %s"
      comment_failed_merge_pr_unknown_reason: "unknown error occurred, please contact community infrastructure team."
      label_usage_tip_title: "##### *Label Usage Tips*"
      label_usage_tip_detail: "- **%s**: %s"
      label_usage_description:
        - label_name: lgtm
          description: "The code has been reviewed. This can be accomplished by commenting **`/lgtm`**"
        - label_name: approved
          description: "Agree to merge the pull request. This can be accomplished by commenting **`/approve`**"
        - label_name: needs-issue
          description: "the pull request must be linked to at least one issue. If an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
        - label_name: need-doc-pr
          description: "the pull request must be linked to at least one https://gitcode.com/opengaussmirror/tc_test repository's issue. If an issue has already been linked, but the **need-doc** label remains, you can remove the label by commenting **`/check-doc`** ."
        - label_name: opengauss-cla/yes
          description: "All contributor has signed the CLA."
        - label_name: opengauss-cla/no
          description: "At least one contributor has not signed the CLA!"
        - label_name: ci-pipeline-success
          description: "The code compilation/build/testcase check job is passed."
        - label_name: codecheck-success
          description: "The static code check job is passed."
        - label_name: lite-ci-success
          description: "The lite code compilation/build/testcase check job is passed."
        - label_name: lite-ci-failed
          description: "The lite code compilation/build/testcase check job failed!"
        - label_name: codecheck-failed
          description: "The static code check job failed!"
        - label_name: ci-pipeline-failed
          description: "The code compilation/build/testcase check job failed!"
      community_robot_id: opengauss_bot
  - name: configmap-welcome
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - opengaussmirror
          community_name: openGauss
          command_link: https://gitcode.com/opengauss/community/blob/master/contributors/command.en.md
          sig_info_link: "[%s](https://gitcode.com/opengaussmirror/tc_test/blob/master/sigs/%s/README.md)"
          welcome_message:
            - "### Welcome To %s Community"
            - "Hey %s , thanks for your contribution to the community."
            - "#### Bot Usage Manual"
            - "I'm the Bot here serving you. You can find the instructions on how to interact with me at **[Here](%s)** . That means you can comment below every pull request or issue to trigger Bot Commands."
            - "#### Contact Guide"
            - "If you have any questions, please contact the SIG: **%s** ,"
            - "and you want to get quick review about your pull request or issue, please contact the owners in first: %s ,"
            - "and any of the maintainers: %s ,"
            - "and any of the committers: %s ."
            - "If you have any questions, please contact any of the repository's maintainers: %s ."

      user_mark_format: "@"
      sig_info_url: "http://robot-universal-cache-service.opengauss-backend-robot:8888/robot-cache"
      community_name: opengauss
      exclude_user:
        - ""
        - opengauss_bot
        - gitcode-xxm
        - ibforu
        - GeorgeCao
        - gitcode_test_01
        - dengmengmian
        - wxltrulli
        - LiYanghang00
        - yao-xiaobai
        - opengauss-bot
        - zhaoyan0879
  - name: configmap-cache
    filename: config.yaml
    content: |-
      repo-save-dir: "/opt/app/repo/tc"
      repo-cached-folder: "community"
      cache-size: 512
      git-platform-domain: gitcode.com
      repo-owner: opengaussmirror
      repo-name: tc_test
      repo-branch: master
      repo-commit-depth: 1
      repo-fetch-interval: 120
      community-name: opengauss
      repo-of-multi-sig:
        - "opengaussmirror/openGauss-server"
        - "opengaussmirror/openGauss-third_party"
        - "opengaussmirror/openGauss-workbench"
      repo-sig-mapping:
        - "opengaussmirror/openGauss-server:AI"
        - "opengaussmirror/openGauss-server:CloudNative"
        - "opengaussmirror/openGauss-server:CM"
        - "opengaussmirror/openGauss-server:SecurityTechnology"
        - "opengaussmirror/openGauss-server:SQLEngine"
        - "opengaussmirror/openGauss-server:StorageEngine"
        - "opengaussmirror/openGauss-third_party:StorageEngine"
        - "opengaussmirror/openGauss-workbench:Tools"
        - "opengaussmirror/openGauss-server:Community"
