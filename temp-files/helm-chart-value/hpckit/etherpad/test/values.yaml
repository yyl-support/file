#chartVersion: 1.0.8
deployment:
  replicaCount: 1
  labels:
    virtual-kubelet.io/burst-to-cci: enforce
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceways/etherpad
    pullPolicy: IfNotPresent
    tag: "main-b6e6d4"
  imagePullSecrets:
    - name: huawei-swr-instance-image-pull-secret
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-apikey.txt: "0400"
    vault.hashicorp.com/agent-inject-perms-credentials.json: "0400"
    vault.hashicorp.com/agent-inject-secret-apikey.txt: internal/data/infra-test/hpckit-etherpad
    vault.hashicorp.com/agent-inject-secret-credentials.json: internal/data/infra-test/hpckit-etherpad
    vault.hashicorp.com/agent-inject-template-apikey.txt: "{{- with secret \"internal/data/infra-test/hpckit-etherpad\"
      -}}  \n{{ .Data.data.apikey }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-template-credentials.json: "{{- with secret
      \"internal/data/infra-test/hpckit-etherpad\" -}}  \n{{ .Data.data.config }}\n{{-
      end }}\n"
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "5001"
    vault.hashicorp.com/agent-run-as-user: "5001"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/log-level: warn
    vault.hashicorp.com/role: hpckit-etherpad
    vault.hashicorp.com/tls-skip-verify: "true"
  containerName: etherpad-lite
  ports:
    - containerPort: 5001
      name: http
      protocol: TCP

# This is to override the chart name.
nameOverride: ""
fullnameOverride: "hpckit-etherpad"
namespace: hpckit-etherpad 
autoscale:
  enabled: true
  start: 30 8 * * *
  end: 55 23 * * *
serviceAccount:
  create: true
  name: hpckit-etherpad
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
secretDefinitions:
  hpckit-domain-tls:
    enabled: true
    keysMap:
      ca.crt:
        key: tls.cert
        path: secrets/data/infra-test/hpckit-domain-tls
      tls.crt:
        key: tls.cert
        path: secrets/data/infra-test/hpckit-domain-tls
      tls.key:
        key: tls.key
        path: secrets/data/infra-test/hpckit-domain-tls


# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  ports:
    - name: ether-http
      port: 9001
      protocol: TCP
      targetPort: 9001
  type: ClusterIP

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/server-snippet: |
      location ^~ /admin {
        deny all;
      }
      location ^~ /stats {
        deny all;
      }
  hosts:
    - host: etherpad.hpckit.test.osinfra.cn
      paths:
        - path: /
          pathType: Prefix
          portNumber: 9001
  tlsHosts:
    - host: etherpad.hpckit.test.osinfra.cn
      secretsName: hpckit-domain-tls

istio:
  enabled: false
  nslabel: {}
    # istio-injection: enabled
  # gateway: "istio-system/istio-gateway-https"
  # host: ""
  # virtualService:
  #   routes:
  #     - destinations:
  #         - host: ""
  #       match:
  #       - uri:
  #           prefix: /
  # tls:
  #   mode: DISABLE
  # mtls:
  #   mode: DISABLE

resources:
  limits:
    cpu: "500m"
    memory: 1Gi
  # requests:
  #   cpu: "500m"
  #   memory: 500Mi

pvc:
  hpckit-etherpad-data-vol:
    enabled: true
    accessModes:
      - ReadWriteMany
    storage: 5Gi
    storageClassName: sfsturbo-subpath-sc
    volumeMode: Filesystem

# Additional volumes on the output Deployment definition.
volumes:
  - name: token-vol
    projected:
      sources:
        - serviceAccountToken:
            audience: api
            expirationSeconds: 600
            path: token
  - name: data-volume
    persistentVolumeClaim:
      claimName: hpckit-etherpad-data-vol
  # - name: plugin-volume
  #   persistentVolumeClaim:
  #     claimName: etherpad-plugin-vol

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /opt/etherpad-lite/var
    name: data-volume
  # - mountPath: /opt/etherpad-lite/plugin_packages
  #   name: plugin-volume
