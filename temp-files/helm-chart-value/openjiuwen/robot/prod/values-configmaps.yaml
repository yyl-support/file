      pr_merge_feedback_comment_regexp: '- The label .* was added to this pull request. It means that \*\*(.*)\*\* reviewed the code changes. :wave: '
      
  - name: configmap-welcome
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen
            - tangfei0306/community_7675
          community_name: openJiuwen
          command_link: https://gitcode.com/openJiuwen/community/blob/main/zh/content/robot/%E7%A4%BE%E5%8C%BA%E5%91%BD%E4%BB%A4%E5%8F%82%E8%80%83%E6%96%87%E6%A1%A3.md
          sig_info_link: "[%s](https://gitcode.com/openJiuwen/community/blob/main/sigs/%s/sig-info.yaml)"
          welcome_message:
