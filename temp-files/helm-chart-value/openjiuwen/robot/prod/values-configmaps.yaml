configmaps:
  - name: configmap-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo: 
              - openJiuwen
              - tangfei0306/community_7675
            plugin_name:
              - robot-service-welcome
              - robot-service-cla
              - robot-service-lifecycle
              - robot-service-label
              - robot-service-review
              - robot-service-assign
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.openjiuwen-robot.svc.cluster.local:8888/gitcode-hook
            events:
              - "Note Hook"
              - "Issue Hook"
  - name: configmap-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen/agent-core
          enable_issue_assign: true
          default_assignee: iamcandiceguo
        - repos:
            - openJiuwen/deepsearch
          enable_issue_assign: true
          default_assignee: yangjianxin4
        - repos:
            - openJiuwen/agent-studio
          enable_issue_assign: true
          default_assignee: ZYQ5333
        - repos:
            - openJiuwen/docs
            - openJiuwen/community
            - tangfei0306/community_7675
          enable_issue_assign: true
          default_assignee: yuzengjie01
      community_robot_id: openJiuwen-bot
      msg_multiple_assignee: "### 注意 \nIssue 只能指派一个负责人。"
      msg_assign_repeatedly: "### 注意 \n此 Issue 的负责人已经是 ***%s***。"
      msg_not_allow_assign: "### 注意 \n此 Issue 的负责人不能设置为 ***%s***。因为他不是仓库或组织成员"
      msg_not_allow_unassign: "### 注意 \n ***%s*** 不能取消其负责人。"
      msg_default_assignee: "### 注意 \n此 Issue 需要负责人。 如果没有指派时， ***%s*** 是默认的负责人"
  - name: configmap-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen
            - tangfei0306/community_7675
          cla_label_yes: openJiuwen-cla/yes
          cla_label_no: openJiuwen-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/68ee0908765718ad08bab9ee
          sign_url: https://clasign.osinfra.cn/sign/68ee0908765718ad08bab9ee
          employee_sign_url: https://clasign.osinfra.cn/sign-cla/68ee0908765718ad08bab9ee/employee
          individual_sign_url: https://clasign.osinfra.cn/sign-cla/68ee0908765718ad08bab9ee/individual
          faq_url: https://gitcode.com/openJiuwen/community/blob/main/cla/cla%E4%BD%BF%E7%94%A8%E6%8C%87%E5%8D%97.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA 签署引导"
      placeholder_cla_sign_pass_title: "### CLA 签署成功"
      comment_command_trigger: "### CLA 签署指导手册  \n\n由于网络问题未能完成 CLA 检查，请通过评论 ***`/check-cla`*** 再次检查。"
      comment_pr_no_commits: "### CLA 签署指导手册  \n\n此 PR 的 commits 无效，请检查。"
      comment_some_need_sign: "### CLA 签署引导  \n\n %s , 感谢您的代码贡献。 \n\n以下 Commit(s) 没有签署 **<font color=green>_Contributor License Agreement (CLA)_</font>**。 \n\n%s \n\n如果您需要签署 CLA，[您可以点击此链接去签署 CLA ](%s)。  \n\n如果需要检查邮箱是否配置正确， [可以点击 **<font color=red>_FAQs_</font>** 去查看使用手册](%s) 。 \n\n在完成 CLA 签署或者更新完邮箱后, 需再次评论 ***`/check-cla`*** 来检查 CLA 的签署状态。"
      comment_update_label_failed: "### CLA 签署指导手册  \n\n添加 CLA 标签失败，请通过评论 ***`/check-cla`*** 再次检查。 :pray: "
      comment_all_signed: "### CLA 签署成功  \n %s, 感谢您的代码贡献。 所有的代码贡献者都已完成了 CLA 签署。 :+1: "
      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openjiuwen
      community_robot_id: openJiuwen-bot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "这包含一个无效的邮箱，请检查下！"
      cla_service_failed_message: "检查CLA是否签署失败！请再次评论下 `/check-cla` "
      comment_unsigned_title: "| Commit | 原因 |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "这条 Commit 的邮箱未签署 CLA ！请检查下邮箱是否正确配置。"
      message_individual_version_behind: "因为个人 CLA 的协议内容已更新，[请点击这里重新查看下协议内容并再次签署](https://clasign.osinfra.cn/sign-cla/68ee0908765718ad08bab9ee/individual-update?email=%s)。"
      message_corporation_version_behind: "因为企业 CLA 的协议内容已更新，请联系 CLA 企业管理员进行处理。"
      cla_signature_type_corporation: "corporation"
  - name: configmap-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen
            - tangfei0306/community_7675
          auto_remove_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
            - label_name: "ci-successful"
            - label_name: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_prefix: "lgtm"
              event_actions:
                - "pr close to trigger remove label"
            - label_name: "approved"
              event_actions:
                - "pr close to trigger remove label"
          auto_add_pr_label_rules:
            - label_name: "stat/needs-squash"
              commits_threshold: 1
          manual_add_or_remove_pr_label_rules:
            - label_prefix: "lgtm"
              add_label_command: "/lgtm"
              remove_label_command: "/lgtm cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "approved"
              add_label_command: "/approve"
              remove_label_command: "/approve cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/squash"
              add_label_command: "/squash"
              remove_label_command: "/squash cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true
            - label_name: "merge/rebase"
              add_label_command: "/rebase"
              remove_label_command: "/rebase cancel"
              verify_permission: "strict"
              user_sig_role_list:
                - "maintainer"
                - "committer"
                - "repo admin"
              user_sig_role_only: true

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openjiuwen
      community_robot_id: openJiuwen-bot
      command_reg_exp_key_word: "kind|priority|sig|good"
      delayed_seconds: 2
      comment_remove_labels_when_pr_source_code_updated: "### Notification  \nThis pull request has been changed(code update) or closed, so removes the following label(s): %s."
      comment_label_command_conflict: "### Label Command Feedback  \n @%s , the comment that add and delete a same label, please check it!"
      comment_update_label_failed: "### Label Command Feedback \n\n @%s, because of the label **%s** update failed, please comment once again!"
      comment_add_not_exist_label: "### Label Command Feedback  \nThe repository doesn't have the label(s) **%s**, it cannot be added!"
      comment_add_label_by_self: "### Review Code Warning \n @%s , you can't review code by yourself, please contact the maintainers/committers."
      comment_add_label_successful: "### Review Code Feedback \n- The label **%s** was added to this pull request. It means that **%s** reviewed the code changes. :wave: \n ##### *Tips* \n- If this pull request is not merged while all conditions are met, comment **`/check-pr`** to try again. :smile: "
      comment_no_permission_for_user_list: "The label(s) **%s** permission is of **%s**, please contact them."
      comment_no_permission_for_sig_member: "Thanks for your review, your opinion is very important to us. The maintainers will consider your advice carefully."
      comment_no_permission_for_repo_member: "The label(s) **%s** permission is outside."
      comment_permission_tip_for_branch_keeper: "The repository's branch is control of maintainer and branch keeper!"
      comment_pr_no_found_commits: "### Warning  \nThe PR commit(s) can not be got, please check it!"
      comment_pr_no_found_code_change: "### Warning  \nThe PR code change can not be got, please check it!"
      feedback_comment_prefix: "### Label Command Feedback  \n%s"
      add_label_to_feedback:
        - "lgtm"
        - "approved"
        - "lgtm-"
      
  - name: configmap-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen
            - tangfei0306/community_7675

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openjiuwen
      community_robot_id: openJiuwen-bot
      event_state_opened: opened
      issue_action_reopen: reopen
      event_state_closed: closed
      issue_action_close: close
      comment_no_permission_close_issue: "### 注意 \n@%s ，您不能关闭（%s）此 Issue，因为您不是此 Issue 的创建者或仓库管理员，也不是sig组成员。"
      comment_no_permission_reopen_issue: "### 注意 \n@%s ，您不能打开（%s）此 Issue，因为您不是此 Issue 的创建者或仓库管理员，也不是sig组成员。"
      comment_no_permission_close_pr: "### 注意 \n@%s ， 您不能操作（%s）此 PR，因为您不是此 PR 的创建者或仓库管理员，也不是sig组成员。"
      comment_issue_has_open_pr: "### 注意 \n@%s , 此Issue已经关联一个PR，请在关闭此Issue之前合并该 PR。"
      comment_not_close_issue: "### 注意 \n@%s , 此Issue目前由 CVE 服务控制，无法直接关闭。请留言 **/check-issue**。"
      comment_list_linking_pull_requests_failure: "### 注意 \n@%s  检查Issue关联的PR请求失败，请重试。"
  - name: configmap-review
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openJiuwen
            - tangfei0306/community_7675
          merge_method:
            default_method: squash
            merge_method: merge
            merge_label: merge/merge
            squash_method: squash
            squash_label: merge/squash
            rebase_method: rebase
            rebase_label: merge/rebase
          merge_allow_metrics:
            label_metric:
              - label_name: approved
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: true
              - label_name: openJiuwen-cla/yes
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: false
              - label_name: ci-successful
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: true
            prefix_label_metric:
              - label_name: lgtm
                need_num: 2
                legal_operator: openJiuwen-bot
                legal_operate_time: true
          merge_block_metrics:
            label_metric:
              - label_name: ci-failed
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: false
        - repos:
            - openJiuwen/community
          merge_method:
            default_method: squash
            merge_method: merge
            merge_label: merge/merge
            squash_method: squash
            squash_label: merge/squash
            rebase_method: rebase
            rebase_label: merge/rebase
          merge_allow_metrics:
            label_metric:
              - label_name: approved
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: true
              - label_name: openJiuwen-cla/yes
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: false
            prefix_label_metric:
              - label_name: lgtm
                need_num: 2
                legal_operator: openJiuwen-bot
                legal_operate_time: true
          merge_block_metrics:
            label_metric:
              - label_name: ci-failed
                need_num: 1
                legal_operator: openJiuwen-bot
                legal_operate_time: false

      sig_info_url: "https://magicapi.osinfra.cn/stat/sig/robot/info"
      community_name: openjiuwen
      community_robot_id: openJiuwen-bot
      comment_failed_list_pr_operation_logs: "### Warning\n The corresponding operation log is missing! please check it."
      comment_failed_list_pr_labels: "### Warning\n The PR label(s) can not be got!"
      comment_pr_work_in_process: "### Warning\n The PR label(s) is working in process!"
      comment_pr_no_found_commits: "### Warning\n The PR commit(s) can not be got!"
      comment_pr_cannot_merge_reason: "### Merge Verification Failed\n@%s, this pr is not mergeable and the reasons are below:\n\n%s"
      comment_msg_missing_labels: "##### *Missing Labels*\n- the pull request needs **%s** label(s)."
      comment_msg_block_labels: "##### *Label BlockList*\n- the **%s** label(s) caused the pull request to be unable to merge."
      comment_msg_not_enough_label: "##### *Not Enough Labels*\n%s"
      comment_msg_not_enough_label_template: "- the pull request needs **%d** **%s** labels, but now gets **%d**."
      comment_non_compliance_label_operations: "##### *Non-Compliance Label Operations*\n%s"
      comment_non_compliance_label_operation_template: "- the **%s** label modification should be operated by **%s**, but is currently executed by **%s**!"
      comment_failed_merge_pr: "### PR Merge Failed \n - reason: %s"
      comment_failed_merge_pr_unknown_reason: "unknown error occurred, please contact community infrastructure team."
      comment_allow_label_log_non_compliance: ""
      label_usage_tip_title: "##### *Label Usage Tips*"
      label_usage_tip_detail: "- **%s**: %s"
      label_usage_description:
        - label_name: lgtm
          description: "The code has been reviewed. This can be accomplished by commenting **`/lgtm`**"
        - label_name: approved
          description: "Agree to merge the pull request. This can be accomplished by commenting **`/approve`**"
        - label_name: needs-issue
          description: "the pull request must be linked to at least one issue. If an issue has already been linked, but the **needs-issue** label remains, you can remove the label by commenting **`/check-issue`** ."
        - label_name: openeuler-cla/yes
          description: "All contributor has signed the CLA."
        - label_name: openeuler-cla/no
          description: "At least one contributor has not signed the CLA!"
        - label_name: ci_successful
          description: "The code compilation/build/testcase check job is passed."
        - label_name: doc-sig-reviewed
          description: "The PR needs doc sig to review, please contact them."
        - label_name: docs_ci_successful
          description: "The PR CI of docs check job is passed."
      action_add_label_gitcode: "add label"
      action_delete_label_gitcode: "delete label"
      action_commit_update_gitcode: "commit"
      action_target_branch_change_gitcode: "target_branch"
      action_reopen_gitcode: "opened"
      action_add_label_gitee: "add_label"
      action_delete_label_gitee: "remove_label"
      label_unresolved_reviews: "unresolved-reviews"
      label_no_passed_code_owners: "no-pass-all-review"
      comment_unresolved_reviews: "### Notice\n The PR has **%d** review comment. **%d** is not resolved. if all are resolved, please comment ***`/check-pr`*** to try merge the PR. :smile: "
      comment_no_passed_code_owners: "### Notice\n The PR needs **%d** assignees to review. **%d** does not review. if all are passed, please comment ***`/check-pr`*** to try merge the PR. :smile: "
      comment_not_found_code_owners: "### Notice\n The PR not found codeowners. "
      comment_can_not_get_frozen_branch_data: "### Notice\n The PR cannot get data"
