# chartVersion: v2.0.2
namespace:
  enabled: false
  name: openjiuwen-robot
serviceAccount:
  create: true
  name: openjiuwen-robot
podAnnotations:
  # traffic.sidecar.istio.io/excludeOutboundIPRanges: 0.0.0.0/0  # 开启istio时添加该行
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
  vault.hashicorp.com/agent-run-as-user: "1000"
  vault.hashicorp.com/agent-run-as-group: "1000"
  vault.hashicorp.com/role: openjiuwen-robot
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/log-level: "warn"
istio:
  enabled: false
  nslabel: {}
ingress:
  enabled: true
  name: "robot-universal-hook-delivery-ingress"
  host: "hook-delivery-openjiuwen.osinfra.cn"
  syncbot:
    enabled: false
    # name: "sync-bot"
    # host: "hook-delivery.openeuler.openatom.cn"
    # annotations:
    #   nginx.ingress.kubernetes.io/rewrite-target: /$2
    # port: 8888
    # path: /sync-bot(/|$)(.*)
    # pathType: ImplementationSpecific
  citools:
    enabled: false
    # name: "robot-universal-ci-tools"
    # host: "hook-delivery.openeuler.openatom.cn"
    # annotations:
    #   nginx.ingress.kubernetes.io/rewrite-target: /$2
    # port: 8080
    # path: /ci-tools(/|$)(.*)
    # pathType: ImplementationSpecific
secret:
  enabled: true
  name: "tls-secret"
  path: "secrets/data/infra-common/osinfra-cn"
  crtKey: "server.cert"
  keyKey: "server.key"
podSecurityContext:
  seccompProfile:
    localhostProfile: infra-seccomp.json
    type: Localhost
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsUser: 1000
initContainers:
  - command:
      - /bin/bash
      - -c
      - chmod 0700 /vault/secrets; chown -R 1000:1000 /vault/secrets; chmod g-s /vault/secrets; ls -ld /vault/secrets
    image: 'swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3'
    imagePullPolicy: IfNotPresent
    name: init-openeuler
deployments:
  # hookDelivery robot 必须填写为第一个数组元素
  - name: robot-universal-hook-delivery
    replicas: 2
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    labels:
      app: robot-universal-hook-delivery
    podAnnotations:
      vault.hashicorp.com/agent-inject-perms-config: "0400"
      vault.hashicorp.com/agent-inject-perms-gitcode-secret: "0400"
      vault.hashicorp.com/agent-inject-secret-config: internal/data/openjiuwen/robot
      vault.hashicorp.com/agent-inject-secret-gitcode-secret: internal/data/openjiuwen/robot
      vault.hashicorp.com/agent-inject-template-config: "{{- with secret \"internal/data/openjiuwen/robot\" -}}  \n{{ .Data.data.deliveryConfig }}\n{{- end }}\n"
      vault.hashicorp.com/agent-inject-template-gitcode-secret: "{{- with secret \"internal/data/openjiuwen/robot\" -}}  \n{{ .Data.data.deliverySecrets }}\n{{- end }}\n"
    args:
      - --port=8888
      - --hmac-secret-file=/vault/secrets/gitcode-secret
      - --config-file=/vault/secrets/config
      - --handle-path=gitcode-hook
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/robot-universal-hook-delivery
      tag: "main-d443fa"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 300Mi
      requests:
        cpu: 100m
        memory: 300Mi
    volumeMounts: []
    volumes: []
    vaultVolume: create
    service:
      portName: http-port
      port: 8888
      targetPort: 8888
      type: ClusterIP
  - name: robot-universal-access
    replicas: 2
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
    labels:
      app: robot-universal-access
    podAnnotations: ''
    args:
      - --port=8888
      - --config-file=/app/conf/config.yaml
      - --handle-path=gitcode-hook
    image:
      repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/robot-universal-access
      tag: "main-d5bc7b"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 300Mi
      requests:
        cpu: 100m
        memory: 300Mi
    volumeMounts:
      - mountPath: /app/conf/
        name: app-config
        readOnly: true
    volumes:
      - name: app-config
        configMap:
          name: configmap-access
    vaultVolume: ''
    service:
      portName: http-port
      port: 8888
      targetPort: 8888
      type: ClusterIP
