welcome:
  enabled: true
  configmap:
    name: configmap-welcome
    config: |-
      config_items:
        - repos:
            - testmyai
          community_name: openJiuwen
          command_link: https://gitcode.com/testmyai/community/blob/master/zh/content/robot/%E7%A4%BE%E5%8C%BA%E5%91%BD%E4%BB%A4%E5%8F%82%E8%80%83%E6%96%87%E6%A1%A3.md
          sig_info_link: "[%s](https://gitcode.com/testmyai/community/blob/master/sig/%s/sig-info.yaml)"
          welcome_message:
            - "### 欢迎来到 %s 社区"
            - "Hey %s , 感谢你对社区的贡献."
            - "#### 机器人使用手册"
            - "有关指令的使用，可以点击 **[此处](%s)** 查看详情。开发人员可以在每个PR或Issue下方评论特定指令来触发机器人任务。"
            - "#### 联系指引"
            - "有疑问可以联系 SIG: **%s** ,"
            - "如果希望快速审核您的PR或ISSUE，请先联系维护者: %s ,"
            - "维护者是： %s ,"
            - "审核者是： %s ."
            - "如果您有任何疑问，请联系仓库维护者: %s ."

      user_mark_format: "@"
      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openjiuwen
      exclude_user:
        - "ibforu"
        - openJiuwen-bot
  deployment:
    podSecurityContext:
      seccompProfile:
        localhostProfile: infra-seccomp.json
        type: Localhost
    replicas: 1
    robotUniversalWelcome:
      args:
        - --config-file=/app/conf/config
        - --token-path=/vault/secrets/token
        - --handle-path=gitcode-hook
        - --port=8888
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsUser: 1000
      resources:
        limits:
          cpu: 100m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 300Mi
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
  podAnnotations:
    vault.hashicorp.com/agent-init-first: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-token: "0400"
    vault.hashicorp.com/agent-inject-secret-token: internal/data/infra-test/openjiuwen-robot
    vault.hashicorp.com/agent-inject-template-token: |
      {{- with secret "internal/data/infra-test/openjiuwen-robot" -}}
      {{ .Data.data.token }}
      {{- end }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/role: openjiuwen-robot
    vault.hashicorp.com/tls-skip-verify: "true"
  NetworkPolicy:
    enabled: true