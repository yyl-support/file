assign:
  enabled: true
  configmap:
    name: configmap-assign
    config: |-
      config_items:
        - repos:
            - testmyai
          enable_issue_assign: true
      community_robot_id: openJiuwen-bot
      msg_multiple_assignee: "### 注意 \nIssue 只能指派一个负责人。"
      msg_assign_repeatedly: "### 注意 \n此 Issue 的负责人已经是 ***%s***。"
      msg_not_allow_assign: "### 注意 \n此 Issue 的负责人不能设置为 ***%s***。因为他不是仓库或组织成员"
      msg_not_allow_unassign: "### 注意 \n ***%s*** 不能取消其负责人。"
      msg_default_assignee: "### 注意 \n此 Issue 需要负责人。 如果没有指派时， ***%s*** 是默认的负责人"
  robotUniversalAssign:
    podSecurityContext:
      seccompProfile:
        localhostProfile: infra-seccomp.json
        type: Localhost
    replicas: 1
    robotUniversalAssign:
      args:
        - --port=8888
        - --config-file=/app/conf/app_config/config.yaml
        - --handle-path=gitcode-hook
        - --token-path=/vault/secrets/token
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsUser: 1000
      resources:
        limits:
          cpu: 100m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 300Mi
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
  podAnnotations:
    vault.hashicorp.com/agent-init-first: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/agent-inject-perms-token: "0400"
    vault.hashicorp.com/agent-inject-secret-token: internal/data/infra-test/openjiuwen-robot
    vault.hashicorp.com/agent-inject-template-token: |
      {{- with secret "internal/data/infra-test/openjiuwen-robot" -}}
      {{ .Data.data.token }}
      {{- end }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-service-account-token-volume-name: token-vol
    vault.hashicorp.com/role: openjiuwen-robot
    vault.hashicorp.com/tls-skip-verify: "true"
  NetworkPolicy:
    enabled: true