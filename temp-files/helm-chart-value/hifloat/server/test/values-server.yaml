server:
  name: hifloat-server
  replicaCount: 4
  deployment:
    replicaCount: 0
    updateStrategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
      type: RollingUpdate
  statefulset:
    replicaCount: 1
    updateStrategy:
      type: RollingUpdate
  image:
    repository: opensourceways-w5peto.swr-pro.myhuaweicloud.com/opensourceways/hifloat-website-backend
    tag: "50dbe431-20260609202357"
    pullPolicy: IfNotPresent
  podLabels:
    app: hifloat-server
  podAnnotations:
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/infra-test/hifloat'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-template-conf.yaml: "{{- with secret \"internal/data/infra-test/hifloat\" -}}  \n{{ .Data.data.server }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-mongo.crt: 'internal/data/infra-test/hifloat'
    vault.hashicorp.com/agent-inject-perms-mongo.crt: "0400"
    vault.hashicorp.com/agent-inject-template-mongo.crt: "{{- with secret \"internal/data/infra-test/hifloat\" -}}  \n{{ .Data.data.mongoCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-redis.crt: 'internal/data/infra-test/hifloat'
    vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
    vault.hashicorp.com/agent-inject-template-redis.crt: "{{- with secret \"internal/data/infra-test/hifloat\" -}}  \n{{ .Data.data.RedisCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-mq.crt: 'internal/data/infra-test/hifloat'
    vault.hashicorp.com/agent-inject-perms-mq.crt: "0400"
    vault.hashicorp.com/agent-inject-template-mq.crt: "{{- with secret \"internal/data/infra-test/hifloat\" -}}  \n{{ .Data.data.kafkaCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-perms-pg.crt: "0400"
    vault.hashicorp.com/agent-inject-secret-pg.crt: 'internal/data/infra-test/hifloat'
    vault.hashicorp.com/agent-inject-template-pg.crt: "{{- with secret \"internal/data/infra-test/hifloat\" -}}  \n{{ .Data.data.PgCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.crt: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-template-server.crt: "{{- with secret \"internal/data/infra-test/domain-tls\" -}}  \n{{ .Data.data.TestOsinfraCnCrt }}\n{{- end }}\n"
    vault.hashicorp.com/agent-inject-secret-server.key: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-template-server.key: "{{- with secret \"internal/data/infra-test/domain-tls\" -}}  \n{{ .Data.data.TestOsinfraCnKey }}\n{{- end }}\n"
  args:
    - --config-file=/vault/secrets/conf.yaml
    - --port=8080
    - --enable-debug=true
    - --tls-key=/vault/secrets/server.key
    - --tls-cert=/vault/secrets/server.crt
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /internal/v1/heartbeat
      port: 8080
      scheme: HTTPS
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /internal/v1/heartbeat
      port: 8080
      scheme: HTTPS
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  resources:
    limits:
      cpu: "4"
      memory: 4Gi
    requests:
      cpu: "4"
      memory: 4Gi
  volumeMounts:
    - name: volume-data
      mountPath: /opt/data
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
    - name: volume-data
      persistentVolumeClaim:
        claimName: hifloat-server-data
  service:
    port: 8080
    targetPort: 8080
