updateStrategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  type: RollingUpdate

serviceAccount:
  name: hifloat
  automount: false

imagePullSecrets:
  - name: huawei-swr-image-pull-secret

nodeSelector:
  kubernetes.io/arch: amd64

podSecurityContext:
  seccompProfile:
    type: Localhost
    localhostProfile: infra-seccomp.json

initContainers:
- command:
  - /bin/bash
  - -c
  - chmod 0700 /vault/secrets/; chown -R 1000:1000 /vault/secrets/; chmod g-s /vault/secrets/; ls -ld /vault/secrets/
  image: swr.cn-north-4.myhuaweicloud.com/opensourceway/openeuler:22.03-lts-sp3
  imagePullPolicy: IfNotPresent
  name: init-unifiedbus

podAnnotations:
  vault.hashicorp.com/agent-service-account-token-volume-name: "token-vol"
  vault.hashicorp.com/agent-init-first: "true"
  vault.hashicorp.com/tls-skip-verify: "true"
  vault.hashicorp.com/agent-inject: 'true'
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/role: 'hifloat'

ingress:
  secretName: test-osinfra-cn-tls
  host: "hifloat-server.test.osinfra.cn"
  main:
    enabled: false
    host: "hifloat-server.test.osinfra.cn"
    name: hifloat-website-ingress
    annotations:
      nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
      nginx.ingress.kubernetes.io/limit-rpm: "500"
  rewrite:
    enabled: false
    host: ""
    name: ""
    annotations: []
  subpaths:
    - name: hifloat-server-ingress
      annotations:
        nginx.ingress.kubernetes.io/limit-rpm: "100"
        nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
        nginx.ingress.kubernetes.io/cors-allow-origin: "*"
        nginx.ingress.kubernetes.io/enable-cors: "true"
      path: /api-server(/|$)(.*)
      pathType: Prefix
      serviceName: hifloat-server-service
      servicePort: 8080
    - name: hifloat-captcha-ingress
      annotations:
        nginx.ingress.kubernetes.io/limit-rpm: "100"
        nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
        nginx.ingress.kubernetes.io/cors-allow-origin: "*"
        nginx.ingress.kubernetes.io/enable-cors: "true"
      path: /api-captcha(/|$)(.*)
      pathType: Prefix
      serviceName: captcha-common-service
      servicePort: 8080

pvc:
  name: hifloat-server-data
  annotations: {}
  accessModes: 
  - ReadWriteMany
  storage: 1Gi
  storageClassName: csi-sfs
  volumeMode: Filesystem

secrets:
  enabled: true
  name: test-osinfra-cn-tls
  path: secrets/data/infra-test/domain-tls
  keysMap:
    ca.crt: tls.cert
    tls.crt: tls.cert
    tls.key: tls.key

errata:
  enabled: false

guidmsg:
  enabled: false

guid:
  enabled: false

stat:
  enabled: false

guidcronjob:
  enabled: false

erratamsg:
  enabled: false

errata:
  enabled: false

statement:
  name: statement-server
  replicaCount: 0
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/opensourceway/unifiedbus/statement-management-test
    tag: "main-d44d34"
    pullPolicy: IfNotPresent
  podLabels: 
    app: statement-server
  podAnnotations:
    vault.hashicorp.com/agent-run-as-user: "1000"
    vault.hashicorp.com/agent-run-as-group: "1000"
    vault.hashicorp.com/agent-inject-secret-conf.yaml: 'internal/data/infra-test/unifiedbus'
    vault.hashicorp.com/agent-inject-perms-conf.yaml: "0400"
    vault.hashicorp.com/agent-inject-template-conf.yaml: |  
      {{- with secret "internal/data/infra-test/unifiedbus" -}}  
      {{ .Data.data.statement }}
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-redis.crt: 'internal/data/infra-test/unifiedbus'
    vault.hashicorp.com/agent-inject-perms-redis.crt: "0400"
    vault.hashicorp.com/agent-inject-template-redis.crt: |  
      {{- with secret "internal/data/infra-test/unifiedbus" -}}  
      {{ .Data.data.statementRedisCrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-server.crt: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.crt: "0400"
    vault.hashicorp.com/agent-inject-template-server.crt: |  
      {{- with secret "internal/data/infra-test/domain-tls" -}}  
      {{ .Data.data.TestOsinfraCnCrt }}
      {{- end }}
    vault.hashicorp.com/agent-inject-secret-server.key: 'internal/data/infra-test/domain-tls'
    vault.hashicorp.com/agent-inject-perms-server.key: "0400"
    vault.hashicorp.com/agent-inject-template-server.key: |  
      {{- with secret "internal/data/infra-test/domain-tls" -}}  
      {{ .Data.data.TestOsinfraCnKey }}
      {{- end }}
  args:
  - --config-file=/vault/secrets/conf.yaml
  - --port=8080
  - --enable-debug=true
  - --rm-config=false
  - --tls-key=/vault/secrets/server.key
  - --tls-cert=/vault/secrets/server.crt
  securityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 20
    periodSeconds: 10
    successThreshold: 1
    httpGet:
      scheme: HTTPS
      path: /internal/v1/heartbeat
      port: 8080
    timeoutSeconds: 5
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "1"
      memory: 1Gi
  volumeMounts:
    - name: volume-data
      mountPath: /home/app/statements
  volumes:
    - name: token-vol
      projected:
        sources:
          - serviceAccountToken:
              audience: api
              expirationSeconds: 600
              path: token
    - name: volume-data
      persistentVolumeClaim:
        claimName: unifiedbus-statement-data
  service:
    port: 8080
    targetPort: 8080

