configmaps:
  - name: configmap-universal-access
    filename: config.yaml
    content: |-
      access:
        repo_plugins:
          - org_or_repo:
              - openUBMC-test
            plugin_name:
              - robot-service-welcome
              - robot-service-cla
              - robot-service-label
              - robot-service-review
              - robot-service-associate
              - robot-service-assign
              - robot-service-lifecycle
              - robot-service-issue-workflow
  
        plugins:
          - name: robot-service-welcome
            endpoint: http://robot-universal-welcome-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Issue Hook"
          - name: robot-service-cla
            endpoint: http://robot-universal-cla-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-lifecycle
            endpoint: http://robot-universal-lifecycle-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-label
            endpoint: http://robot-universal-label-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-review
            endpoint: http://robot-universal-review-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-associate
            endpoint: http://robot-universal-associate-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Merge Request Hook"
              - "Note Hook"
          - name: robot-service-assign
            endpoint: http://robot-universal-assign-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: robot-service-issue-workflow
            endpoint: http://robot-universal-issue-workflow-service.robot-openubmc.svc.cluster.local:8888/gitcode-hook
            events:
              - "Issue Hook"
              - "Note Hook"
          - name: mybot-githook
            endpoint: http://159.138.47.131:30090/hooks
            events:
              - "Note Hook"
              - "Issue Hook"
              - "Merge Request Hook"
  - name: configmap-universal-assign
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
      
        - repos:
            - openUBMC-test/infrastructure
          enable_issue_assign: true
          default_assignee: ibforu
          enable_issue_auto_add_to_dashboard: true
          bug_dashboard_prefix_description: "# 缺陷(当前版本)"
          req_dashboard_prefix_description: "# 需求(当前版本)"
      
      community_robot_id: openUBMC-robot
      msg_multiple_assignee: "### 注意 \nIssue 只能指派一个负责人。"
      msg_assign_repeatedly: "### 注意 \n此 Issue 的负责人已经是 ***%s***。"
      msg_not_allow_assign: "### 注意 \n此 Issue 的负责人不能设置为 ***%s***。因为他不是仓库或组织成员"
      msg_not_allow_unassign: "### 注意 \n ***%s*** 不能取消其负责人。"
      msg_default_assignee: "### 提示 \n此 Issue 需要负责人。 如果没有指派时， ***%s*** 是默认的负责人"
  - name: configmap-universal-associate
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          enable_check_associate_issue: true
          associate_issue_rules:
            org:
              - "openUBMC-test"
            org_label: needs-issue
            org_issue_state_limit: true
            org_issue_limit_state: "open"
            org_comment_command_check_label: /check-issue
            org_comment_command_remove_label: /remove-needs-issue
            org_remove_label_permission: true
            org_comment_remove_label_no_permission: "### 注意 \n只有仓库的管理人员才可以使用评论 ***`/remove-needs-issue`*** 删除 **needs-issue** 标签。如果需要删除，请联系他们。"
            org_comment_label_block_feedback: "### 关联 Issue 通知 \n @%s , 提交的PR需要关联issue，指导链接：https://forum.openubmc.cn/t/topic/208 \n如果已经关联了issue, 但是**needs-issue**标签仍然存在，你可以在评论 **`/check-issue`** 来移除它。"

      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      community_robot_id: openUBMC-robot
      placeholder_linking_issue_notice_title: "### 关联 Issue 通知"
      placeholder_linking_pr_notice_title: "### 关联PR通知"
  - name: configmap-universal-cla
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          cla_label_yes: openUBMC-cla/yes
          cla_label_no: openUBMC-cla/no
          check_url: https://clasign.osinfra.cn/api/v1/individual-signing/gitee_openubmc-1732941016829438030
          sign_url: https://clasign.osinfra.cn/sign/gitee_openubmc-1732941016829438030
          faq_url: https://gitcode.com/openUBMC/infrastructure/blob/main/docs/robot/cla_faq.md
          check_by_committer: true
          lite_pr_committer:
            email: "@noreply.gitcode.com"
            name: GitCode

      user_mark_format: "@"
      placeholder_committer: ""
      placeholder_cla_sign_guide_title: "### CLA 签署引导"
      placeholder_cla_sign_pass_title: "### CLA 签署成功"
      comment_command_trigger: "### CLA 签署指导手册  \n\n由于网络问题未能完成 CLA 检查，请通过评论 ***`/check-cla`*** 再次检查。"
      comment_pr_no_commits: "### CLA 签署指导手册  \n\n此 PR 的 commits 无效，请检查。"
      comment_some_need_sign: "### CLA 签署引导  \n\n %s , 感谢您的代码贡献。 \n\n以下 Commit(s) 没有签署 **<font color=green>_Contributor License Agreement (CLA)_</font>**。 \n\n%s \n\n如果您需要签署 CLA，[您可以点击此链接去签署 CLA ](%s)。  \n\n如果需要检查邮箱是否配置正确， [可以点击 **<font color=red>_FAQs_</font>** 去查看使用手册](%s) 。 \n\n在完成 CLA 签署或者更新完邮箱后, 需再次评论 ***`/check-cla`*** 来检查 CLA 的签署状态。"
      comment_update_label_failed: "### CLA 签署指导手册  \n\n添加 CLA 标签失败，请通过评论 ***`/check-cla`*** 再次检查。 :pray: "
      comment_all_signed: "### CLA 签署成功  \n %s, 感谢您的代码贡献。 所有的代码贡献者都已完成了 CLA 签署。 :+1: "
      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      community_robot_id: openUBMC-bot
      invalid_email: "@noreply.gitcode.com"
      invalid_email_message: "这包含一个无效的邮箱，请检查下！"
      cla_service_failed_message: "检查CLA是否签署失败！请再次评论下 `/check-cla` "
      comment_unsigned_title: "| Commit | 原因 |\n|--|--|"
      comment_unsigned_line: "\n| %s | %s |"
      not_signed_email_message: "这条 Commit 的邮箱未签署 CLA ！请检查下邮箱是否正确配置。"
      message_individual_version_behind: "因为个人 CLA 的协议内容已更新，[请点击这里重新查看下协议内容并再次签署](https://clasign.osinfra.cn/sign-cla/gitee_openubmc-1732941016829438030/individual-update?email=%s)。"
      message_corporation_version_behind: "因为企业 CLA 的协议内容已更新，请联系 CLA 企业管理员进行处理。"
      cla_signature_type_corporation: "corporation"
  - name: configmap-universal-label
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          clear_labels:
            - ci_successful

      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      user_mark_format: "@"
      squash_commit_label: stat/needs-squash
      comment_command_trigger: "### 标签指令手册 \n由于网络问题未能完成标签操作，请稍后再次重试。"
      comment_remove_labels_when_pr_source_code_updated: "### 消息通知  \n此 PR 有新的代码提交需要再次审视, 以下标签已被移除：**_%s_** 。"
      comment_label_command_conflict: "### 标签指令手册 \n %s ， 不能使用评论同时添加和删除同一个标签，请检查、改正后再次评论。"
      comment_update_label_failed: "### 标签指令手册 \n %s ，更新标签 **_%s_** 失败，请稍后再次重试。"
      comment_add_not_exist_label: "### 标签指令手册 \n %s ，当前仓库或组织中没有 **_%s_** 标签，添加失败，请联系sig组管理员添加标签后再次重试。"
      remove_pr_label_delayed_seconds: 2
      community_robot_id: openUBMC-bot
  - name: configmap-universal-lifecycle
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          close_issue_checklist:
            comment_command_lines:
              - "/close"
            allow_list:
              - "任务"
            allow_workflow_list:
              - "任务/待办的,进行中/已完成"
            linked_pr_all_merged_or_closed: true
          reopen_issue_checklist:
            comment_command_lines:
              - "/reopen"
            allow_workflow_list:
              - "任务/已拒绝,已完成,进行中/待办的"
              - "缺陷/修复中,已挂起,已修复,已拒绝/待修复"
              - "需求/开发中,转测中,待验收,已完成/已接纳"
          close_pr_checklist:
            comment_command_lines:
              - "/close"

      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      event_state_opened: opened
      issue_action_reopen: reopen
      event_state_closed: closed
      issue_action_close: close

      comment_no_permission_close_issue: "### 注意 \n@%s ，您不能关闭此 Issue，因为您不是此 Issue 的创建者或仓库管理员，也不是sig组成员。"
      comment_no_permission_reopen_issue: "### 注意 \n@%s ，您不能重新打开此 Issue，因为您不是此 Issue 的创建者或仓库管理员，也不是sig组成员。"
      comment_issue_needs_link_pr: "### 注意 \n@%s ，关闭此 Issue 的前提条件是关联了 PR。"
      comment_list_linking_pull_requests_failure: "### 注意 \n@%s ， 此 Issue 关联 PR 失败，请重新关联"
      comment_no_permission_close_pr: "### 注意 \n@%s ， 您不能操作（%s）此 PR，因为您不是此 PR 的创建者或仓库管理员，也不是sig组成员。"
      comment_issue_has_open_pr: "### 注意 \n@%s ， 此 Issue 关联了开启的 PR，请先处理 PR 合入后，再关闭 Issue。"
      community_robot_id: openUBMC-bot
      comment_not_close_issue: "### 注意 \n@%s ， 因为需求和缺陷Issue处于管控中，不能直接关闭，请联系 [sig-QA](https://gitcode.com/openUBMC/community/blob/main/sigs/sig-QA/sig-info.yaml) 的 Maintainer / Committer"
  - name: configmap-universal-review
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          legal_operator: openUBMC-robot
          labels_for_merge:
            - openUBMC-cla/yes
            - ci-successful
          lgtm_counts_required: 1
  
        - repos:
            - openUBMC-test/community
            - openUBMC-test/infrastructure
            - openUBMC-test/openubmc-ci
          legal_operator: openUBMC-robot
          need_review_questions_fixed: true
          labels_for_merge:
            - openUBMC-cla/yes
          labels_not_allow_merge:
            - unresolved-reviews
          lgtm_counts_required: 1

      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      comment_try_squash_again: "### 变更合入方法失败 \n 请使用 **/rebase cancel** 来删除 **merge/rebase** 标签，然后再尝试评论 **/squash** 。"
      comment_try_rebase_again: "### 变更合入方法失败 \n请使用 **/squash cancel** 来移除 **merge/squash** 标签，然后再尝试评论 **/rebase** 。"
      comment_add_lgtm_by_self: "### 代码审视提示 \n @%s ,PR的创建者不能自己添加 ***lgtm***标签。:astonished:"
      comment_removed_label: "### 代码审视消息 \n 标签 **%s** 已被 ***%s*** 移除，因为 PR 可能需要重新审视。 :flushed: "
      comment_add_label_successful: "### 代码审视消息 \n- 标签 **%s** 被 ***%s*** 添加至本PR。 :wave: \n ##### *注意:* 如果本PR在满足所有合入条件后未能自动合并，可通过评论 ***`/check-pr`*** 手动触发合并任务。 :smile: "
      comment_add_label_failed: "### 代码审视消息 \n 标签 **%s** 未添加，操作者： ***%s***。 :wave: \n 请重新评论下。"
      comment_no_permission_for_label: "### 代码审视消息 \n ***@%s*** 在本PR中没有 %s **%s** 标签的权限。 :astonished: \n 请联系本仓库管理人员。"
      comment_no_permission_for_lgtm_label: "### 代码审视消息 \n 感谢您的审阅, ***%s***, 您的意见对我们来说非常宝贵。 :wave: \n 仓库管理人员会认真考虑您的意见。"
      comment_command_trigger: "### 合入指导\n @%s, 请重新评论 ***`/%s`*** . :pray: "
      comment_clear_label_case_by_pr_update: "### 注意\n 本PR有新的代码提交，以下标签将会被移除： ***%s***。 :flushed: "
      comment_clear_label_case_by_reopen_pr: "### 注意\n PR被重新打开，以下标签将被移除： ***%s***。 :flushed: "
      comment_pr_cannot_merge_reason: "### 合入校验失败\n@%s, 当前PR不可合入，原因如下:\n\n%s"
      comment_msg_missing_labels: "##### *缺少标签*\n- PR当前没有以下标签: %s。"
      comment_msg_invalid_labels: "##### *不应有标签*\n- 本PR应该删除以下标签: %s。"
      comment_msg_not_enough_lgtm_label: "##### *LGTM标签数量不够*\n- PR需要至少 %d 个lgtm标签，当前已有 %d个。"
      comment_try_label_again: "相关标签操作日志丢失。请删除如下标签： **%s** 并尝试通过评论重新添加。"
      comment_no_permission_add_label: "%s 您不能自己添加标签 **%s**，请手动移除此标签后通过评论重新添加。"
      comment_failed_list_pr_operation_logs: "### 注意\n 查询PR操作日志失败。"
      comment_no_ready_tips: "##### *不合规的标签操作*\n- %s"
      comment_failed_merge_pr: "### 合并PR失败 \n - reason: %s"
      comment_failed_merge_pr_unknown_reason: "未知错误发生, 请联系社区基础设施团队。"
      comment_review_question_not_fixed: "### 注意\n 本 PR 共有 **%d** 条评审意见，仍有 **%d** 条未解决。如果所有评审意见都已解决，可通过评论 ***`/check-pr`*** 手动尝试合并 PR。 :smile: "
      label_usage_tip_title: "##### *标签使用技巧*"
      label_usage_tip_detail: "- **%s**: %s"
      label_usage_description:
        - label_name: lgtm
          description: "合并PR时必要的标签。代码仓管理人员可以通过评论 **`/lgtm`** 来添加标签。PR创建者可以通过评论 **`/lgtm cancel`** 来删除标签，但无法通过评论 **`/lgtm`** 添加标签。"
        - label_name: approved
          description: "合并PR时必要的标签。代码仓管理人员可以通过评论 **`/approve`** 来添加标签，通过评论 **`/approve cancel`** 来删除标签。"
        - label_name: openUBMC-cla/yes
          description: "合并PR时的必要标签。PR的每一位代码贡献者必须签署Contributor License Agreement （简称CLA），否则PR将无法合并。在CLA签署成功后，PR的创建者可以通过评论 **`/check-cla`** 触发机器人任务，在机器人检验成功后，会给PR添加相应的cla标签。"
        - label_name: ci-successful
          description: "合并PR时的必要标签。代码需要通过CI测试，否则PR将无法合并。可以通过评论 **`/retest`** 重新触发CI。"
        - label_name: ci-failed
          description: "合并PR时的必要标签。代码需要通过CI测试，否则PR将无法合并。可以通过评论 **`/retest`** 重新触发CI。"
        - label_name: needs-issue
          description: "PR需要关联issue，指导链接：https://forum.openubmc.cn/t/topic/208 。如果已经关联了issue, 但是**needs-issue**标签仍然存在，你可以在评论 **`/check-issue`** 来移除它。"
        - label_name: unresolved-reviews
          description: "当前PR仍有未解决的评审意见，需要解决这些评审意见，PR才能合入。如果所有评审意见都已解决，可通过评论 **`/check-pr`** 手动尝试合并 PR。"
      community_robot_id: openUBMC-bot
  - name: configmap-universal-welcome
    filename: config.yaml
    content: |-
      config_items:
        - repos:
          - openUBMC-test
          community_name: openUBMC
          command_link: https://gitcode.com/openUBMC/infrastructure/blob/main/docs/robot/command_zh.md
          sig_info_link: "[%s](https://gitcode.com/openUBMC/community/blob/main/sigs/%s/sig-info.yaml)"
          welcome_message:
            - "### 欢迎来到 %s 社区"
            - "Hey %s , 感谢你对社区的贡献."
            - "#### 机器人使用手册"
            - "有关指令的使用，可以点击 **[说明文档](%s) 或 [论坛](https://discuss.openubmc.cn/t/topic/4975)** 查看详情。开发人员可以在每个PR或Issue下方评论特定指令来触发机器人任务。"
            - "#### 联系指引"
            - "有疑问可以联系 SIG: **%s** ,"
            - "如果希望快速审核您的PR或ISSUE，请先联系维护者: %s ,"
            - "维护者是： %s ,"
            - "审核者是： %s ."
            - "如果您有任何疑问，请联系仓库维护者: %s ."

      user_mark_format: "@"
      sig_info_url: "https://magicapi.test.osinfra.cn/stat/sig/detail/info"
      community_name: openubmc
      exclude_user:
        - "ibforu"
        - openUBMC-bot

  - name: configmap-issue-workflow
    filename: config.yaml
    content: |-
      config_items:
        - repos:
            - openUBMC-test
          sig_info_link_template: "[%s](https://gitcode.com/openUBMC/community/blob/main/sigs/%s/sig-info.yaml)"
          workflow_permissions:
            - issue_type: "需求"
              prev_workflow: "待办的"
              next_workflow: "已接纳"
              comment_command: "/todo2accepted"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer"
            - issue_type: "需求"
              prev_workflow: "已接纳"
              next_workflow: "开发中"
              comment_command: "/accepted2developing"
              permission_repo_roles:
                - "openUBMC_Maintainer"
                - "openUBMC_Committer"
                - "openUBMC_Contributor"
                - "Owner"
                - "Maintainer"
            - issue_type: "需求"
              prev_workflow: "开发中"
              next_workflow: "转测中"
              comment_command: "/developing2testing"
              permission_repo_roles:
                - "openUBMC_Maintainer"
                - "openUBMC_Committer"
                - "openUBMC_Contributor"
                - "Owner"
                - "Maintainer"
            - issue_type: "需求"
              prev_workflow: "转测中"
              next_workflow: "待验收"
              comment_command: "/testing2UAT"
              permission_repo_roles:
                - "openUBMC_Maintainer"
                - "openUBMC_Committer"
                - "openUBMC_Contributor"
                - "Owner"
                - "Maintainer"
            - issue_type: "需求"
              prev_workflow: "待验收"
              next_workflow: "已完成"
              comment_command: "/UAT2done"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer,committer"

            - issue_type: "需求"
              comment_command: "" # 表格格式，忽略

            - issue_type: "需求"
              prev_workflow: "待办的"
              next_workflow: "已挂起"
              comment_command: "/todo2suspended"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer"
            - issue_type: "需求"
              prev_workflow: "已挂起"
              next_workflow: "已接纳"
              comment_command: "/suspended2accepted"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer"

            - issue_type: "需求"
              comment_command: "" # 表格格式，忽略

            - issue_type: "需求"
              prev_workflow: "待办的"
              next_workflow: "已拒绝"
              comment_command: "/todo2rejected"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer"
            - issue_type: "需求"
              prev_workflow: "已拒绝"
              next_workflow: "已接纳"
              comment_command: "/rejected2accepted"
              permission_sig_groups:
                - sig_name: "infrastructure"
                  sig_role: "maintainer"

            - issue_type: "缺陷"
              prev_workflow: "待修复"
