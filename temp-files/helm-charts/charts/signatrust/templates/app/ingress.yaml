{{- if .Values.app.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-ingress" .Values.app.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  tls:
  - hosts:
      - {{ .Values.app.ingress.host }}
    secretName: {{ .Values.app.ingress.secretName }}
  rules:
  - host: {{ .Values.app.ingress.host }}
    http:
      paths:
      - path: {{ .Values.app.ingress.path }}
        pathType: {{ .Values.app.ingress.pathtype }}
        backend:
          service:
            name: {{ .Values.app.ingress.backend.serviceName }}
            port:
              number: {{ .Values.app.ingress.backend.servicePort }}
  ingressClassName: {{ .Values.app.ingress.className }}
{{- end }}