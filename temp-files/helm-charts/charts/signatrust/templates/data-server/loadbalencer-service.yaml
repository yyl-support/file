{{- if and .Values.dataServer.enabled .Values.dataServer.LoadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.dataServer.name }}-lb
  namespace: {{ .Values.global.namespace }}
  {{- with .Values.dataServer.LoadBalancer.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dataServer.LoadBalancer.type }}
  selector:
    component: {{ .Values.dataServer.name }}
  ports:
  {{- .Values.dataServer.LoadBalancer.ports | toYaml | nindent 2 }}
{{- end }}