apiVersion: v1
kind: Service
metadata:
  name: {{ include "oneid-workbench.fullname" . }}
  namespace: {{ .Values.namespace.name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "oneid-workbench.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.service.ports | toYaml | nindent 2 }}
