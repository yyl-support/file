{{- range .Values.ingress }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}
  annotations:
    {{- toYaml .annotations | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .host }}
    http:
      paths:
      - backend:
          service:
            name: {{ .serviceName }}
            port:
              number: {{ .servicePort }}
        path: {{ .path }}
        pathType: {{ .pathType }}
  tls:
  - hosts:
    - {{ .host }}
    secretName: {{ .secretName }}
{{- end }}