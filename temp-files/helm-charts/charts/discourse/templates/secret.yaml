{{- if .Values.tlsDefinition.enabled }}
---
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
  name: {{ .Values.tlsDefinition.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  name: {{ .Values.tlsDefinition.name }}
  keysMap:
  {{- range $key, $val := .Values.tlsDefinition.keysMap }}
    {{ $key }}:
      key: {{ $val }}
      path: {{ $.Values.tlsDefinition.path }}
  {{- end }}
{{- end }}
