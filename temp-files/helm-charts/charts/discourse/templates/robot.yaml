{{- with .Values.robot }}
{{- if .enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discourse.fullname" $ }}-robot
  namespace: {{ $.Values.namespace.name }}
spec:
  replicas: {{ .replicaCount }}
  strategy:
    {{- toYaml .strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- toYaml .podLabels | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .podAnnotations | nindent 8 }}
      labels:
        {{- toYaml .podLabels | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      serviceAccount: {{ $.Values.serviceAccount.name }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automount }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: forum-robot
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              scheme: HTTP
              path: /health
              port: 5000
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            httpGet:
              scheme: HTTP
              path: /health
              port: 5000
            timeoutSeconds: 5
          volumeMounts:
            {{- toYaml .volumeMounts | nindent 12 }}
      volumes:
        {{- toYaml .volumes | nindent 8 }}
{{- end }}
{{- end }}
