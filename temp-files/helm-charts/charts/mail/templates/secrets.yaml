{{- range $secrets := .Values.tls.secrets }}
---
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
  name: {{ $secrets.name }}
  labels:
  {{- include "mail.labels" $ | nindent 4 }}
spec:
  keysMap:
  {{- range $key, $val := $secrets.keysMap }}
    {{ $key }}:
      key: {{ $val }}
      path: {{ $secrets.path }}
  {{- end }}
  name: {{ .name }}
{{- end }}

{{- with .Values.mailwebSecrets }}
---
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
  name: {{ .name }}
  labels:
  {{- include "mail.labels" $ | nindent 4 }}
spec:
  keysMap:
  {{- range $key, $val := .keysMap }}
    {{ $key }}:
      key: {{ $val }}
      path: {{ $.Values.mailwebSecrets.path }}
  {{- end }}
  name: {{ .name }}
{{- end }}
