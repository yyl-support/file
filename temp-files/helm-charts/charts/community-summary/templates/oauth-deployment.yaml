{{- if .Values.oauth }}
{{- range $server := .Values.oauth }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Values.community.name }}-{{ $server.provider }}-oauth2-proxy
  namespace: {{ $.Values.namespace.name }}
spec:
  replicas: {{ $server.replicaCount }}
  {{- with $server.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- with $server.podLabels }}
    matchLabels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $server.podLabels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      imagePullSecrets:
      - name: {{ $.Values.imagePullSecret }}
      serviceAccount: {{ $.Values.serviceAccount.name }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ $.Values.serviceAccount.automount }}
      containers:
      - name: {{ $server.provider }}-oauth
        image: {{ $server.image.repository }}:{{ $server.image.tag }}
        imagePullPolicy: {{ $server.image.pullPolicy }}
        {{- with $server.args }}
        args:
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        {{- range $server.env }}
        - name: {{ .name }}
          valueFrom:
            secretKeyRef:
              key: {{ .value }}
              name: {{ $server.secret.name }}
        {{- end }}
        ports:
        - containerPort: {{ $server.service.targetPort }}
          name: http
          protocol: TCP
        {{- with $server.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $server.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $server.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $server.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $server.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with $server.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}