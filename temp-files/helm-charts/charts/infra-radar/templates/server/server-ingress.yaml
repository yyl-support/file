{{- range .Values.server.ingress.subpaths }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
  - host: {{ $.Values.server.ingress.host }}
    http:
      paths:
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ .serviceName }}
            port:
              number: {{ .servicePort }}
  tls:
  - hosts:
      - {{ $.Values.server.ingress.host }}
    secretName: {{ $.Values.secret.name }}
{{- end }}