---
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
 name: tls-secrets
 namespace: {{ .Values.namespace }}
spec:
 name: tls-secrets
 keysMap:
  {{- range $key, $val := .Values.secrets.keysMap }}
    {{ $key }}:
      key: {{ $val }}
      path: {{ $.Values.secrets.path }}
  {{- end }}