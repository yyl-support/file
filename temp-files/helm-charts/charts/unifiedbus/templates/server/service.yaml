apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.server.name }}-service
  labels:
    {{- with .Values.server.podLabels }}
    {{- toYaml . | nindent 4}}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: {{ .Values.server.service.targetPort }}
      protocol: TCP
      name: http-port
  {{- with .Values.server.podLabels }}
  selector:
    {{- toYaml . | nindent 4}}
  {{- end }}