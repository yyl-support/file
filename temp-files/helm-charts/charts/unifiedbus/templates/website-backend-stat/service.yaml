{{- if .Values.stat.enabled}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.stat.name }}-service
  {{- with .Values.stat.podLabels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.stat.service.port }}
      targetPort: {{ .Values.stat.service.targetPort }}
      protocol: TCP
      name: http-port
  {{- with .Values.stat.podLabels }}
  selector:
    {{- toYaml . | nindent 4}}
  {{- end }}
{{- end }}