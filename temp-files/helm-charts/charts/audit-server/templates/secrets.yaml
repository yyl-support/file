{{- with .Values.secret }}
{{- if .enabled }}
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
 name: {{ .name }}
 keysMap:
   ca.crt:
     path: {{ .path }}
     key: {{ .crtKey }}
   tls.crt:
     path: {{ .path }}
     key: {{ .crtKey }}
   tls.key:
     path: {{ .path }}
     key: {{ .keyKey }}
{{- end }}
{{- end }}

