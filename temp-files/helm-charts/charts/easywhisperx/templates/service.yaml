apiVersion: v1
kind: Service
metadata:
  name: {{ include "easywhisperx.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "easywhisperx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: {{ .Values.service.name }}
  selector:
    {{- include "easywhisperx.selectorLabels" . | nindent 4 }}
