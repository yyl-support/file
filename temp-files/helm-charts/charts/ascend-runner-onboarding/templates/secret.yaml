{{- range $name, $secret := .Values.secretDefinitions }}
{{- if $secret.enabled }}
---
apiVersion: secrets-manager.tuenti.io/v1alpha1
kind: SecretDefinition
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
spec:
  name: {{ $name }}
  keysMap:
    {{- range $key, $value := $secret.keysMap }}
    {{ $key }}:
      key: {{ $value.key }}
      path: {{ $value.path }}
    {{- end }}
{{- end }}
{{- end }}
